<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Tower Defense</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#c8e8ff;overflow:hidden;
  font-family:'Segoe UI',system-ui,sans-serif;color:#0f3460}

/* ── Layout ── */
#wrap{display:flex;flex-direction:column;width:100%;height:100%}
#topbar{flex:0 0 50px;display:flex;align-items:center;gap:14px;
  padding:0 16px;
  background:linear-gradient(90deg,#0078D4,#00A8E8);
  border-bottom:3px solid #005a9e;z-index:20;
  box-shadow:0 3px 12px rgba(0,120,212,.35)}
.hstat{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:#fff}
.hstat-icon{font-size:16px}
.hstat-val{min-width:38px;color:#ffe085}
.hsep{color:rgba(255,255,255,0.3)}
#wave-info{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.85)}
#wave-pips{display:flex;gap:3px}
.pip{width:12px;height:5px;border-radius:3px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.2);transition:all .25s}
.pip.done{background:#22c55e;border-color:#16a34a}
.pip.active{background:#fbbf24;border-color:#f59e0b}

#body{flex:1;display:flex;min-height:0}
#cvs-wrap{flex:1;position:relative;overflow:hidden;background:#87CEEB}
#cvs-wrap canvas{display:block}

/* ── Side panel ── */
#panel{flex:0 0 156px;display:flex;flex-direction:column;gap:6px;
  padding:12px 9px;overflow-y:auto;
  background:linear-gradient(180deg,#f0f8ff,#e0f0ff);
  border-left:2px solid #bee3f8}
.ptitle{font-size:9px;letter-spacing:2px;color:#0078D4;text-align:center;
  text-transform:uppercase;margin-bottom:4px;font-weight:700}

.tbtn{width:100%;padding:8px 9px 7px;border-radius:10px;cursor:pointer;
  color:#0f3460;text-align:left;transition:all .14s;
  background:#fff;border:2px solid #bee3f8}
.tbtn:hover:not([disabled]){background:#e8f4ff;
  border-color:#0078D4;transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(0,120,212,.18)}
.tbtn.sel{border-color:var(--tc);
  box-shadow:0 0 0 3px color-mix(in srgb,var(--tc) 25%,transparent);
  background:color-mix(in srgb,var(--tc) 10%,#fff)}
.tbtn[disabled]{opacity:.4;cursor:not-allowed;background:#f1f5f9}
.tbtn-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.tbtn-name{font-size:12px;font-weight:700}
.tbtn-cost{font-size:11px;color:#d97706;font-weight:700}
.tbtn-desc{font-size:9px;color:#64748b}

#actions{margin-top:auto;display:flex;flex-direction:column;gap:6px}
.abtn{width:100%;padding:10px;border-radius:8px;border:none;font-size:12px;
  font-weight:700;cursor:pointer;transition:all .14s;letter-spacing:.3px}
#bwave{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;
  box-shadow:0 3px 10px rgba(34,197,94,.35)}
#bwave:hover:not([disabled]){filter:brightness(1.1);transform:translateY(-1px);
  box-shadow:0 5px 16px rgba(34,197,94,.45)}
#bwave[disabled]{background:#e2e8f0;color:#94a3b8;cursor:not-allowed;transform:none;box-shadow:none}
#bspd{background:#fff;color:#0078D4;border:2px solid #bee3f8;font-weight:700}
#bspd:hover{background:#e8f4ff;border-color:#0078D4}
#hint{font-size:9px;color:#64748b;text-align:center;min-height:13px;margin-top:2px;
  background:rgba(0,120,212,.06);border-radius:6px;padding:3px}

/* ── Overlay ── */
#ov{display:none;position:absolute;inset:0;z-index:50;
  align-items:center;justify-content:center;flex-direction:column;
  background:rgba(0,80,160,0.7);backdrop-filter:blur(8px)}
#ov.on{display:flex}
#ov h1{font-size:34px;font-weight:800;letter-spacing:2px;margin-bottom:8px;color:#fff;
  text-shadow:0 2px 16px rgba(0,0,0,.3)}
#ov .sub{font-size:13px;color:rgba(255,255,255,.8);margin-bottom:4px}
#ov .pts{font-size:28px;color:#ffe085;font-weight:700;margin:8px 0 20px;
  text-shadow:0 2px 8px rgba(0,0,0,.3)}
.rbtn{padding:12px 36px;border:none;border-radius:10px;font-size:14px;font-weight:700;
  cursor:pointer;background:linear-gradient(135deg,#0078D4,#00B4D8);color:#fff;
  box-shadow:0 4px 20px rgba(0,120,212,.5);transition:filter .15s,transform .15s}
.rbtn:hover{filter:brightness(1.1);transform:translateY(-2px)}
</style>
</head>
<body>
<div id="wrap">

<!-- Top HUD -->
<div id="topbar">
  <div class="hstat"><span class="hstat-icon">💰</span><span class="hstat-val" id="hg">150</span></div>
  <span class="hsep">|</span>
  <div class="hstat"><span class="hstat-icon">❤️</span><span class="hstat-val" id="hl">20</span></div>
  <span class="hsep">|</span>
  <div class="hstat"><span class="hstat-icon">🏆</span><span class="hstat-val" id="hs">0</span></div>
  <div id="wave-info">
    Wave <strong id="hw" style="color:#e2e8f0">0</strong>/10
    <div id="wave-pips"></div>
  </div>
</div>

<!-- Body -->
<div id="body">
  <!-- Canvas -->
  <div id="cvs-wrap">
    <!-- Phaser mounts here -->
    <div id="ov">
      <h1 id="ov-title">GAME OVER</h1>
      <div class="sub" id="ov-sub">All lives lost</div>
      <div class="pts" id="ov-pts">Score: 0</div>
      <button class="rbtn" onclick="doRestart()">▶ Play Again</button>
    </div>
  </div>

  <!-- Side panel -->
  <div id="panel">
    <div class="ptitle">Towers</div>

    <button class="tbtn" style="--tc:#f59e0b" data-key="arrow" onclick="pickTower('arrow',this)">
      <div class="tbtn-top">
        <span class="tbtn-name" style="color:#f59e0b">Arrow</span>
        <span class="tbtn-cost">💰75</span>
      </div>
      <div class="tbtn-desc">Fast · single target</div>
    </button>

    <button class="tbtn" style="--tc:#94a3b8" data-key="cannon" onclick="pickTower('cannon',this)">
      <div class="tbtn-top">
        <span class="tbtn-name" style="color:#94a3b8">Cannon</span>
        <span class="tbtn-cost">💰125</span>
      </div>
      <div class="tbtn-desc">Slow · area splash</div>
    </button>

    <button class="tbtn" style="--tc:#a78bfa" data-key="magic" onclick="pickTower('magic',this)">
      <div class="tbtn-top">
        <span class="tbtn-name" style="color:#a78bfa">Magic</span>
        <span class="tbtn-cost">💰175</span>
      </div>
      <div class="tbtn-desc">Hits 3 targets</div>
    </button>

    <button class="tbtn" style="--tc:#38bdf8" data-key="laser" onclick="pickTower('laser',this)">
      <div class="tbtn-top">
        <span class="tbtn-name" style="color:#38bdf8">Laser</span>
        <span class="tbtn-cost">💰250</span>
      </div>
      <div class="tbtn-desc">Rapid · beam</div>
    </button>

    <div id="hint">Select a tower</div>

    <div id="actions">
      <button class="abtn" id="bwave" onclick="doStartWave()">▶ Start Wave</button>
      <button class="abtn" id="bspd"  onclick="doToggleSpeed()">⚡ Speed: 1×</button>
    </div>
  </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
'use strict';

// ── Grid constants ─────────────────────────────────────────────────────────
const COLS=14, ROWS=9;
const TS=52;   // tile size in pixels (square, top-down)
const GW=COLS*TS, GH=ROWS*TS+2; // 728×470

// Top-down: tile (c,r) has top-left at (c*TS, r*TS)
function tilePos(c,r){ return { x:c*TS+TS/2, y:r*TS+TS/2 }; }

// ── Path ──────────────────────────────────────────────────────────────────
const PATH=[
  [0,4],[1,4],[2,4],[3,4],[3,3],[3,2],[3,1],[4,1],[5,1],[6,1],[7,1],[8,1],
  [8,2],[8,3],[8,4],[8,5],[8,6],[8,7],[9,7],[10,7],[11,7],[12,7],[13,7]
];
const PATH_SET=new Set(PATH.map(([c,r])=>`${c},${r}`));

// ── Tower data ────────────────────────────────────────────────────────────
const TOWERS={
  arrow: {cost:75, dmg:22, range:TS*2.6, cd:36, splash:0,       multi:1, color:0xf59e0b, pclr:0xfbbf24},
  cannon:{cost:125,dmg:72, range:TS*2.2, cd:90, splash:TS*1.1,  multi:1, color:0x94a3b8, pclr:0x6b7280},
  magic: {cost:175,dmg:40, range:TS*3.0, cd:52, splash:0,       multi:3, color:0xa78bfa, pclr:0xc4b5fd},
  laser: {cost:250,dmg:12, range:TS*3.4, cd:4,  splash:0,       multi:1, color:0x38bdf8, pclr:0x7dd3fc},
};

// ── Enemy data ────────────────────────────────────────────────────────────
const ENEMIES={
  grunt:  {hp:80,  spd:76, reward:10,  color:0xef4444, sz:1.00},
  armor:  {hp:240, spd:46, reward:25,  color:0x94a3b8, sz:1.15},
  speeder:{hp:42,  spd:165,reward:15,  color:0x84cc16, sz:0.82},
  boss:   {hp:1500,spd:38, reward:150, color:0x9333ea, sz:1.80},
};

// ── Waves ─────────────────────────────────────────────────────────────────
const WAVES=[
  [{t:'grunt',  n:8, iv:1200}],
  [{t:'grunt',  n:10,iv:1100},{t:'armor',   n:2, iv:2200}],
  [{t:'grunt',  n:8, iv:1000},{t:'speeder', n:4, iv:900}],
  [{t:'armor',  n:6, iv:1400},{t:'speeder', n:6, iv:800}],
  [{t:'grunt',  n:6, iv:900}, {t:'boss',    n:1, iv:0}],
  [{t:'speeder',n:12,iv:680}, {t:'armor',   n:4, iv:1200}],
  [{t:'grunt',  n:14,iv:780}, {t:'armor',   n:6, iv:1100}],
  [{t:'speeder',n:8, iv:570}, {t:'boss',    n:2, iv:3200}],
  [{t:'armor',  n:10,iv:900}, {t:'speeder', n:10,iv:580},{t:'grunt',n:10,iv:700}],
  [{t:'grunt',  n:10,iv:670}, {t:'armor',   n:8, iv:880},{t:'speeder',n:8,iv:490},{t:'boss',n:3,iv:4000}],
];

// ── UI globals ────────────────────────────────────────────────────────────
let selType=null, gameScene=null, gameSpd=1;

function pickTower(key,btn){
  selType = selType===key ? null : key;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('sel'));
  if(selType){ btn.classList.add('sel'); hint('Click a grass tile to place'); }
  else hint('Select a tower');
}
function doStartWave(){ if(gameScene) gameScene.startWave(); }
function doToggleSpeed(){
  gameSpd = gameSpd>=3 ? 1 : gameSpd+1;
  document.getElementById('bspd').textContent=`⚡ Speed: ${gameSpd}×`;
  if(gameScene) gameScene.spd=gameSpd;
}
function doRestart(){
  document.getElementById('ov').classList.remove('on');
  selType=null;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('sel'));
  hint('Select a tower');
  if(gameScene) gameScene.scene.restart();
}
function hint(m){ document.getElementById('hint').textContent=m; }

function hudRefresh(g){
  document.getElementById('hg').textContent=g.gold;
  document.getElementById('hl').textContent=g.lives;
  document.getElementById('hs').textContent=g.score;
  document.getElementById('hw').textContent=g.wave;
  // wave pips
  const pips=document.getElementById('wave-pips');
  pips.innerHTML='';
  for(let i=0;i<10;i++){
    const d=document.createElement('div');
    d.className='pip'+(i<g.wave?' done':(g.waveActive&&i===g.wave?' active':''));
    pips.appendChild(d);
  }
  // wave button
  const bw=document.getElementById('bwave');
  bw.disabled = g.waveActive || g.wave>=10;
  bw.textContent = g.waveActive ? `⏳ Wave ${g.wave}…` : g.wave>=10 ? '✓ Done' : '▶ Start Wave';
  // tower buttons
  document.querySelectorAll('.tbtn').forEach(b=>{
    const td=TOWERS[b.dataset.key];
    b.disabled = td && g.gold < td.cost;
  });
}

// ── Texture helper ────────────────────────────────────────────────────────
function mkTex(scene,key,w,h,fn){
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  fn(c.getContext('2d'),w,h); scene.textures.addCanvas(key,c);
}

// ── BootScene ─────────────────────────────────────────────────────────────
class BootScene extends Phaser.Scene {
  constructor(){ super('Boot'); }
  create(){
    const S=TS;

    // Grass tile — bright Edge Surf green
    mkTex(this,'t_grass',S,S,(ctx)=>{
      const g=ctx.createLinearGradient(0,0,S,S);
      g.addColorStop(0,'#4ade80'); g.addColorStop(1,'#22c55e');
      ctx.fillStyle=g; ctx.fillRect(0,0,S,S);
      // subtle grass texture
      ctx.strokeStyle='rgba(0,100,0,0.08)'; ctx.lineWidth=1;
      for(let i=1;i<3;i++){
        ctx.beginPath(); ctx.moveTo(S*i/3,0); ctx.lineTo(S*i/3,S); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,S*i/3); ctx.lineTo(S,S*i/3); ctx.stroke();
      }
      // lighter highlight corner
      ctx.fillStyle='rgba(255,255,255,0.07)';
      ctx.fillRect(0,0,S/2,S/2);
      ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=0.5; ctx.strokeRect(0,0,S,S);
    });

    // Path tile — warm sandy gold
    mkTex(this,'t_path',S,S,(ctx)=>{
      const g=ctx.createLinearGradient(0,0,S,S);
      g.addColorStop(0,'#fde68a'); g.addColorStop(1,'#fbbf24');
      ctx.fillStyle=g; ctx.fillRect(0,0,S,S);
      // cobblestone pattern
      ctx.fillStyle='rgba(180,120,0,0.12)';
      [[0,0,S/2,S/2],[S/2,S/2,S/2,S/2],[S/4,S/4,S/2,S/2]].forEach(([x,y,w,h])=>ctx.fillRect(x+2,y+2,w-4,h-4));
      ctx.strokeStyle='rgba(180,120,0,0.18)'; ctx.lineWidth=1;
      [S/2].forEach(v=>{ ctx.beginPath(); ctx.moveTo(v,0); ctx.lineTo(v,S); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,v); ctx.lineTo(S,v); ctx.stroke(); });
      ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=0.5; ctx.strokeRect(0,0,S,S);
    });

    // Start tile — bright green portal
    mkTex(this,'t_start',S,S,(ctx)=>{
      const g=ctx.createLinearGradient(0,0,S,S);
      g.addColorStop(0,'#86efac'); g.addColorStop(1,'#22c55e');
      ctx.fillStyle=g; ctx.fillRect(0,0,S,S);
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(S/2,S/2,S/2-6,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#16a34a'; ctx.font=`bold ${S*0.34}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('▶',S/2,S/2+1);
    });

    // End tile — red flag/target
    mkTex(this,'t_end',S,S,(ctx)=>{
      const g=ctx.createLinearGradient(0,0,S,S);
      g.addColorStop(0,'#fca5a5'); g.addColorStop(1,'#ef4444');
      ctx.fillStyle=g; ctx.fillRect(0,0,S,S);
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(S/2,S/2,S/2-6,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#dc2626'; ctx.font=`bold ${S*0.34}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🏁',S/2,S/2+2);
    });

    // Hover tile — blue selection ring
    mkTex(this,'t_hover',S,S,(ctx)=>{
      ctx.fillStyle='rgba(0,180,230,0.18)'; ctx.fillRect(0,0,S,S);
      ctx.strokeStyle='#00B4D8'; ctx.lineWidth=2.5;
      ctx.strokeRect(2,2,S-4,S-4);
      // corner accents
      [[0,0],[S,0],[S,S],[0,S]].forEach(([x,y])=>{
        ctx.beginPath(); ctx.moveTo(x===0?x+6:x-6,y); ctx.lineTo(x,y); ctx.lineTo(x,y===0?y+6:y-6); ctx.stroke();
      });
    });

    // ── Tower sprites (top-down, bright Edge Surf style) ─────────────────
    const R=S*0.44;

    // Arrow tower — warm amber wood
    mkTex(this,'tw_arrow',S,S,(ctx)=>{
      const cx=S/2, cy=S/2;
      // outer ring shadow
      ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.arc(cx+1,cy+2,R,0,Math.PI*2); ctx.fill();
      // base
      const bg=ctx.createRadialGradient(cx-R*.3,cy-R*.3,0,cx,cy,R);
      bg.addColorStop(0,'#fcd34d'); bg.addColorStop(1,'#b45309');
      ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();
      // inner platform
      const ig=ctx.createRadialGradient(cx-R*.2,cy-R*.2,0,cx,cy,R*0.7);
      ig.addColorStop(0,'#fde68a'); ig.addColorStop(1,'#d97706');
      ctx.fillStyle=ig; ctx.beginPath(); ctx.arc(cx,cy,R*0.7,0,Math.PI*2); ctx.fill();
      // arrow head (pointing up = north)
      ctx.fillStyle='#fff'; ctx.shadowColor='#f59e0b'; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.moveTo(cx,cy-R*0.55); ctx.lineTo(cx+R*0.28,cy+R*0.32); ctx.lineTo(cx,cy+R*0.12); ctx.lineTo(cx-R*0.28,cy+R*0.32); ctx.closePath(); ctx.fill();
      ctx.shadowBlur=0;
      // rim
      ctx.strokeStyle='#92400e'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.stroke();
    });

    // Cannon tower — cool stone blue-gray
    mkTex(this,'tw_cannon',S,S,(ctx)=>{
      const cx=S/2, cy=S/2;
      ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.arc(cx+1,cy+2,R,0,Math.PI*2); ctx.fill();
      const bg=ctx.createRadialGradient(cx-R*.3,cy-R*.3,0,cx,cy,R);
      bg.addColorStop(0,'#cbd5e1'); bg.addColorStop(1,'#475569');
      ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();
      const ig=ctx.createRadialGradient(cx-R*.2,cy-R*.2,0,cx,cy,R*0.7);
      ig.addColorStop(0,'#e2e8f0'); ig.addColorStop(1,'#64748b');
      ctx.fillStyle=ig; ctx.beginPath(); ctx.arc(cx,cy,R*0.7,0,Math.PI*2); ctx.fill();
      // cannon barrel north
      ctx.fillStyle='#1e293b';
      ctx.fillRect(cx-R*0.17,cy-R*0.9,R*0.34,R*0.65);
      ctx.beginPath(); ctx.arc(cx,cy-R*0.9,R*0.17,Math.PI,0); ctx.fill();
      // cannon ball
      ctx.fillStyle='#334155'; ctx.beginPath(); ctx.arc(cx,cy-R*0.15,R*0.22,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.beginPath(); ctx.arc(cx-R*0.07,cy-R*0.22,R*0.08,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#334155'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.stroke();
    });

    // Magic tower — vivid purple crystal
    mkTex(this,'tw_magic',S,S,(ctx)=>{
      const cx=S/2, cy=S/2;
      ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.arc(cx+1,cy+2,R,0,Math.PI*2); ctx.fill();
      const bg=ctx.createRadialGradient(cx-R*.3,cy-R*.3,0,cx,cy,R);
      bg.addColorStop(0,'#e879f9'); bg.addColorStop(1,'#7c3aed');
      ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();
      const ig=ctx.createRadialGradient(cx-R*.2,cy-R*.2,0,cx,cy,R*0.7);
      ig.addColorStop(0,'#f0abfc'); ig.addColorStop(1,'#a21caf');
      ctx.fillStyle=ig; ctx.beginPath(); ctx.arc(cx,cy,R*0.7,0,Math.PI*2); ctx.fill();
      // 6-pointed sparkle star
      ctx.fillStyle='#fff'; ctx.shadowColor='#f0abfc'; ctx.shadowBlur=8;
      for(let i=0;i<6;i++){
        const a=i/6*Math.PI*2-Math.PI/2;
        ctx.beginPath(); ctx.arc(cx+Math.cos(a)*R*0.42,cy+Math.sin(a)*R*0.42,3,0,Math.PI*2); ctx.fill();
      }
      ctx.beginPath(); ctx.arc(cx,cy,R*0.18,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      ctx.strokeStyle='#9333ea'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.stroke();
    });

    // Laser tower — bright Microsoft cyan
    mkTex(this,'tw_laser',S,S,(ctx)=>{
      const cx=S/2, cy=S/2;
      ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.arc(cx+1,cy+2,R,0,Math.PI*2); ctx.fill();
      const bg=ctx.createRadialGradient(cx-R*.3,cy-R*.3,0,cx,cy,R);
      bg.addColorStop(0,'#67e8f9'); bg.addColorStop(1,'#0078D4');
      ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();
      const ig=ctx.createRadialGradient(cx-R*.2,cy-R*.2,0,cx,cy,R*0.7);
      ig.addColorStop(0,'#a5f3fc'); ig.addColorStop(1,'#0ea5e9');
      ctx.fillStyle=ig; ctx.beginPath(); ctx.arc(cx,cy,R*0.7,0,Math.PI*2); ctx.fill();
      // concentric energy rings
      ctx.shadowColor='#38bdf8'; ctx.shadowBlur=6;
      [0.48,0.32,0.16].forEach((r,i)=>{
        ctx.strokeStyle=['#fff','#7dd3fc','#38bdf8'][i];
        ctx.lineWidth=i===0?1:1.5;
        ctx.beginPath(); ctx.arc(cx,cy,R*r,0,Math.PI*2); ctx.stroke();
      });
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx,cy,R*0.09,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      ctx.strokeStyle='#0078D4'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.stroke();
    });

    // ── Enemy sprites (bright cartoon, Edge Surf style) ───────────────────
    // Grunt — bright red bouncy ball enemy
    mkTex(this,'e_grunt',22,22,(ctx)=>{
      const g=ctx.createRadialGradient(8,7,2,11,11,10);
      g.addColorStop(0,'#fca5a5'); g.addColorStop(0.6,'#ef4444'); g.addColorStop(1,'#991b1b');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(11,11,10,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#fecaca'; ctx.lineWidth=1.5; ctx.stroke();
      // visor
      ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.ellipse(11,10,6,4,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.ellipse(9,9,2,1.5,0.4,0,Math.PI*2); ctx.fill();
      // angry brows
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(7,7); ctx.lineTo(10,8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(15,7); ctx.lineTo(12,8); ctx.stroke();
    });

    // Armor — silver knight with shield
    mkTex(this,'e_armor',26,26,(ctx)=>{
      const g=ctx.createRadialGradient(10,9,2,13,13,12);
      g.addColorStop(0,'#f1f5f9'); g.addColorStop(0.5,'#94a3b8'); g.addColorStop(1,'#334155');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(13,13,12,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=2; ctx.stroke();
      // shield cross
      ctx.fillStyle='rgba(255,255,255,0.45)';
      ctx.fillRect(11,6,4,14); ctx.fillRect(6,10,14,4);
      ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(13,13,6,0,Math.PI*2); ctx.stroke();
    });

    // Speeder — bright lime green dart
    mkTex(this,'e_speeder',18,18,(ctx)=>{
      const g=ctx.createRadialGradient(7,6,1,9,9,8);
      g.addColorStop(0,'#d9f99d'); g.addColorStop(0.6,'#84cc16'); g.addColorStop(1,'#3f6212');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(9,9,8,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#bef264'; ctx.lineWidth=1.5; ctx.stroke();
      // speed streaks
      ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=1.2; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(2,6); ctx.lineTo(7,7); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(1,9); ctx.lineTo(6,9); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(2,12); ctx.lineTo(7,11); ctx.stroke();
      // eyes
      ctx.fillStyle='#fde047'; ctx.beginPath(); ctx.arc(7,8,1.8,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(11,8,1.8,0,Math.PI*2); ctx.fill();
    });

    // Boss — large vibrant purple sea monster
    mkTex(this,'e_boss',40,40,(ctx)=>{
      const g=ctx.createRadialGradient(15,14,4,20,20,19);
      g.addColorStop(0,'#e879f9'); g.addColorStop(0.5,'#9333ea'); g.addColorStop(1,'#4c1d95');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(20,20,19,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#c084fc'; ctx.lineWidth=2.5; ctx.stroke();
      // aura glow
      const au=ctx.createRadialGradient(20,20,16,20,20,24);
      au.addColorStop(0,'rgba(192,132,252,0)'); au.addColorStop(1,'rgba(192,132,252,0.3)');
      ctx.fillStyle=au; ctx.beginPath(); ctx.arc(20,20,24,0,Math.PI*2); ctx.fill();
      // crown spikes
      ctx.fillStyle='#fbbf24';
      [[10,5],[16,2],[24,2],[30,5]].forEach(([x,y])=>{
        ctx.beginPath(); ctx.moveTo(x,y+6); ctx.lineTo(x+4,y+6); ctx.lineTo(x+2,y); ctx.closePath(); ctx.fill();
      });
      // eyes
      const eyeG1=ctx.createRadialGradient(14,18,1,14,18,5);
      eyeG1.addColorStop(0,'#fde047'); eyeG1.addColorStop(1,'#f59e0b');
      ctx.fillStyle=eyeG1; ctx.beginPath(); ctx.arc(14,18,5,0,Math.PI*2); ctx.fill();
      const eyeG2=ctx.createRadialGradient(26,18,1,26,18,5);
      eyeG2.addColorStop(0,'#fde047'); eyeG2.addColorStop(1,'#f59e0b');
      ctx.fillStyle=eyeG2; ctx.beginPath(); ctx.arc(26,18,5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#dc2626'; ctx.beginPath(); ctx.arc(14,18,2.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(26,18,2.5,0,Math.PI*2); ctx.fill();
      // white eye glint
      ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.beginPath(); ctx.arc(13,17,1,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(25,17,1,0,Math.PI*2); ctx.fill();
    });

    // ── Projectiles ───────────────────────────────────────────────────────
    mkTex(this,'pj_arrow',10,5,(ctx)=>{
      ctx.fillStyle='#fbbf24';
      ctx.beginPath(); ctx.moveTo(0,2.5); ctx.lineTo(8,2.5); ctx.lineTo(10,0); ctx.lineTo(10,5); ctx.lineTo(8,2.5); ctx.fill();
    });
    mkTex(this,'pj_cannon',10,10,(ctx)=>{
      const g=ctx.createRadialGradient(5,5,1,5,5,5);
      g.addColorStop(0,'#9ca3af'); g.addColorStop(1,'#111827');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(5,5,5,0,Math.PI*2); ctx.fill();
    });
    mkTex(this,'pj_magic',11,11,(ctx)=>{
      const g=ctx.createRadialGradient(5.5,5.5,1,5.5,5.5,5.5);
      g.addColorStop(0,'#ffffff'); g.addColorStop(0.4,'#c4b5fd'); g.addColorStop(1,'rgba(139,92,246,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(5.5,5.5,5.5,0,Math.PI*2); ctx.fill();
    });
    mkTex(this,'pj_laser',20,4,(ctx)=>{
      const g=ctx.createLinearGradient(0,0,20,0);
      g.addColorStop(0,'rgba(56,189,248,0)'); g.addColorStop(0.3,'#38bdf8'); g.addColorStop(1,'#fff');
      ctx.fillStyle=g; ctx.fillRect(0,1,20,2);
    });

    // Spark particle
    mkTex(this,'spark',5,5,(ctx)=>{
      ctx.fillStyle='#fef08a'; ctx.fillRect(1,1,3,3);
    });

    this.scene.start('Game');
  }
}

// ── GameScene ─────────────────────────────────────────────────────────────
class GameScene extends Phaser.Scene {
  constructor(){ super('Game'); }

  init(){
    this.gold=150; this.lives=20; this.wave=0; this.score=0;
    this.spd=1; this.waveActive=false;
    this.towerMap={}; this.enemies=[]; this.bullets=[]; this.sparks=[];
    this.spawnQueue=[]; this.spawnIdx=0; this.spawnTimer=0;
    this.hoverCell=null;
    gameScene=this; gameSpd=1;
  }

  create(){
    // ── Background: bright sky + ocean border (Edge Surf style) ─────────
    const bg=this.add.graphics().setDepth(-200);
    // sky gradient (top half)
    bg.fillGradientStyle(0x87CEEB,0x87CEEB,0xC8E8FF,0xC8E8FF,1);
    bg.fillRect(0,0,GW,GH*0.5);
    // ocean below (Microsoft blue)
    bg.fillGradientStyle(0x00B4D8,0x00B4D8,0x0078D4,0x0078D4,1);
    bg.fillRect(0,GH*0.5,GW,GH*0.5);
    // small cloud puffs in sky area
    bg.fillStyle(0xFFFFFF,0.7);
    [[80,30,40],[200,20,28],[360,35,36],[520,18,24],[680,28,32]].forEach(([x,y,r])=>{
      bg.fillCircle(x,y,r); bg.fillCircle(x+r*0.6,y-r*0.3,r*0.7); bg.fillCircle(x-r*0.55,y-r*0.2,r*0.65);
    });
    // distant green hills on horizon
    bg.fillStyle(0x4ade80,0.55);
    bg.fillTriangle(0,GH*0.5,120,GH*0.28,240,GH*0.5);
    bg.fillTriangle(180,GH*0.5,320,GH*0.22,460,GH*0.5);
    bg.fillTriangle(400,GH*0.5,560,GH*0.26,700,GH*0.5);
    bg.fillStyle(0x22c55e,0.45);
    bg.fillTriangle(80,GH*0.5,200,GH*0.32,310,GH*0.5);
    bg.fillTriangle(480,GH*0.5,620,GH*0.24,GW,GH*0.5);

    // ── Build tile map ───────────────────────────────────────────────────
    this.tiles={};
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const k=`${c},${r}`;
        let tx='t_grass';
        if(c===PATH[0][0]&&r===PATH[0][1]) tx='t_start';
        else if(c===PATH[PATH.length-1][0]&&r===PATH[PATH.length-1][1]) tx='t_end';
        else if(PATH_SET.has(k)) tx='t_path';
        const p=tilePos(c,r);
        this.tiles[k]=this.add.image(p.x,p.y,tx).setOrigin(0.5,0.5).setDepth(0);
      }
    }

    // Range preview + hover highlight graphics
    this.rangeGfx=this.add.graphics().setDepth(500);
    this.hoverSpr=this.add.image(0,0,'t_hover')
      .setOrigin(0.5,0.5).setDepth(400).setAlpha(0.85).setVisible(false);

    // Input
    this.input.on('pointermove',ptr=>{ this.hoverCell=this.pick(ptr.x,ptr.y); this.doHover(); });
    this.input.on('pointerdown',ptr=>{ this.handleClick(ptr.x,ptr.y); });

    this.emitHUD();
  }

  pick(px,py){
    const c=Math.floor(px/TS), r=Math.floor(py/TS);
    if(c<0||c>=COLS||r<0||r>=ROWS) return null;
    return {c,r,k:`${c},${r}`};
  }

  doHover(){
    this.rangeGfx.clear();
    if(!this.hoverCell){ this.hoverSpr.setVisible(false); return; }
    const {c,r,k}=this.hoverCell;
    const p=tilePos(c,r);
    const tw=this.towerMap[k];
    if(tw){
      this.drawRange(p.x,p.y,tw.td.range,TOWERS[tw.type].color,0.12);
      this.hoverSpr.setVisible(false);
    } else if(!PATH_SET.has(k)&&selType){
      this.hoverSpr.setPosition(p.x,p.y).setVisible(true);
      const ok=this.gold>=TOWERS[selType].cost;
      this.hoverSpr.setTint(ok?0xffffff:0xff5555);
      this.drawRange(p.x,p.y,TOWERS[selType].range,TOWERS[selType].color,0.1);
    } else {
      this.hoverSpr.setVisible(false);
    }
  }

  drawRange(cx,cy,r,col,a){
    this.rangeGfx.lineStyle(1.5,col,a*4);
    this.rangeGfx.strokeCircle(cx,cy,r);
    this.rangeGfx.fillStyle(col,a);
    this.rangeGfx.fillCircle(cx,cy,r);
  }

  handleClick(px,py){
    if(!selType) return;
    const cell=this.pick(px,py); if(!cell) return;
    const {c,r,k}=cell;
    if(PATH_SET.has(k)){ hint('Cannot build on path'); return; }
    if(this.towerMap[k]){ hint('Tile occupied'); return; }
    const td=TOWERS[selType];
    if(this.gold<td.cost){ hint('Not enough gold!'); return; }
    this.gold-=td.cost;
    this.placeTower(c,r,selType);
    selType=null;
    document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('sel'));
    hint('Placed! Select next tower');
    this.emitHUD();
  }

  placeTower(c,r,type){
    const p=tilePos(c,r);
    const td=TOWERS[type];
    const glow=this.add.graphics().setDepth(10);
    glow.fillStyle(td.color,0.15); glow.fillCircle(p.x,p.y,TS*0.5);
    const projKeys={arrow:'pj_arrow',cannon:'pj_cannon',magic:'pj_magic',laser:'pj_laser'};
    const sp=this.add.image(p.x,p.y,`tw_${type}`).setOrigin(0.5,0.5).setDepth(20);
    this.towerMap[`${c},${r}`]={c,r,type,td,sx:p.x,sy:p.y,sp,glow,cd:0,projKey:projKeys[type]};
  }

  startWave(){
    if(this.waveActive||this.wave>=10) return;
    this.wave++;
    this.waveActive=true;
    this.spawnQueue=[];
    for(const grp of WAVES[this.wave-1])
      for(let i=0;i<grp.n;i++) this.spawnQueue.push({t:grp.t,delay:grp.iv});
    this.spawnIdx=0; this.spawnTimer=0;
    this.emitHUD();
  }

  spawnEnemy(type){
    const ed=ENEMIES[type];
    const [sc,sr]=PATH[0]; const p=tilePos(sc,sr);
    const s=this.add.image(p.x,p.y,`e_${type}`).setOrigin(0.5,0.5).setDepth(100).setScale(ed.sz);
    const hpBg=this.add.graphics().setDepth(101);
    const hpFg=this.add.graphics().setDepth(102);
    const mult=1+(this.wave-1)*0.12;
    this.enemies.push({type,ed,hp:ed.hp*mult,maxHp:ed.hp*mult,
      pathIdx:0,progress:0,sprite:s,bg:hpBg,fg:hpFg,alive:true});
  }

  fireBullet(tw,tgt){
    const s=this.add.image(tw.sx,tw.sy,tw.projKey).setDepth(200);
    const a=Math.atan2(tgt.sprite.y-s.y,tgt.sprite.x-s.x);
    s.setRotation(a);
    const dmg=tw.td.dmg+this.wave*2;
    this.bullets.push({s,tgt,spd:320,dmg,splash:tw.td.splash,type:tw.type,alive:true});
  }

  spawnSparks(x,y,col,n=8){
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, sp=40+Math.random()*60;
      const s=this.add.image(x,y,'spark').setDepth(300).setTint(col);
      const lf=0.35+Math.random()*0.4;
      this.sparks.push({s,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:lf,max:lf,alive:true});
    }
  }

  floatTxt(x,y,txt,col){
    const t=this.add.text(x,y,txt,{fontFamily:'monospace',fontSize:'11px',
      color:col,stroke:'#000',strokeThickness:2}).setDepth(400).setOrigin(0.5);
    this.tweens.add({targets:t,y:y-30,alpha:0,duration:900,ease:'Power2',onComplete:()=>t.destroy()});
  }

  update(_t,delta){
    const dt=(delta/1000)*this.spd;

    // ── Spawn ──────────────────────────────────────────────────────────
    if(this.waveActive&&this.spawnIdx<this.spawnQueue.length){
      this.spawnTimer-=delta*this.spd;
      if(this.spawnTimer<=0){
        const e=this.spawnQueue[this.spawnIdx];
        this.spawnEnemy(e.t); this.spawnIdx++;
        this.spawnTimer=e.delay||0;
      }
    }

    // ── Move enemies ───────────────────────────────────────────────────
    for(const en of this.enemies){
      if(!en.alive) continue;
      const ni=en.pathIdx+1;
      if(ni>=PATH.length){
        this.lives=Math.max(0,this.lives-1);
        this.floatTxt(GW/2,GH/2-30,'−1 Life!','#ef4444');
        en.alive=false; en.sprite.destroy(); en.bg.destroy(); en.fg.destroy();
        if(this.lives<=0) this.endGame(false);
        continue;
      }
      const [fc,fr]=PATH[en.pathIdx],[tc,tr]=PATH[ni];
      const fp=tilePos(fc,fr), tp=tilePos(tc,tr);
      const dist=Math.hypot(tp.x-fp.x,tp.y-fp.y)||1;
      en.progress+=(en.ed.spd*dt)/dist;
      if(en.progress>=1){ en.progress-=1; en.pathIdx++; }
      const t=en.progress;
      const ex=fp.x+(tp.x-fp.x)*t, ey=fp.y+(tp.y-fp.y)*t;
      en.sprite.setPosition(ex,ey);

      // rotate toward direction of travel
      const dx2=tp.x-fp.x, dy2=tp.y-fp.y;
      if(dx2!==0||dy2!==0) en.sprite.setRotation(Math.atan2(dy2,dx2)+Math.PI/2);

      // HP bar above enemy
      const bw=22*en.ed.sz, bx=ex-bw/2, by2=ey-16*en.ed.sz;
      const pct=Math.max(0,en.hp/en.maxHp);
      const hc=pct>0.6?0x22c55e:(pct>0.3?0xf59e0b:0xef4444);
      en.bg.clear().fillStyle(0x000000,0.7).fillRect(bx-1,by2-1,bw+2,5);
      en.fg.clear().fillStyle(hc,1).fillRect(bx,by2,bw*pct,3);
    }

    // ── Tower AI ───────────────────────────────────────────────────────
    const live=this.enemies.filter(e=>e.alive);
    for(const tw of Object.values(this.towerMap)){
      if(tw.cd>0){ tw.cd-=dt*60; continue; }
      const inR=live
        .filter(e=>{ const dx=e.sprite.x-tw.sx,dy=e.sprite.y-tw.sy; return Math.hypot(dx,dy)<=tw.td.range; })
        .sort((a,b)=>(b.pathIdx+b.progress)-(a.pathIdx+a.progress));
      if(!inR.length) continue;
      // rotate tower sprite toward target
      const tgt0=inR[0];
      tw.sp.setRotation(Math.atan2(tgt0.sprite.y-tw.sy,tgt0.sprite.x-tw.sx)+Math.PI/2);
      const targets=tw.td.multi>1?inR.slice(0,tw.td.multi):[inR[0]];
      targets.forEach(t=>this.fireBullet(tw,t));
      tw.cd=tw.td.cd;
    }

    // ── Move bullets ───────────────────────────────────────────────────
    for(const b of this.bullets){
      if(!b.alive) continue;
      if(!b.tgt.alive){ b.alive=false; b.s.destroy(); continue; }
      const tx=b.tgt.sprite.x, ty=b.tgt.sprite.y;
      const a=Math.atan2(ty-b.s.y,tx-b.s.x);
      b.s.setRotation(a); b.s.x+=Math.cos(a)*b.spd*dt; b.s.y+=Math.sin(a)*b.spd*dt;
      if(Math.hypot(tx-b.s.x,ty-b.s.y)<12){
        b.alive=false; b.s.destroy();
        this.hitEnemy(b.tgt,b.dmg,b.splash);
        this.spawnSparks(tx,ty,TOWERS[b.type].pclr,6);
      }
    }

    // ── Sparks ────────────────────────────────────────────────────────
    for(const p of this.sparks){
      if(!p.alive) continue;
      p.life-=dt; if(p.life<=0){ p.alive=false; p.s.destroy(); continue; }
      p.s.x+=p.vx*dt; p.s.y+=p.vy*dt;
      const f=p.life/p.max; p.s.setAlpha(f).setScale(f*1.1);
    }

    // ── Cleanup ────────────────────────────────────────────────────────
    this.enemies=this.enemies.filter(e=>e.alive);
    this.bullets=this.bullets.filter(b=>b.alive);
    this.sparks=this.sparks.filter(p=>p.alive);

    // ── Wave end check ─────────────────────────────────────────────────
    if(this.waveActive&&this.spawnIdx>=this.spawnQueue.length&&this.enemies.length===0){
      this.waveActive=false;
      if(this.wave>=10){ this.endGame(true); }
      else{
        const bonus=20+this.wave*6;
        this.gold+=bonus;
        this.floatTxt(GW/2,GH/2-55,`+${bonus} Wave Bonus!`,'#fbbf24');
      }
    }

    this.emitHUD();
    this.doHover();
  }

  hitEnemy(en,dmg,splash){
    if(!en.alive) return;
    en.hp-=dmg;
    this.floatTxt(en.sprite.x,en.sprite.y-18,`-${dmg}`,'#fef08a');
    if(en.hp<=0) this.killEnemy(en);
    if(splash>0){
      for(const o of this.enemies){
        if(!o.alive||o===en) continue;
        if(Math.hypot(o.sprite.x-en.sprite.x,o.sprite.y-en.sprite.y)<=splash){
          o.hp-=dmg*0.5; if(o.hp<=0) this.killEnemy(o);
        }
      }
    }
  }

  killEnemy(en){
    if(!en.alive) return;
    en.alive=false;
    this.score+=en.ed.reward; this.gold+=en.ed.reward;
    this.spawnSparks(en.sprite.x,en.sprite.y,en.ed.color,14);
    this.floatTxt(en.sprite.x,en.sprite.y-28,`+${en.ed.reward}g`,'#22c55e');
    en.sprite.destroy(); en.bg.destroy(); en.fg.destroy();
  }

  endGame(won){
    this.waveActive=false;
    document.getElementById('ov-title').textContent=won?'🏆 VICTORY!':'💀 GAME OVER';
    document.getElementById('ov-title').style.color=won?'#fbbf24':'#ef4444';
    document.getElementById('ov-sub').textContent=won?'Enemy forces defeated!':'All lives lost';
    document.getElementById('ov-pts').textContent=`Score: ${this.score}`;
    document.getElementById('ov').classList.add('on');
    this.emitHUD();
  }

  emitHUD(){
    hudRefresh({gold:this.gold,lives:this.lives,wave:this.wave,
      score:this.score,waveActive:this.waveActive});
  }
}

// ── Launch Phaser ─────────────────────────────────────────────────────────
const game=new Phaser.Game({
  type:Phaser.AUTO,

  parent:'cvs-wrap',
  scene:[BootScene,GameScene],
  scale:{ mode:Phaser.Scale.FIT, autoCenter:Phaser.Scale.CENTER_BOTH },
  render:{ antialias:true, roundPixels:true },
});
