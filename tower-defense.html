<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tower Defense</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;user-select:none}
#wrap{display:flex;width:100vw;height:100vh;align-items:stretch}
#canvas-area{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#0f1a2e}
canvas{display:block}
#ui{width:220px;background:linear-gradient(180deg,#0c2340 0%,#0a1628 100%);border-left:2px solid #1e3a5f;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:linear-gradient(90deg,#0078D4,#00A8E8);padding:10px 12px;display:flex;align-items:center;gap:8px}
#topbar h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:.5px}
#stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px}
.stat{background:#0d2a4a;border:1px solid #1e4060;border-radius:6px;padding:6px 8px;text-align:center}
.stat-val{font-size:18px;font-weight:700;color:#60cdff}
.stat-lbl{font-size:9px;color:#6bb3d4;text-transform:uppercase;letter-spacing:.5px}
.stat.gold .stat-val{color:#fbbf24}
.stat.lives .stat-val{color:#f87171}
.stat.wave .stat-val{color:#a78bfa}
.stat.score .stat-val{color:#34d399}
#tower-panel{padding:0 8px 6px;flex-shrink:0}
#tower-panel h3{font-size:10px;color:#4a9abb;text-transform:uppercase;letter-spacing:1px;margin:8px 2px 4px;border-bottom:1px solid #1e3a5f;padding-bottom:4px}
.tower-btn{display:flex;align-items:center;gap:8px;background:#0d2a4a;border:1px solid #1e4060;border-radius:6px;padding:6px 8px;cursor:pointer;margin-bottom:4px;transition:all .15s;width:100%}
.tower-btn:hover{background:#122f52;border-color:#0078D4;transform:translateX(2px)}
.tower-btn.selected{background:#0a3a6a;border-color:#0078D4;box-shadow:0 0 0 1px #0078D4}
.tower-btn.disabled{opacity:.4;cursor:not-allowed}
.tower-icon{width:28px;height:28px;border-radius:50%;flex-shrink:0}
.tower-info{flex:1;text-align:left}
.tower-name{font-size:11px;font-weight:600;color:#e2e8f0;line-height:1.2}
.tower-cost{font-size:10px;color:#fbbf24}
.tower-desc{font-size:9px;color:#64748b;margin-top:1px}
#info-panel{flex:1;background:#08192d;border-top:1px solid #1e3a5f;padding:10px;overflow-y:auto;min-height:0}
#info-panel h3{font-size:10px;color:#4a9abb;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
#info-content{font-size:11px;color:#94a3b8;line-height:1.6}
#info-content .info-name{font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:4px}
#info-content .info-stat{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #0d2a4a}
#info-content .info-stat span:last-child{color:#60cdff}
.btn-row{display:flex;gap:4px;margin-top:8px}
.action-btn{flex:1;padding:5px;font-size:10px;font-weight:600;border:1px solid;border-radius:4px;cursor:pointer;transition:all .15s}
.btn-upgrade{background:#1a3a00;border-color:#22c55e;color:#4ade80}
.btn-upgrade:hover:not(:disabled){background:#22c55e;color:#000}
.btn-upgrade:disabled{opacity:.4;cursor:not-allowed}
.btn-sell{background:#3a0000;border-color:#ef4444;color:#f87171}
.btn-sell:hover{background:#ef4444;color:#fff}
.btn-target{background:#1a1a3a;border-color:#6366f1;color:#a5b4fc}
.btn-target:hover{background:#6366f1;color:#fff}
#speed-row{display:flex;gap:4px;padding:0 8px 6px}
.speed-btn{flex:1;background:#0d2a4a;border:1px solid #1e4060;border-radius:4px;color:#94a3b8;font-size:10px;padding:4px;cursor:pointer}
.speed-btn.active{background:#0078D4;color:#fff;border-color:#0078D4}
#wave-btn{width:calc(100% - 16px);margin:4px 8px;padding:9px;font-size:13px;font-weight:700;background:linear-gradient(135deg,#005a9e,#0078D4);border:1px solid #60cdff;border-radius:8px;color:#fff;cursor:pointer;transition:all .2s}
#wave-btn:hover:not(:disabled){background:linear-gradient(135deg,#0078D4,#00A8E8);box-shadow:0 0 12px rgba(0,168,232,.4)}
#wave-btn:disabled{opacity:.5;cursor:not-allowed}
#msg{text-align:center;padding:3px 8px;font-size:10px;color:#fbbf24;min-height:18px}
</style>
</head>
<body>
<div id="wrap">
  <div id="canvas-area"><canvas id="gc"></canvas></div>
  <div id="ui">
    <div id="topbar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
      <h1>Tower Defense</h1>
    </div>
    <div id="stats">
      <div class="stat gold"><div class="stat-val" id="s-gold">150</div><div class="stat-lbl">Gold</div></div>
      <div class="stat lives"><div class="stat-val" id="s-lives">20</div><div class="stat-lbl">Lives</div></div>
      <div class="stat wave"><div class="stat-val" id="s-wave">0/20</div><div class="stat-lbl">Wave</div></div>
      <div class="stat score"><div class="stat-val" id="s-score">0</div><div class="stat-lbl">Score</div></div>
    </div>
    <div id="tower-panel">
      <h3>Place Towers</h3>
      <button class="tower-btn" data-type="archer" onclick="selectTower('archer')">
        <canvas class="tower-icon" id="icon-archer"></canvas>
        <div class="tower-info"><div class="tower-name">Archer</div><div class="tower-cost">75g · Multi-shot</div><div class="tower-desc">Fast attack, hits many</div></div>
      </button>
      <button class="tower-btn" data-type="cannon" onclick="selectTower('cannon')">
        <canvas class="tower-icon" id="icon-cannon"></canvas>
        <div class="tower-info"><div class="tower-name">Cannon</div><div class="tower-cost">130g · Splash</div><div class="tower-desc">Explosive area damage</div></div>
      </button>
      <button class="tower-btn" data-type="sniper" onclick="selectTower('sniper')">
        <canvas class="tower-icon" id="icon-sniper"></canvas>
        <div class="tower-info"><div class="tower-name">Sniper</div><div class="tower-cost">175g · Pierce</div><div class="tower-desc">Long range, ignores armor</div></div>
      </button>
      <button class="tower-btn" data-type="frost" onclick="selectTower('frost')">
        <canvas class="tower-icon" id="icon-frost"></canvas>
        <div class="tower-info"><div class="tower-name">Frost</div><div class="tower-cost">150g · Slow</div><div class="tower-desc">Freezes enemies</div></div>
      </button>
      <button class="tower-btn" data-type="tesla" onclick="selectTower('tesla')">
        <canvas class="tower-icon" id="icon-tesla"></canvas>
        <div class="tower-info"><div class="tower-name">Tesla</div><div class="tower-cost">250g · Chain</div><div class="tower-desc">Lightning jumps enemies</div></div>
      </button>
    </div>
    <div id="speed-row">
      <button class="speed-btn active" onclick="setSpeed(1)">1×</button>
      <button class="speed-btn" onclick="setSpeed(2)">2×</button>
      <button class="speed-btn" onclick="setSpeed(3)">3×</button>
    </div>
    <button id="wave-btn" onclick="startWave()">&#9654; Start Wave 1</button>
    <div id="msg"></div>
    <div id="info-panel">
      <h3>Tower Info</h3>
      <div id="info-content"><span style="color:#4a5568">Select a tower type and click a grass tile to place. Click a placed tower to upgrade or sell.</span></div>
    </div>
  </div>
</div>
<script>
'use strict';
const COLS=22,ROWS=14,TS=46;
const GW=COLS*TS,GH=ROWS*TS;
const TOTAL_WAVES=20;

const WAYPOINTS=[
  [0,3],[3,3],[3,1],[9,1],[9,4],[6,4],[6,8],[10,8],[10,5],[14,5],[14,11],[18,11],[18,7],[21,7]
];

const TTYPES={
  archer:{cost:75,name:'Archer',color:'#f59e0b',
    lv:[{dmg:18,range:130,cd:.70,multi:1,splash:0,pen:false,slow:0},
        {dmg:28,range:145,cd:.60,multi:2,splash:0,pen:false,slow:0},
        {dmg:42,range:165,cd:.50,multi:3,splash:0,pen:false,slow:0}]},
  cannon:{cost:130,name:'Cannon',color:'#64748b',
    lv:[{dmg:60,range:108,cd:2.2,multi:1,splash:44,pen:false,slow:0},
        {dmg:90,range:118,cd:1.9,multi:1,splash:58,pen:false,slow:0},
        {dmg:135,range:130,cd:1.6,multi:1,splash:72,pen:false,slow:0}]},
  sniper:{cost:175,name:'Sniper',color:'#0ea5e9',
    lv:[{dmg:95,range:255,cd:2.8,multi:1,splash:0,pen:true,slow:0},
        {dmg:155,range:285,cd:2.4,multi:1,splash:0,pen:true,slow:0},
        {dmg:240,range:325,cd:2.0,multi:1,splash:0,pen:true,slow:.15}]},
  frost:{cost:150,name:'Frost',color:'#38bdf8',
    lv:[{dmg:8,range:118,cd:.65,multi:1,splash:62,pen:false,slow:.45},
        {dmg:12,range:132,cd:.58,multi:1,splash:76,pen:false,slow:.55},
        {dmg:18,range:148,cd:.50,multi:1,splash:90,pen:false,slow:.65}]},
  tesla:{cost:250,name:'Tesla',color:'#a855f7',
    lv:[{dmg:32,range:132,cd:1.1,multi:4,splash:0,pen:false,slow:0,chain:true},
        {dmg:52,range:148,cd:.95,multi:5,splash:0,pen:false,slow:0,chain:true},
        {dmg:78,range:168,cd:.80,multi:6,splash:0,pen:false,slow:.2,chain:true}]}
};
const UPG_MUL=[0,.8,1.4];

const ETYPES={
  grunt:  {hp:80,  spd:72, reward:10,armor:0,   col:'#ef4444',r:8, name:'Grunt'},
  warrior:{hp:240, spd:52, reward:20,armor:.15,  col:'#f97316',r:10,name:'Warrior'},
  speeder:{hp:50,  spd:165,reward:12,armor:0,    col:'#a3e635',r:7, name:'Speeder'},
  tank:   {hp:750, spd:35, reward:55,armor:.38,  col:'#94a3b8',r:14,name:'Tank'},
  healer: {hp:160, spd:60, reward:35,armor:0,    col:'#4ade80',r:9, name:'Healer',heals:true},
  boss:   {hp:2800,spd:30, reward:200,armor:.45, col:'#9333ea',r:20,name:'BOSS'}
};

const WAVES=[
  [{t:'grunt',n:8}],
  [{t:'grunt',n:10},{t:'speeder',n:3}],
  [{t:'grunt',n:8},{t:'warrior',n:4}],
  [{t:'speeder',n:12},{t:'grunt',n:6}],
  [{t:'warrior',n:6},{t:'grunt',n:10},{t:'speeder',n:5}],
  [{t:'tank',n:2},{t:'grunt',n:15}],
  [{t:'warrior',n:8},{t:'speeder',n:10},{t:'grunt',n:8}],
  [{t:'healer',n:4},{t:'warrior',n:6},{t:'grunt',n:12}],
  [{t:'tank',n:4},{t:'speeder',n:12},{t:'warrior',n:6}],
  [{t:'grunt',n:20},{t:'warrior',n:8},{t:'tank',n:3},{t:'healer',n:3}],
  [{t:'boss',n:1},{t:'grunt',n:15}],
  [{t:'tank',n:6},{t:'healer',n:5},{t:'speeder',n:15}],
  [{t:'warrior',n:12},{t:'tank',n:5},{t:'boss',n:1}],
  [{t:'speeder',n:20},{t:'healer',n:8},{t:'tank',n:6}],
  [{t:'boss',n:2},{t:'warrior',n:10},{t:'healer',n:6}],
  [{t:'boss',n:2},{t:'tank',n:8},{t:'healer',n:8}],
  [{t:'grunt',n:30},{t:'speeder',n:20},{t:'boss',n:2}],
  [{t:'tank',n:10},{t:'boss',n:3},{t:'healer',n:10}],
  [{t:'warrior',n:20},{t:'speeder',n:25},{t:'boss',n:3},{t:'tank',n:8}],
  [{t:'boss',n:5},{t:'tank',n:12},{t:'healer',n:12},{t:'warrior',n:15}]
];

// ─── PATH ────────────────────────────────────────────────────────────────────
function buildPath(){
  const pts=[];
  for(let i=0;i<WAYPOINTS.length-1;i++){
    const [c0,r0]=WAYPOINTS[i],[c1,r1]=WAYPOINTS[i+1];
    const x0=c0*TS+TS/2,y0=r0*TS+TS/2,x1=c1*TS+TS/2,y1=r1*TS+TS/2;
    const dx=x1-x0,dy=y1-y0,steps=Math.ceil(Math.hypot(dx,dy)/4);
    for(let s=(i===0?0:1);s<=steps;s++) pts.push({x:x0+dx*s/steps,y:y0+dy*s/steps});
  }
  return pts;
}
const PATH_PTS=buildPath();

const pathCells=new Set();
for(let i=0;i<WAYPOINTS.length-1;i++){
  const [c0,r0]=WAYPOINTS[i],[c1,r1]=WAYPOINTS[i+1];
  const dc=Math.sign(c1-c0),dr=Math.sign(r1-r0);
  let c=c0,r=r0;pathCells.add(c+','+r);
  while(c!==c1||r!==r1){c+=dc;r+=dr;pathCells.add(c+','+r);}
}
function isPath(c,r){return pathCells.has(c+','+r);}
function isOob(c,r){return c<0||r<0||c>=COLS||r>=ROWS;}

// ─── CANVAS ──────────────────────────────────────────────────────────────────
const cv=document.getElementById('gc');
const ctx=cv.getContext('2d');
function resize(){
  const a=document.getElementById('canvas-area'),sc=Math.min(a.clientWidth/GW,a.clientHeight/GH);
  cv.style.width=(GW*sc)+'px';cv.style.height=(GH*sc)+'px';cv.width=GW;cv.height=GH;
}
window.addEventListener('resize',resize);resize();

// ─── STATE ───────────────────────────────────────────────────────────────────
let gold=150,lives=20,score=0,wave=0,gameSpeed=1;
let gameState='prep',selectedType=null,selectedTower=null,hoverCell=null,placementValid=false;
const towers=[],enemies=[],projectiles=[],particles=[],floats=[],shockwaves=[];
let waveQueue=[],spawnTimer=0,spawnDelay=.55,waveActive=false,waveEnemySpawned=0,overlayMsg=null;
let eid=0,tid=0;

// ─── UTILS ───────────────────────────────────────────────────────────────────
function lerp(a,b,t){return a+(b-a)*Math.min(1,t);}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function lighten(h,a){
  const n=parseInt(h.replace('#',''),16);
  return 'rgb('+clamp((n>>16&255)+a*255|0,0,255)+','+clamp((n>>8&255)+a*255|0,0,255)+','+clamp((n&255)+a*255|0,0,255)+')';
}
function darken(h,a){return lighten(h,-a);}

// ─── BACKGROUND ──────────────────────────────────────────────────────────────
let bgc=null;
function buildBg(){
  bgc=document.createElement('canvas');bgc.width=GW;bgc.height=GH;
  const bx=bgc.getContext('2d');
  const sky=bx.createLinearGradient(0,0,0,GH);
  sky.addColorStop(0,'#87CEEB');sky.addColorStop(.35,'#C8E8FF');sky.addColorStop(1,'#a8d85a');
  bx.fillStyle=sky;bx.fillRect(0,0,GW,GH);
  bx.fillStyle='rgba(255,255,255,.72)';
  [[90,25,42],[250,18,32],[430,30,50],[620,14,28],[800,26,44],[1000,20,36]].forEach(function(cl){
    var cx=cl[0],cy=cl[1],cr=cl[2];
    [[0,0,1],[-.5,.3,.7],[.5,.3,.7]].forEach(function(d){bx.beginPath();bx.arc(cx+d[0]*cr,cy+d[1]*cr,cr*d[2],0,Math.PI*2);bx.fill();});
  });
  for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){
    if(isPath(c,r))continue;
    var tx=c*TS,ty=r*TS;
    var g=bx.createLinearGradient(tx,ty,tx,ty+TS);g.addColorStop(0,'#4ade80');g.addColorStop(1,'#22c55e');
    bx.fillStyle=g;bx.fillRect(tx,ty,TS,TS);
    bx.strokeStyle='rgba(0,0,0,.06)';bx.lineWidth=1;bx.strokeRect(tx+.5,ty+.5,TS-1,TS-1);
  }
  for(var r2=0;r2<ROWS;r2++)for(var c2=0;c2<COLS;c2++){
    if(!isPath(c2,r2))continue;
    var tx2=c2*TS,ty2=r2*TS;
    var gp=bx.createLinearGradient(tx2,ty2,tx2,ty2+TS);gp.addColorStop(0,'#fde68a');gp.addColorStop(1,'#f59e0b');
    bx.fillStyle=gp;bx.fillRect(tx2,ty2,TS,TS);
    bx.strokeStyle='rgba(160,110,0,.2)';bx.lineWidth=1;bx.strokeRect(tx2+.5,ty2+.5,TS-1,TS-1);
  }
  bx.setLineDash([7,5]);bx.strokeStyle='rgba(160,100,0,.3)';bx.lineWidth=2;
  bx.beginPath();PATH_PTS.forEach(function(p,i){i?bx.lineTo(p.x,p.y):bx.moveTo(p.x,p.y);});bx.stroke();bx.setLineDash([]);
  var s=WAYPOINTS[0],e=WAYPOINTS[WAYPOINTS.length-1];
  drawMarker(bx,s[0]*TS+TS/2,s[1]*TS+TS/2,'#22c55e','▶');
  drawMarker(bx,e[0]*TS+TS/2,e[1]*TS+TS/2,'#ef4444','⚑');
}
function drawMarker(bx,x,y,col,icon){
  bx.beginPath();bx.arc(x,y,TS*.35,0,Math.PI*2);bx.fillStyle=col+'cc';bx.fill();
  bx.strokeStyle='#fff';bx.lineWidth=2;bx.stroke();
  bx.fillStyle='#fff';bx.font='bold 14px sans-serif';bx.textAlign='center';bx.textBaseline='middle';bx.fillText(icon,x,y);
}
buildBg();

// ─── ENEMY ───────────────────────────────────────────────────────────────────
function Enemy(type,wv){
  var et=ETYPES[type],ws=1+(wv-1)*.12,ss=1+(wv-1)*.03;
  this.id=eid++;this.type=type;this.name=et.name;
  this.maxHp=Math.ceil(et.hp*ws);this.hp=this.maxHp;
  this.spd=et.spd*ss;this.armor=et.armor;this.reward=et.reward;
  this.col=et.col;this.r=et.r;this.heals=!!et.heals;
  this.slow=0;this.slowTimer=0;this.healTimer=0;
  this.pathIdx=0;this.dead=false;this.reached=false;
  this.x=PATH_PTS[0].x;this.y=PATH_PTS[0].y;this.angle=0;
}
Enemy.prototype.update=function(dt){
  if(this.dead||this.reached)return;
  if(this.slowTimer>0){this.slowTimer-=dt;if(this.slowTimer<=0)this.slow=0;}
  if(this.heals){
    this.healTimer-=dt;
    if(this.healTimer<=0){
      this.healTimer=1.5;
      enemies.forEach(function(e){
        if(e!==this&&!e.dead&&Math.hypot(e.x-this.x,e.y-this.y)<90){
          var h=this.maxHp*.06;e.hp=Math.min(e.maxHp,e.hp+h);
          floats.push(new FloatNum('+'+Math.ceil(h),e.x,e.y-e.r-4,'#4ade80'));
        }
      }.bind(this));
    }
  }
  var spd2=this.spd*(1-this.slow)*dt;
  var rem=spd2;
  while(rem>0&&this.pathIdx<PATH_PTS.length-1){
    var t=PATH_PTS[this.pathIdx+1],dx=t.x-this.x,dy=t.y-this.y,d=Math.hypot(dx,dy);
    if(d<=rem){this.x=t.x;this.y=t.y;this.pathIdx++;rem-=d;}
    else{this.x+=dx/d*rem;this.y+=dy/d*rem;this.angle=Math.atan2(dy,dx);rem=0;}
  }
  if(this.pathIdx>=PATH_PTS.length-1){
    this.reached=true;lives=Math.max(0,lives-1);spawnBurst(this.x,this.y,'#ef4444',6);updateHUD();
    if(lives<=0)triggerGameOver();
  }
};
Enemy.prototype.damage=function(dmg){
  var eff=dmg*(1-this.armor);this.hp-=eff;if(this.hp<=0&&!this.dead)this.kill();return eff;
};
Enemy.prototype.kill=function(){
  this.dead=true;gold+=this.reward;score+=this.reward*10;
  spawnBurst(this.x,this.y,this.col,10);
  floats.push(new FloatNum('+'+this.reward+'g',this.x,this.y-this.r-6,'#fbbf24'));updateHUD();
};
Enemy.prototype.draw=function(){
  var x=this.x,y=this.y,r=this.r;
  ctx.save();ctx.translate(x,y);
  if(this.slowTimer>0){ctx.shadowColor='#38bdf8';ctx.shadowBlur=12;}
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);
  var g=ctx.createRadialGradient(-r*.3,-r*.3,0,0,0,r);
  g.addColorStop(0,lighten(this.col,.3));g.addColorStop(1,this.col);
  ctx.fillStyle=g;ctx.fill();ctx.strokeStyle=darken(this.col,.25);ctx.lineWidth=1.5;ctx.stroke();
  if(this.type==='boss'){
    ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;
    for(var i=0;i<5;i++){var a=-Math.PI/2+i*Math.PI*.4,R=r+6,ri=r+2;
      ctx.beginPath();ctx.moveTo(Math.cos(a)*ri,Math.sin(a)*ri);
      ctx.lineTo(Math.cos(a+.2)*R,Math.sin(a+.2)*R);ctx.lineTo(Math.cos(a+.4)*ri,Math.sin(a+.4)*ri);ctx.stroke();}
  }
  if(this.type==='healer'){
    ctx.fillStyle='rgba(255,255,255,.8)';ctx.fillRect(-1.5,-r*.65,3,r*.55);ctx.fillRect(-r*.65,-1.5,r*.55,3);
  }
  if(this.armor>.1){ctx.font=r*.7+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🛡',0,r*.1);}
  ctx.restore();
  var bw=r*2.2,bh=4,bx2=x-bw/2,by2=y-r-8;
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(bx2-1,by2-1,bw+2,bh+2);
  ctx.fillStyle='#1f2937';ctx.fillRect(bx2,by2,bw,bh);
  var pct=Math.max(0,this.hp/this.maxHp);
  ctx.fillStyle=pct>.5?'#22c55e':pct>.25?'#fbbf24':'#ef4444';ctx.fillRect(bx2,by2,bw*pct,bh);
};

// ─── TOWER ───────────────────────────────────────────────────────────────────
function Tower(type,col,row){
  this.id=tid++;this.type=type;this.col=col;this.row=row;
  this.x=col*TS+TS/2;this.y=row*TS+TS/2;
  var td=TTYPES[type];this.level=0;this.name=td.name;this.color=td.color;
  this.cost=td.cost;this.sellValue=Math.ceil(td.cost*.7);this.totalUpgCost=0;
  this.mode='first';this.cdTimer=0;this.angle=0;this.shootFx=0;
}
Object.defineProperty(Tower.prototype,'lv',{get:function(){return TTYPES[this.type].lv[this.level];}});
Tower.prototype.upgrade=function(){
  if(this.level>=2)return false;
  var c=Math.ceil(TTYPES[this.type].cost*UPG_MUL[this.level+1]);if(gold<c)return false;
  gold-=c;this.totalUpgCost+=c;this.sellValue=Math.ceil((this.cost+this.totalUpgCost)*.7);
  this.level++;score+=50;updateHUD();return true;
};
Tower.prototype.sell=function(){gold+=this.sellValue;spawnBurst(this.x,this.y,this.color,8);updateHUD();};
Tower.prototype.cycleMode=function(){var m=['first','last','strong','weak'];this.mode=m[(m.indexOf(this.mode)+1)%4];};
Tower.prototype.findTarget=function(){
  var range=this.lv.range,best=null,bv=-Infinity,mode=this.mode,tx=this.x,ty=this.y;
  enemies.forEach(function(e){
    if(e.dead||e.reached)return;if(Math.hypot(e.x-tx,e.y-ty)>range)return;
    var v=mode==='first'?e.pathIdx:mode==='last'?-e.pathIdx:mode==='strong'?e.maxHp:-(e.hp/e.maxHp);
    if(v>bv){bv=v;best=e;}
  });
  return best;
};
Tower.prototype.update=function(dt){
  this.cdTimer-=dt;if(this.shootFx>0)this.shootFx-=dt;
  var lv=this.lv,range=lv.range,cd=lv.cd,dmg=lv.dmg,multi=lv.multi,splash=lv.splash,slow=lv.slow,pen=lv.pen,chain=lv.chain;
  if(this.cdTimer>0)return;
  var targets=[];
  if(multi>1||chain){
    var tx=this.x,ty=this.y;
    targets=enemies.filter(function(e){return !e.dead&&!e.reached&&Math.hypot(e.x-tx,e.y-ty)<=range;})
      .sort(function(a,b){return b.pathIdx-a.pathIdx;}).slice(0,multi);
  }else{var t=this.findTarget();if(t)targets=[t];}
  if(!targets.length)return;
  this.cdTimer=cd;this.shootFx=.12;
  this.angle=Math.atan2(targets[0].y-this.y,targets[0].x-this.x);
  for(var i=0;i<targets.length;i++){
    if(chain)doChain(this,targets[i],dmg,multi,range*.7);
    else if(splash>0)projectiles.push(new Projectile(this,targets[i],dmg,splash,0,false));
    else projectiles.push(new Projectile(this,targets[i],dmg,0,slow,pen));
  }
};
Tower.prototype.draw=function(){
  var x=this.x,y=this.y;
  ctx.save();ctx.translate(x,y);
  if(this.shootFx>0){ctx.shadowColor=this.color;ctx.shadowBlur=22+this.shootFx*50;}
  ctx.beginPath();ctx.arc(0,0,TS*.38,0,Math.PI*2);
  var bg=ctx.createRadialGradient(-4,-4,0,0,0,TS*.38);bg.addColorStop(0,'#1e293b');bg.addColorStop(1,'#0f172a');
  ctx.fillStyle=bg;ctx.fill();ctx.strokeStyle='#334155';ctx.lineWidth=2;ctx.stroke();
  if(selectedTower===this){
    ctx.beginPath();ctx.arc(0,0,this.lv.range,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
  }
  ctx.restore();
  ctx.save();ctx.translate(x,y);ctx.rotate(this.angle);drawTop(ctx,this.type,this.color);ctx.restore();
  var pc=['#fbbf24','#a3e635','#e879f9'][this.level];
  for(var i=0;i<=this.level;i++){ctx.beginPath();ctx.arc(x-6+i*6,y+TS*.3,3,0,Math.PI*2);ctx.fillStyle=pc;ctx.fill();}
};

function drawTop(ctx,type,col){
  var r=TS*.27;
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);
  var g=ctx.createRadialGradient(-r*.3,-r*.3,0,0,0,r);g.addColorStop(0,lighten(col,.4));g.addColorStop(1,col);
  ctx.fillStyle=g;ctx.fill();ctx.strokeStyle=darken(col,.25);ctx.lineWidth=1.5;ctx.stroke();
  if(type==='archer'){
    ctx.strokeStyle='rgba(255,255,255,.9)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-r*.5,0);ctx.lineTo(r*.9,0);ctx.stroke();
    ctx.beginPath();ctx.moveTo(r*.9,0);ctx.lineTo(r*.5,-r*.3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(r*.9,0);ctx.lineTo(r*.5,r*.3);ctx.stroke();
  }else if(type==='cannon'){
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,-r*.22,r*.9,r*.44);ctx.fillStyle='#475569';ctx.fillRect(0,-r*.14,r*.75,r*.28);
  }else if(type==='sniper'){
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(-r*.1,-r*.1,r*1.35,r*.2);ctx.fillStyle='#38bdf8';ctx.fillRect(r*.9,-r*.06,r*.35,r*.12);
  }else if(type==='frost'){
    ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineWidth=1.5;
    for(var i=0;i<6;i++){var a=i*Math.PI/3;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*r*.85,Math.sin(a)*r*.85);ctx.stroke();}
  }else if(type==='tesla'){
    ctx.fillStyle='#fde68a';
    ctx.beginPath();ctx.moveTo(-r*.1,-r*.6);ctx.lineTo(r*.35,0);ctx.lineTo(r*.05,0);ctx.lineTo(r*.15,r*.6);
    ctx.lineTo(-r*.35,0);ctx.lineTo(-r*.05,0);ctx.closePath();ctx.fill();
  }
}

function doChain(tower,first,dmg,count,chainR){
  var hit={};hit[first.id]=1;first.damage(dmg);
  floats.push(new FloatNum('-'+Math.ceil(dmg*(1-first.armor)),first.x,first.y-first.r-6,'#e879f9'));
  var arcs=[{x:tower.x,y:tower.y},{x:first.x,y:first.y}],cur=first;
  for(var i=1;i<count;i++){
    var next=null,bd=Infinity;
    enemies.forEach(function(e){if(hit[e.id]||e.dead||e.reached)return;var d=Math.hypot(e.x-cur.x,e.y-cur.y);if(d<chainR&&d<bd){bd=d;next=e;}});
    if(!next)break;
    hit[next.id]=1;arcs.push({x:cur.x,y:cur.y},{x:next.x,y:next.y});
    var d2=dmg*Math.pow(.72,i);next.damage(d2);
    floats.push(new FloatNum('-'+Math.ceil(d2*(1-next.armor)),next.x,next.y-next.r-6,'#e879f9'));cur=next;
  }
  particles.push(new LightArc(arcs,tower.color));
}

// ─── PROJECTILE ──────────────────────────────────────────────────────────────
function Projectile(tower,target,dmg,splash,slow,pen){
  this.x=tower.x;this.y=tower.y;this.target=target;
  this.dmg=dmg;this.splash=splash;this.slow=slow;this.pen=pen;this.color=tower.color;this.dead=false;
  this.spd=splash>0?280:480;this.isArc=splash>0;
  if(this.isArc){this.tx=target.x;this.ty=target.y;this.life=0;this.dur=Math.hypot(target.x-tower.x,target.y-tower.y)/this.spd;}
}
Projectile.prototype.update=function(dt){
  if(this.dead)return;
  if(this.isArc){
    this.life+=dt;if(!this.target.dead){this.tx=this.target.x;this.ty=this.target.y;}
    this.x=lerp(this.x,this.tx,dt*7);this.y=lerp(this.y,this.ty,dt*7);
    if(this.life>=this.dur)this.explode();
  }else{
    if(this.target.dead||this.target.reached){this.dead=true;return;}
    var dx=this.target.x-this.x,dy=this.target.y-this.y,d=Math.hypot(dx,dy);
    if(d<this.spd*dt+5){
      if(this.pen){
        var px=this.x,py=this.y,pdmg=this.dmg,pslow=this.slow;
        enemies.forEach(function(e){if(!e.dead&&Math.hypot(e.x-px,e.y-py)<32){
          var ef=e.damage(pdmg);floats.push(new FloatNum('-'+Math.ceil(ef),e.x,e.y-e.r-6,'#bae6fd'));
          if(pslow>0){e.slow=pslow;e.slowTimer=2.5;}
        }});
      }else{
        var ef=this.target.damage(this.dmg);floats.push(new FloatNum('-'+Math.ceil(ef),this.target.x,this.target.y-this.target.r-6,'#fff'));
        if(this.slow>0){this.target.slow=this.slow;this.target.slowTimer=2.5;}
      }
      this.dead=true;
    }else{this.x+=dx/d*this.spd*dt;this.y+=dy/d*this.spd*dt;}
  }
};
Projectile.prototype.explode=function(){
  this.dead=true;shockwaves.push({x:this.x,y:this.y,r:6,maxR:this.splash,life:1,col:this.color});spawnBurst(this.x,this.y,this.color,8);
  var px=this.x,py=this.y,pdmg=this.dmg,psp=this.splash,pslow=this.slow;
  enemies.forEach(function(e){if(!e.dead&&Math.hypot(e.x-px,e.y-py)<=psp){
    var ef=e.damage(pdmg);floats.push(new FloatNum('-'+Math.ceil(ef),e.x,e.y-e.r-6,'#fde68a'));
    if(pslow>0){e.slow=pslow;e.slowTimer=2;}
  }});
};
Projectile.prototype.draw=function(){
  ctx.save();ctx.shadowColor=this.color;ctx.shadowBlur=10;
  ctx.beginPath();ctx.arc(this.x,this.y,this.isArc?5:3,0,Math.PI*2);ctx.fillStyle=this.color;ctx.fill();ctx.restore();
};

// ─── PARTICLES ───────────────────────────────────────────────────────────────
function Particle(x,y,col){
  this.x=x;this.y=y;this.col=col;this.vx=(Math.random()-.5)*180;this.vy=(Math.random()-.5)*180-40;
  this.r=2+Math.random()*3;this.life=1;this.decay=.6+Math.random()*.8;
}
Particle.prototype.update=function(dt){this.x+=this.vx*dt;this.y+=this.vy*dt;this.vy+=200*dt;this.life-=this.decay*dt;};
Particle.prototype.draw=function(){
  ctx.globalAlpha=Math.max(0,this.life);ctx.beginPath();ctx.arc(this.x,this.y,this.r*this.life,0,Math.PI*2);
  ctx.fillStyle=this.col;ctx.fill();ctx.globalAlpha=1;
};

function LightArc(pts,col){this.pts=pts;this.col=col;this.life=1;}
LightArc.prototype.update=function(dt){this.life-=dt*4;};
LightArc.prototype.draw=function(){
  if(this.pts.length<2||this.life<=0)return;
  ctx.save();ctx.globalAlpha=this.life;ctx.strokeStyle=this.col;ctx.lineWidth=2;ctx.shadowColor=this.col;ctx.shadowBlur=10;
  ctx.beginPath();
  this.pts.forEach(function(p,i){i?ctx.lineTo(p.x+(Math.random()-.5)*10,p.y+(Math.random()-.5)*10):ctx.moveTo(p.x,p.y);});
  ctx.stroke();ctx.restore();
};

function FloatNum(t,x,y,c){this.t=t;this.x=x;this.y=y;this.col=c;this.life=1;this.vy=-45;}
FloatNum.prototype.update=function(dt){this.y+=this.vy*dt;this.life-=dt*1.4;};
FloatNum.prototype.draw=function(){
  ctx.globalAlpha=Math.max(0,this.life);ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillText(this.t,this.x+1,this.y+1);ctx.fillStyle=this.col;ctx.fillText(this.t,this.x,this.y);ctx.globalAlpha=1;
};

function spawnBurst(x,y,col,n){for(var i=0;i<n;i++)particles.push(new Particle(x,y,col));}

// ─── ICONS ───────────────────────────────────────────────────────────────────
(function(){
  Object.keys(TTYPES).forEach(function(type){
    var ic=document.getElementById('icon-'+type);if(!ic)return;
    ic.width=28;ic.height=28;var cx=ic.getContext('2d');
    cx.save();cx.translate(14,14);
    var td=TTYPES[type];
    cx.beginPath();cx.arc(0,0,12,0,Math.PI*2);
    var g=cx.createRadialGradient(-3,-3,0,0,0,12);g.addColorStop(0,lighten(td.color,.4));g.addColorStop(1,td.color);
    cx.fillStyle=g;cx.fill();cx.strokeStyle=darken(td.color,.25);cx.lineWidth=1.5;cx.stroke();
    cx.restore();drawTop(cx,type,td.color);
  });
})();

// ─── HUD ─────────────────────────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('s-gold').textContent=gold;
  document.getElementById('s-lives').textContent=lives;
  document.getElementById('s-wave').textContent=wave+'/'+TOTAL_WAVES;
  document.getElementById('s-score').textContent=score;
  document.querySelectorAll('.tower-btn').forEach(function(b){
    var t=b.dataset.type;b.classList.toggle('disabled',gold<TTYPES[t].cost);b.classList.toggle('selected',selectedType===t);
  });
  var wb=document.getElementById('wave-btn');
  if(gameState==='prep'||gameState==='waveclear'){wb.disabled=false;wb.textContent='▶ Start Wave '+(wave+1);}
  else if(gameState==='running'){wb.disabled=true;wb.textContent='Wave '+wave+' — '+enemies.filter(function(e){return !e.dead&&!e.reached;}).length+' left';}
  else{wb.disabled=true;wb.textContent='...';}
}
var MODES={first:'First',last:'Last',strong:'Strongest',weak:'Weakest'};
function showInfo(tw){
  var ic=document.getElementById('info-content');
  if(!tw){ic.innerHTML='<span style="color:#4a5568">Select a tower type then click a grass tile to place.<br><br>Click a placed tower to upgrade, sell, or change targeting mode.</span>';return;}
  var lv=tw.lv,td=TTYPES[tw.type],uc=tw.level<2?Math.ceil(td.cost*UPG_MUL[tw.level+1]):null;
  ic.innerHTML='<div class="info-name" style="color:'+tw.color+'">'+tw.name+' <span style="font-size:10px;color:#fbbf24">Lv'+(tw.level+1)+'</span></div>'+
    '<div class="info-stat"><span>Damage</span><span>'+lv.dmg+'</span></div>'+
    '<div class="info-stat"><span>Range</span><span>'+lv.range+'px</span></div>'+
    '<div class="info-stat"><span>Fire Rate</span><span>'+(1/lv.cd).toFixed(1)+'/s</span></div>'+
    (lv.splash?'<div class="info-stat"><span>Splash</span><span>'+lv.splash+'px</span></div>':'')+
    (lv.slow?'<div class="info-stat"><span>Slow</span><span>'+((lv.slow*100)|0)+'%</span></div>':'')+
    (lv.multi>1?'<div class="info-stat"><span>Targets</span><span>'+lv.multi+'</span></div>':'')+
    (lv.pen?'<div class="info-stat"><span>Pierce</span><span>✓</span></div>':'')+
    '<div class="info-stat"><span>Mode</span><span>'+MODES[tw.mode]+'</span></div>'+
    '<div class="info-stat"><span>Sell</span><span style="color:#f87171">'+tw.sellValue+'g</span></div>'+
    '<div class="btn-row">'+
    '<button class="action-btn btn-upgrade"'+(uc?'':' disabled')+' onclick="doUpgrade()">'+(uc?uc+'g ↑':'Max Lv')+'</button>'+
    '<button class="action-btn btn-target" onclick="doTarget()">⟳ Mode</button></div>'+
    '<button class="action-btn btn-sell" style="width:100%;margin-top:4px" onclick="doSell()">Sell for '+tw.sellValue+'g</button>';
}
function showMsg(t,ms){ms=ms||2200;var m=document.getElementById('msg');m.textContent=t;clearTimeout(m._t);m._t=setTimeout(function(){m.textContent='';},ms);}
function doUpgrade(){if(!selectedTower)return;if(!selectedTower.upgrade()){showMsg('Not enough gold!');return;}showInfo(selectedTower);}
function doSell(){if(!selectedTower)return;selectedTower.sell();towers.splice(towers.indexOf(selectedTower),1);selectedTower=null;showInfo(null);updateHUD();}
function doTarget(){if(!selectedTower)return;selectedTower.cycleMode();showInfo(selectedTower);}
window.doUpgrade=doUpgrade;window.doSell=doSell;window.doTarget=doTarget;

// ─── INPUT ───────────────────────────────────────────────────────────────────
function selectTower(type){
  if(gameState==='gameover'||gameState==='victory')return;
  selectedType=selectedType===type?null:type;if(selectedType){selectedTower=null;showInfo(null);}updateHUD();
}
window.selectTower=selectTower;
function setSpeed(s){gameSpeed=s;document.querySelectorAll('.speed-btn').forEach(function(b,i){b.classList.toggle('active',i===s-1);});}
window.setSpeed=setSpeed;
function canPlace(c,r){return !isOob(c,r)&&!isPath(c,r)&&!towers.some(function(t){return t.col===c&&t.row===r;});}
function getCell(e){
  var rect=cv.getBoundingClientRect(),sx=GW/rect.width,sy=GH/rect.height;
  return{c:Math.floor((e.clientX-rect.left)*sx/TS),r:Math.floor((e.clientY-rect.top)*sy/TS)};
}
cv.addEventListener('mousemove',function(e){
  var cl=getCell(e);hoverCell=(cl.c>=0&&cl.c<COLS&&cl.r>=0&&cl.r<ROWS)?cl:null;
  placementValid=!!(hoverCell&&selectedType&&canPlace(hoverCell.c,hoverCell.r));
});
cv.addEventListener('mouseleave',function(){hoverCell=null;});
cv.addEventListener('click',function(e){
  var cl=getCell(e);
  if(selectedType){
    if(!canPlace(cl.c,cl.r)){showMsg('Cannot place here!');return;}
    if(gold<TTYPES[selectedType].cost){showMsg('Not enough gold!');return;}
    gold-=TTYPES[selectedType].cost;towers.push(new Tower(selectedType,cl.c,cl.r));score+=25;
    showMsg(TTYPES[selectedType].name+' placed!');updateHUD();
  }else{
    var rect=cv.getBoundingClientRect(),sx=GW/rect.width,sy=GH/rect.height;
    var mx=(e.clientX-rect.left)*sx,my=(e.clientY-rect.top)*sy;
    var hit=null;
    for(var i=0;i<towers.length;i++){if(Math.hypot(towers[i].x-mx,towers[i].y-my)<TS*.46){hit=towers[i];break;}}
    selectedTower=hit;showInfo(selectedTower);
  }
});
document.addEventListener('keydown',function(e){
  if((e.key==='r'||e.key==='R')&&(gameState==='gameover'||gameState==='victory'))restart();
  if(e.key==='Escape'){selectedType=null;selectedTower=null;showInfo(null);updateHUD();}
});

// ─── WAVE ────────────────────────────────────────────────────────────────────
function startWave(){
  if(wave>=TOTAL_WAVES||(gameState!=='prep'&&gameState!=='waveclear'))return;
  wave++;gameState='running';waveActive=true;selectedType=null;
  var wdef=WAVES[wave-1];waveQueue=[];
  for(var i=0;i<wdef.length;i++)for(var j=0;j<wdef[i].n;j++)waveQueue.push(wdef[i].t);
  for(var k=waveQueue.length-1;k>0;k--){var jj=Math.floor(Math.random()*(k+1));var tmp=waveQueue[k];waveQueue[k]=waveQueue[jj];waveQueue[jj]=tmp;}
  waveEnemySpawned=0;spawnTimer=0;spawnDelay=Math.max(.22,.58-wave*.013);updateHUD();
}
window.startWave=startWave;
function triggerGameOver(){gameState='gameover';waveActive=false;overlayMsg={msg:'GAME OVER',col:'#ef4444'};updateHUD();}
function triggerVictory(){gameState='victory';waveActive=false;overlayMsg={msg:'YOU WIN!',col:'#22c55e'};updateHUD();}
function restart(){
  gold=150;lives=20;score=0;wave=0;gameState='prep';waveActive=false;overlayMsg=null;
  towers.length=0;enemies.length=0;projectiles.length=0;particles.length=0;floats.length=0;shockwaves.length=0;
  waveQueue=[];waveEnemySpawned=0;selectedType=null;selectedTower=null;updateHUD();showInfo(null);
}
window.restart=restart;

// ─── LOOP ────────────────────────────────────────────────────────────────────
var lastT=0;
function loop(ts){
  var dt=Math.min((ts-lastT)/1000,.05)*gameSpeed;lastT=ts;
  if(gameState==='running'){
    if(waveEnemySpawned<waveQueue.length){spawnTimer-=dt;if(spawnTimer<=0){enemies.push(new Enemy(waveQueue[waveEnemySpawned++],wave));spawnTimer=spawnDelay;}}
    var i;
    for(i=enemies.length-1;i>=0;i--){enemies[i].update(dt);if(enemies[i].dead||enemies[i].reached)enemies.splice(i,1);}
    for(i=0;i<towers.length;i++)towers[i].update(dt);
    for(i=projectiles.length-1;i>=0;i--){projectiles[i].update(dt);if(projectiles[i].dead)projectiles.splice(i,1);}
    for(i=particles.length-1;i>=0;i--){particles[i].update(dt);if(particles[i].life<=0)particles.splice(i,1);}
    for(i=floats.length-1;i>=0;i--){floats[i].update(dt);if(floats[i].life<=0)floats.splice(i,1);}
    for(i=shockwaves.length-1;i>=0;i--){var sw=shockwaves[i];sw.r=lerp(sw.r,sw.maxR,dt*7);sw.life-=dt*3;if(sw.life<=0)shockwaves.splice(i,1);}
    if(waveActive&&waveEnemySpawned>=waveQueue.length&&enemies.length===0){
      waveActive=false;
      if(wave>=TOTAL_WAVES)triggerVictory();
      else{gameState='waveclear';var b=50+wave*20;gold+=b;score+=wave*500;showMsg('Wave '+wave+' cleared! +'+b+'g bonus!',3000);}
      updateHUD();
    }
  }
  ctx.drawImage(bgc,0,0);
  if(hoverCell&&selectedType){
    var hc=hoverCell.c,hr=hoverCell.r;
    ctx.fillStyle=placementValid?'rgba(34,197,94,.22)':'rgba(239,68,68,.22)';ctx.fillRect(hc*TS,hr*TS,TS,TS);
    ctx.strokeStyle=placementValid?'#22c55e':'#ef4444';ctx.lineWidth=2;ctx.strokeRect(hc*TS+1,hr*TS+1,TS-2,TS-2);
    if(placementValid){
      ctx.beginPath();ctx.arc(hc*TS+TS/2,hr*TS+TS/2,TTYPES[selectedType].lv[0].range,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
    }
  }
  for(var si=0;si<shockwaves.length;si++){var sw2=shockwaves[si];ctx.beginPath();ctx.arc(sw2.x,sw2.y,sw2.r,0,Math.PI*2);ctx.strokeStyle=sw2.col;ctx.lineWidth=3*sw2.life;ctx.globalAlpha=sw2.life*.6;ctx.stroke();ctx.globalAlpha=1;}
  for(var ti=0;ti<towers.length;ti++)towers[ti].draw();
  for(var ei=0;ei<enemies.length;ei++)enemies[ei].draw();
  for(var pi=0;pi<projectiles.length;pi++)projectiles[pi].draw();
  for(var pai=0;pai<particles.length;pai++)particles[pai].draw();
  for(var fi=0;fi<floats.length;fi++)floats[fi].draw();
  if(overlayMsg){
    ctx.fillStyle='rgba(0,0,0,.62)';ctx.fillRect(0,0,GW,GH);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='bold 68px sans-serif';ctx.shadowColor=overlayMsg.col;ctx.shadowBlur=30;ctx.fillStyle=overlayMsg.col;ctx.fillText(overlayMsg.msg,GW/2,GH/2-44);
    ctx.shadowBlur=0;ctx.font='26px sans-serif';ctx.fillStyle='#e2e8f0';ctx.fillText('Score: '+score,GW/2,GH/2+10);
    ctx.font='16px sans-serif';ctx.fillStyle='#94a3b8';ctx.fillText('Press R to play again',GW/2,GH/2+48);
  }
  if(gameState==='prep'&&wave===0){
    ctx.fillStyle='rgba(0,0,0,.48)';ctx.fillRect(0,0,GW,GH);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='bold 52px sans-serif';ctx.shadowColor='#0078D4';ctx.shadowBlur=24;ctx.fillStyle='#60cdff';ctx.fillText('TOWER DEFENSE',GW/2,GH/2-60);
    ctx.shadowBlur=0;ctx.font='18px sans-serif';ctx.fillStyle='#94a3b8';
    ctx.fillText('5 Tower Types  ·  3 Upgrades Each  ·  6 Enemy Types  ·  20 Waves',GW/2,GH/2-10);
    ctx.fillText('Place towers on grass tiles, then press Start Wave!',GW/2,GH/2+22);
    ctx.font='15px sans-serif';ctx.fillStyle='#60cdff';ctx.fillText('Press "Start Wave 1" in the panel →',GW/2,GH/2+60);
  }
  requestAnimationFrame(loop);
}
updateHUD();showInfo(null);requestAnimationFrame(loop);
</script>
