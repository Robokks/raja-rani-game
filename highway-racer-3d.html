<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Highway Racer 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#111}
#wrap{position:relative;width:100%;height:100%}
iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:block;}
#fallback{
  display:none;position:absolute;inset:0;
  flex-direction:column;align-items:center;justify-content:center;
  background:#111;color:#fff;font-family:system-ui,sans-serif;
  text-align:center;padding:24px;
}
#fallback h1{font-size:2rem;margin-bottom:12px}
#fallback p{font-size:1rem;opacity:.7;margin-bottom:24px;max-width:480px}
#fallback a{
  color:#fff;background:rgba(255,165,0,.25);
  padding:10px 24px;border-radius:8px;text-decoration:none;font-weight:600;
  border:2px solid rgba(255,165,0,.6);
}
#fallback a:hover{background:rgba(255,165,0,.4)}
#back{
  position:absolute;top:12px;left:12px;z-index:10;
  color:#fff;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);
  padding:6px 14px;border-radius:6px;text-decoration:none;font-family:system-ui,sans-serif;font-size:13px;
}
#back:hover{background:rgba(0,0,0,.75)}
</style>
</head>
<body>
<a id="back" href="index.html">← Back</a>
<div id="wrap">
  <iframe
    id="gf"
    src="https://githubgames.gitlab.io/game/highway-racer-3d.html"
    allowfullscreen
    allow="fullscreen; autoplay"
    title="Highway Racer 3D"
    sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-forms"
  ></iframe>
  <div id="fallback">
    <h1>Highway Racer 3D</h1>
    <p>The game couldn't load in this frame. Open it directly in a new tab.</p>
    <a href="https://githubgames.gitlab.io/game/highway-racer-3d.html" target="_blank" rel="noopener">
      Play Highway Racer 3D ↗
    </a>
  </div>
</div>
<script>
const fr = document.getElementById('gf');
const fb = document.getElementById('fallback');
fr.addEventListener('error', () => { fr.style.display='none'; fb.style.display='flex'; });
let loaded = false;
fr.addEventListener('load', () => { loaded = true; });
setTimeout(() => { if (!loaded) { fr.style.display='none'; fb.style.display='flex'; } }, 8000);
</script>
</body>
</html>
