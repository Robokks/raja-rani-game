<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>CONTRA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;}
#gc{width:100%;height:100%;}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}
#rot{display:none;position:fixed;inset:0;background:#000;color:#fff;
  font-family:monospace;font-size:20px;align-items:center;justify-content:center;
  text-align:center;z-index:999;line-height:2;}
#mc{display:none;position:fixed;inset:0;pointer-events:none;z-index:100;}
@media(hover:none)and(pointer:coarse){#mc{display:block;}}
@media(hover:none)and(pointer:coarse)and(orientation:portrait){
  #rot{display:flex;}#gc,#mc{display:none!important;}}
#dpad{position:absolute;bottom:14px;left:10px;
  display:grid;grid-template-columns:52px 52px 52px;grid-template-rows:52px 52px;gap:4px;
  pointer-events:auto;}
#acts{position:absolute;bottom:14px;right:10px;display:flex;gap:10px;align-items:flex-end;pointer-events:auto;}
.mb{border-radius:8px;border:2px solid rgba(255,255,255,.35);
  background:rgba(0,0,0,.45);color:#fff;font-size:16px;font-weight:bold;
  display:flex;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none;}
.mb.on{background:rgba(255,255,255,.3);}
#dU{grid-column:2;grid-row:1;}
#dL{grid-column:1;grid-row:2;}
#dD{grid-column:2;grid-row:2;}
#dR{grid-column:3;grid-row:2;}
.db{width:52px;height:52px;}
#bJ{width:64px;height:64px;border-radius:50%;background:rgba(200,50,50,.5);border-color:rgba(255,120,120,.6);font-size:20px;}
#bS{width:64px;height:64px;border-radius:50%;background:rgba(50,50,200,.5);border-color:rgba(120,120,255,.6);font-size:20px;}
</style>
</head>
<body>
<div id="rot">📱 Rotate to Landscape<br>to play <b>CONTRA</b></div>
<div id="gc"></div>
<div id="mc">
  <div id="dpad">
    <div class="mb db" id="dU">▲</div>
    <div class="mb db" id="dL">◀</div>
    <div class="mb db" id="dD">▼</div>
    <div class="mb db" id="dR">▶</div>
  </div>
  <div id="acts">
    <div class="mb" id="bJ">B</div>
    <div class="mb" id="bS">A</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
// ── Touch ────────────────────────────────────────────────────────────────────
const TC={u:false,d:false,l:false,r:false,j:false,s:false};
function tb(id,k){
  const el=document.getElementById(id);if(!el)return;
  const on=e=>{e.preventDefault();TC[k]=true;el.classList.add('on');};
  const off=e=>{e.preventDefault();TC[k]=false;el.classList.remove('on');};
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
}
tb('dU','u');tb('dD','d');tb('dL','l');tb('dR','r');tb('bJ','j');tb('bS','s');

// ── Audio ────────────────────────────────────────────────────────────────────
let _ac=null,muted=false;
function gac(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}
function beep(f,d,t='square',v=0.1){if(muted)return;try{
  const c=gac(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(v,c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);
  o.start();o.stop(c.currentTime+d);}catch(e){}}
const SND={
  shoot:()=>beep(800,.06,'square',.07),
  spread:()=>{beep(700,.05,'square',.06);beep(900,.05,'square',.04);},
  laser:()=>beep(1400,.08,'sine',.09),
  explode:()=>beep(100,.35,'sawtooth',.18),
  hurt:()=>beep(300,.18,'sawtooth',.2),
  die:()=>{beep(200,.5,'sawtooth',.2);},
  jump:()=>beep(520,.1,'sine',.09),
  pickup:()=>{beep(880,.07,'sine',.1);beep(1100,.07,'sine',.1);},
  hit:()=>beep(400,.08,'square',.12),
  start:()=>{beep(440,.15,'square',.12);beep(550,.15,'square',.12);beep(660,.3,'square',.12);},
};

// ── Canvas texture helpers ────────────────────────────────────────────────────
function mkTex(scene,key,w,h,fn){
  if(scene.textures.exists(key))return;
  const c=document.createElement('canvas');c.width=w;c.height=h;
  fn(c.getContext('2d'));scene.textures.addCanvas(key,c);
}

// ── Constants ─────────────────────────────────────────────────────────────────
const GW=480,GH=270,WW=4096;
const GND=244; // y of ground surface (player stands here)
const P_SPEED=155,P_JUMP=-520,P_GRAV=1350;
const B_SPEED=620,EB_SPEED=190;
const SHOOT_CD={D:9,S:18,R:4,L:14,F:22};
const INV2=1/Math.sqrt(2);

// ─── Boot Scene ───────────────────────────────────────────────────────────────
class BootScene extends Phaser.Scene{
  constructor(){super('Boot');}
  create(){
    this.makePlayer('p1',0x1a56db); // blue shirt P1
    this.makePlayer('p2',0xdc2626); // red shirt P2

    // Enemies
    mkTex(this,'e_grunt',18,24,c=>{
      // helmet
      c.fillStyle='#b91c1c';c.fillRect(3,0,12,5);
      // face
      c.fillStyle='#fca99b';c.fillRect(3,5,10,5);c.fillStyle='#111';c.fillRect(5,7,2,2);
      // body camo
      c.fillStyle='#65a30d';c.fillRect(2,10,14,8);
      c.fillStyle='#3f6212';c.fillRect(4,11,3,3);c.fillRect(10,12,3,3);
      // rifle
      c.fillStyle='#555';c.fillRect(14,11,4,2);
      // legs
      c.fillStyle='#713f12';c.fillRect(3,18,5,4);c.fillRect(10,18,5,4);
      // boots
      c.fillStyle='#1c1917';c.fillRect(3,22,5,2);c.fillRect(10,22,5,2);
    });
    mkTex(this,'e_gunner',18,24,c=>{
      c.fillStyle='#1d4ed8';c.fillRect(3,0,12,5);
      c.fillStyle='#fca99b';c.fillRect(3,5,10,5);c.fillStyle='#111';c.fillRect(5,7,2,2);
      c.fillStyle='#374151';c.fillRect(2,10,14,8);
      c.fillStyle='#555';c.fillRect(14,11,4,2);
      c.fillStyle='#1e3a5f';c.fillRect(3,18,5,4);c.fillRect(10,18,5,4);
      c.fillStyle='#1c1917';c.fillRect(3,22,5,2);c.fillRect(10,22,5,2);
    });
    mkTex(this,'e_turret',32,22,c=>{
      // base
      c.fillStyle='#374151';c.fillRect(0,10,32,12);
      c.fillStyle='#4b5563';c.fillRect(2,8,28,4);
      // barrel
      c.fillStyle='#6b7280';c.fillRect(22,4,10,4);
      // dome
      c.fillStyle='#1f2937';c.fillRect(6,4,18,8);
      c.fillStyle='#374151';c.fillRect(8,2,14,4);
      // eye
      c.fillStyle='#ef4444';c.fillRect(18,6,4,2);
    });

    // Weapon capsule
    mkTex(this,'capsule',14,18,c=>{
      c.fillStyle='#ef4444';
      c.fillRect(2,0,10,18);c.fillRect(0,4,14,10);
      c.fillStyle='#fef2f2';
      c.fillRect(4,0,6,18);c.fillRect(0,6,14,6);
      // shine
      c.fillStyle='rgba(255,255,255,0.5)';c.fillRect(3,2,4,14);
    });
    // Letter overlays for each weapon type drawn at runtime

    // Bullets
    mkTex(this,'b_p', 8,4,c=>{c.fillStyle='#fef08a';c.fillRect(0,0,8,4);c.fillStyle='#fff';c.fillRect(6,1,2,2);});
    mkTex(this,'b_e', 6,5,c=>{c.fillStyle='#f97316';c.fillRect(0,0,6,5);c.fillStyle='#fef3c7';c.fillRect(4,1,2,3);});
    mkTex(this,'b_laser',24,3,c=>{c.fillStyle='#a5f3fc';c.fillRect(0,0,24,3);c.fillStyle='#fff';c.fillRect(20,1,4,1);});
    mkTex(this,'b_flame',10,8,c=>{c.fillStyle='#f97316';c.fillRect(0,2,10,5);c.fillStyle='#fbbf24';c.fillRect(2,0,6,8);c.fillStyle='#fef3c7';c.fillRect(4,2,3,4);});

    // Ground tile 32×16
    mkTex(this,'gnd',32,16,c=>{
      c.fillStyle='#15803d';c.fillRect(0,0,32,6);
      c.fillStyle='#166534';c.fillRect(0,6,32,4);
      c.fillStyle='#92400e';c.fillRect(0,10,32,6);
      c.fillStyle='#78350f';c.fillRect(4,11,6,3);c.fillRect(18,11,8,3);
    });
    // Platform tile 32×8
    mkTex(this,'plat',32,8,c=>{
      c.fillStyle='#4b5563';c.fillRect(0,0,32,8);
      c.fillStyle='#6b7280';c.fillRect(0,0,32,3);
      c.fillStyle='#374151';c.fillRect(0,3,32,1);
    });

    // Boss (128×80)
    mkTex(this,'boss',128,80,c=>{
      // Main body
      c.fillStyle='#374151';c.fillRect(8,30,112,50);
      c.fillStyle='#4b5563';c.fillRect(10,28,108,4);
      // Armour plates
      c.fillStyle='#1f2937';c.fillRect(16,34,30,38);c.fillRect(49,34,30,38);c.fillRect(82,34,30,38);
      // 3 cannon bases
      [[20,18],[53,8],[86,18]].forEach(([x,y],i)=>{
        c.fillStyle='#374151';c.fillRect(x,y,22,14);
        c.fillStyle='#6b7280';c.fillRect(x,y,22,4);
        // barrel
        c.fillStyle='#9ca3af';c.fillRect(x+8,-2+y,6,i===1?y:12);
        // eye
        c.fillStyle='#dc2626';c.fillRect(x+8,y+6,6,4);
      });
      // treads
      c.fillStyle='#111';c.fillRect(8,72,112,8);
      c.fillStyle='#374151';
      for(let x=10;x<120;x+=14)c.fillRect(x,74,10,4);
    });

    // Backgrounds
    // Sky 480×270
    mkTex(this,'sky',480,270,c=>{
      const g=c.createLinearGradient(0,0,0,270);
      g.addColorStop(0,'#020617');g.addColorStop(0.6,'#0c1445');g.addColorStop(1,'#1e3a2f');
      c.fillStyle=g;c.fillRect(0,0,480,270);
      // stars
      c.fillStyle='rgba(255,255,255,0.8)';
      for(let i=0;i<80;i++)c.fillRect(Math.random()*480,Math.random()*150,Math.random()<.2?2:1,1);
    });
    // Far jungle 480×120
    mkTex(this,'far_trees',480,120,c=>{
      c.fillStyle='#14532d';
      for(let x=0;x<480;x+=22+Math.floor(Math.random()*18)){
        const h=50+Math.random()*50;
        c.fillRect(x+8,120-h,8,h);
        c.fillStyle='#166534';c.beginPath();c.moveTo(x,120-h+10);c.lineTo(x+12,120-h-20);c.lineTo(x+24,120-h+10);c.closePath();c.fill();
        c.fillStyle='#14532d';c.beginPath();c.moveTo(x+2,120-h+24);c.lineTo(x+12,120-h+2);c.lineTo(x+22,120-h+24);c.closePath();c.fill();
        c.fillStyle='#166534';
      }
    });
    // Near jungle 480×160
    mkTex(this,'near_trees',480,160,c=>{
      c.fillStyle='#15803d';
      for(let x=0;x<480;x+=16+Math.floor(Math.random()*14)){
        const h=60+Math.random()*70;
        c.fillRect(x+6,160-h,6,h);
        c.fillStyle='#16a34a';c.beginPath();c.moveTo(x,160-h+12);c.lineTo(x+9,160-h-22);c.lineTo(x+18,160-h+12);c.closePath();c.fill();
        c.fillStyle='#15803d';c.beginPath();c.moveTo(x+1,160-h+26);c.lineTo(x+9,160-h+4);c.lineTo(x+17,160-h+26);c.closePath();c.fill();
        c.fillStyle='#15803d';
      }
    });

    // Particle
    mkTex(this,'spark',5,5,c=>{c.fillStyle='#fbbf24';c.fillRect(0,0,5,5);});
    mkTex(this,'blood',4,4,c=>{c.fillStyle='#ef4444';c.fillRect(0,0,4,4);});

    this.scene.start('Title');
  }

  makePlayer(key,shirtColor){
    // Standing (20×28)
    mkTex(this,key+'_st',20,28,c=>{this.drawPlayer(c,shirtColor,false,false);});
    // Run1
    mkTex(this,key+'_r1',20,28,c=>{this.drawPlayer(c,shirtColor,true,false);});
    // Run2
    mkTex(this,key+'_r2',20,28,c=>{this.drawPlayer(c,shirtColor,true,true);});
    // Jump
    mkTex(this,key+'_jp',20,28,c=>{this.drawPlayer(c,shirtColor,false,false,true);});
    // Crouch
    mkTex(this,key+'_cr',20,20,c=>{this.drawPlayerCrouch(c,shirtColor);});
  }

  drawPlayer(c,shirt,run,leg2,jump=false){
    // helmet
    c.fillStyle='#4d7c0f';c.fillRect(4,0,12,5);
    c.fillStyle='#3f6212';c.fillRect(3,3,14,3);
    // face
    c.fillStyle='#fca99b';c.fillRect(4,5,10,5);
    // eye
    c.fillStyle='#111';c.fillRect(10,7,2,2);
    // shirt
    c.fillStyle='#'+shirt.toString(16).padStart(6,'0');
    c.fillRect(3,10,14,8);
    // gun
    c.fillStyle='#6b7280';
    if(jump){c.fillRect(14,8,6,2);}else{c.fillRect(16,11,4,2);}
    // pants
    c.fillStyle='#1e3a5f';
    if(run&&!leg2){c.fillRect(4,18,5,8);c.fillRect(11,20,5,6);}
    else if(run&&leg2){c.fillRect(4,20,5,6);c.fillRect(11,18,5,8);}
    else{c.fillRect(4,18,5,8);c.fillRect(11,18,5,8);}
    if(jump){c.fillRect(4,17,12,5);}
    // boots
    c.fillStyle='#1c1917';
    if(jump){c.fillRect(3,23,6,2);c.fillRect(12,25,5,2);}
    else{c.fillRect(4,26,5,2);c.fillRect(11,26,5,2);}
  }

  drawPlayerCrouch(c,shirt){
    c.fillStyle='#4d7c0f';c.fillRect(4,0,12,4);c.fillStyle='#3f6212';c.fillRect(3,3,14,2);
    c.fillStyle='#fca99b';c.fillRect(4,5,10,4);c.fillStyle='#111';c.fillRect(10,6,2,2);
    c.fillStyle='#'+shirt.toString(16).padStart(6,'0');c.fillRect(3,9,14,5);
    c.fillStyle='#6b7280';c.fillRect(16,10,4,2);
    c.fillStyle='#1e3a5f';c.fillRect(2,14,16,4);
    c.fillStyle='#1c1917';c.fillRect(2,18,7,2);c.fillRect(11,18,7,2);
  }
}

// ─── Title Scene ──────────────────────────────────────────────────────────────
class TitleScene extends Phaser.Scene{
  constructor(){super('Title');}
  create(){
    const W=GW,H=GH;
    this.add.image(W/2,H/2,'sky').setDisplaySize(W,H);
    this.add.image(W/2,H,'near_trees').setDisplaySize(W,160).setOrigin(.5,1);

    // Title box
    this.add.rectangle(W/2,80,360,100,0x000000,.75);
    this.add.text(W/2,44,'★ CONTRA ★',{fontFamily:'monospace',fontSize:38,color:'#ef4444',
      stroke:'#7f1d1d',strokeThickness:4}).setOrigin(.5);
    this.add.text(W/2,90,'NES  REMAKE',{fontFamily:'monospace',fontSize:15,color:'#fbbf24'}).setOrigin(.5);

    const bl=this.add.text(W/2,150,'PRESS  ENTER  OR  TAP',{fontFamily:'monospace',fontSize:14,color:'#fff'}).setOrigin(.5);
    this.tweens.add({targets:bl,alpha:0,duration:500,yoyo:true,repeat:-1});

    this.add.text(W/2,180,'1  PLAYER   ←ENTER       2  PLAYERS   ←2',
      {fontFamily:'monospace',fontSize:11,color:'#aaa'}).setOrigin(.5);
    this.add.text(W/2,200,
      'KONAMI CODE:  ↑↑↓↓←→←→ B A  =  30 LIVES',
      {fontFamily:'monospace',fontSize:10,color:'#4ade80'}).setOrigin(.5);

    const hi=localStorage.getItem('contra_hi')||0;
    this.add.text(W/2,H-14,`HI-SCORE  ${String(hi).padStart(7,'0')}`,{fontFamily:'monospace',fontSize:12,color:'#fbbf24'}).setOrigin(.5);

    this.konamiMsg=this.add.text(W/2,220,'',{fontFamily:'monospace',fontSize:13,color:'#4ade80'}).setOrigin(.5);
    this.konamiSeq=[];
    this.konamiDone=false;
    this.extraLives=false;

    const KC=[Phaser.Input.Keyboard.KeyCodes.UP,Phaser.Input.Keyboard.KeyCodes.UP,
              Phaser.Input.Keyboard.KeyCodes.DOWN,Phaser.Input.Keyboard.KeyCodes.DOWN,
              Phaser.Input.Keyboard.KeyCodes.LEFT,Phaser.Input.Keyboard.KeyCodes.RIGHT,
              Phaser.Input.Keyboard.KeyCodes.LEFT,Phaser.Input.Keyboard.KeyCodes.RIGHT,
              Phaser.Input.Keyboard.KeyCodes.B,Phaser.Input.Keyboard.KeyCodes.A];
    this.input.keyboard.on('keydown',ev=>{
      this.konamiSeq.push(ev.keyCode);
      if(this.konamiSeq.length>10)this.konamiSeq.shift();
      if(JSON.stringify(this.konamiSeq)===JSON.stringify(KC)&&!this.konamiDone){
        this.konamiDone=true;this.extraLives=true;
        this.konamiMsg.setText('★ 30 LIVES ★');
        this.tweens.add({targets:this.konamiMsg,alpha:0,duration:200,yoyo:true,repeat:5});
        SND.start();
      }
    });

    this.input.keyboard.on('keydown-RETURN',()=>this.go(1));
    this.input.keyboard.on('keydown-TWO',()=>this.go(2));
    this.input.once('pointerdown',()=>this.go(1));
  }
  go(np){
    this.registry.set('numPlayers',np);
    this.registry.set('lives',this.extraLives?30:3);
    SND.start();
    this.scene.start('Game');this.scene.launch('UI');
  }
}

// ─── Game Scene ───────────────────────────────────────────────────────────────
class GameScene extends Phaser.Scene{
  constructor(){super('Game');}

  create(){
    this.np=this.registry.get('numPlayers')||1;
    this.startLives=this.registry.get('lives')||3;
    this.score=0;
    this.hi=+localStorage.getItem('contra_hi')||0;
    this._paused=false;
    this.bossTriggered=false;
    this.bossAlive=true;
    this.bossCanHP=[5,5,5];
    this.stageClear=false;

    this.buildWorld();
    this.allocBullets();
    this.allocParticles();
    this.placeEnemies();
    this.setupKeys();
    this.p1=this.mkPlayer(1,60);
    this.p2=this.np>=2?this.mkPlayer(2,90):null;
    this.setupColliders();

    this.cameras.main.setBounds(0,0,WW,GH);
    this.cameras.main.startFollow(this.p1.sp,true,.12,.12);
    this.cameras.main.setFollowOffset(-80,0);

    this.input.keyboard.on('keydown-M',()=>{muted=!muted;});
    this.input.keyboard.on('keydown-ESC',()=>this.togglePause());
    this.input.keyboard.on('keydown-P',()=>this.togglePause());

    // Defer HUD so UIScene listeners register
    this.time.delayedCall(100,()=>this.emitHUD());
  }

  // ── World ──────────────────────────────────────────────────────────────────
  buildWorld(){
    const H=GH;
    // BG layers (tile sprites, scroll factor 0, moved via tilePositionX)
    this.bgSky=this.add.tileSprite(GW/2,H/2,GW,H,'sky').setScrollFactor(0).setDepth(-10);
    this.bgFar=this.add.tileSprite(GW/2,H,GW,120,'far_trees').setScrollFactor(0).setOrigin(.5,1).setDepth(-9);
    this.bgNear=this.add.tileSprite(GW/2,H,GW,160,'near_trees').setScrollFactor(0).setOrigin(.5,1).setDepth(-8);

    // Ground tiles (visual only)
    for(let x=0;x<WW;x+=32)this.add.image(x+16,H-8,'gnd').setDepth(-1);

    // Ground physics — invisible rectangle
    this.ground=this.add.rectangle(WW/2,H-4,WW,8,0,0);
    this.physics.add.existing(this.ground,true);

    // Platform data: [startX, endX, y]
    this.platData=[
      [280,440,GND-55],[600,760,GND-55],[920,1080,GND-80],
      [1200,1360,GND-55],[1500,1660,GND-70],[1820,2000,GND-60],
      [2100,2260,GND-85],[2400,2560,GND-55],[2700,2860,GND-65],
      [3000,3160,GND-70],[3300,3460,GND-55],[3500,3700,GND-60],
    ];
    this.platGroup=this.physics.add.staticGroup();
    this.platData.forEach(([x1,x2,y])=>{
      for(let x=x1;x<x2;x+=32){
        const p=this.platGroup.create(x+16,y,'plat').setDepth(0);p.refreshBody();
      }
    });

    // Boss arena (visual markers — actual boss spawned later)
    this.bossX=3750;
  }

  // ── Bullet pools ───────────────────────────────────────────────────────────
  allocBullets(){
    this.pbullets=[];
    for(let i=0;i<70;i++){
      const b=this.physics.add.image(-2000,-2000,'b_p');
      b.setActive(false).setVisible(false).setDepth(15);
      b.body.setAllowGravity(false);
      this.pbullets.push(b);
    }
    this.ebullets=[];
    for(let i=0;i<60;i++){
      const b=this.physics.add.image(-2000,-2000,'b_e');
      b.setActive(false).setVisible(false).setDepth(14);
      b.body.setAllowGravity(false);
      this.ebullets.push(b);
    }
  }

  getpb(){return this.pbullets.find(b=>!b.active)||null;}
  geteb(){return this.ebullets.find(b=>!b.active)||null;}

  // ── Particles ──────────────────────────────────────────────────────────────
  allocParticles(){
    this.parts=[];
    for(let i=0;i<80;i++){
      const p=this.add.image(-2000,-2000,'spark').setActive(false).setVisible(false).setDepth(20);
      p.vx=0;p.vy=0;p.life=0;p.grav=0;
      this.parts.push(p);
    }
  }
  burst(x,y,n,col,spd,grav=300){
    let done=0;
    for(const p of this.parts){
      if(p.active)continue;
      const a=Math.random()*Math.PI*2;
      const s=spd*(.5+Math.random());
      p.setPosition(x,y).setActive(true).setVisible(true).setAlpha(1).setTint(col);
      p.vx=Math.cos(a)*s;p.vy=Math.sin(a)*s;p.life=18+Math.random()*18;p.grav=grav;
      if(++done>=n)break;
    }
  }
  tickParts(dt){
    for(const p of this.parts){
      if(!p.active)continue;
      p.life-=dt*60;
      if(p.life<=0){p.setActive(false).setVisible(false);continue;}
      p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=p.grav*dt;p.setAlpha(p.life/36);
    }
  }

  // ── Enemies ────────────────────────────────────────────────────────────────
  placeEnemies(){
    // Pre-placed enemy definitions
    const ED=[
      // [x, y, type, dropType]
      {x:280,y:GND,t:'grunt'},{x:360,y:GND,t:'grunt'},
      {x:480,y:GND-55,t:'gunner'}, // on platform
      {x:580,y:GND,t:'grunt'},{x:650,y:GND,t:'grunt'},
      {x:720,y:GND,t:'cap',d:'S'}, // capsule carrier - always drops weapon
      {x:820,y:GND,t:'turret'},
      {x:900,y:GND,t:'grunt'},{x:960,y:GND,t:'grunt'},
      {x:1050,y:GND,t:'grunt'},{x:1120,y:GND,t:'gunner'},
      {x:1200,y:GND-80,t:'gunner'},
      {x:1300,y:GND,t:'grunt'},{x:1350,y:GND,t:'grunt'},
      {x:1420,y:GND,t:'turret'},
      {x:1560,y:GND,t:'cap',d:'R'},
      {x:1650,y:GND,t:'grunt'},{x:1720,y:GND,t:'grunt'},{x:1790,y:GND,t:'grunt'},
      {x:1880,y:GND,t:'turret'},
      {x:2000,y:GND,t:'grunt'},{x:2080,y:GND,t:'gunner'},
      {x:2160,y:GND-85,t:'gunner'},
      {x:2250,y:GND,t:'grunt'},{x:2310,y:GND,t:'grunt'},
      {x:2400,y:GND,t:'cap',d:'L'},
      {x:2500,y:GND,t:'turret'},{x:2580,y:GND,t:'turret'},
      {x:2700,y:GND,t:'grunt'},{x:2760,y:GND,t:'grunt'},{x:2820,y:GND,t:'grunt'},
      {x:2900,y:GND,t:'grunt'},{x:2960,y:GND,t:'gunner'},
      {x:3060,y:GND,t:'turret'},
      {x:3150,y:GND,t:'cap',d:'S'},
      {x:3250,y:GND,t:'grunt'},{x:3310,y:GND,t:'grunt'},{x:3370,y:GND,t:'grunt'},
      {x:3450,y:GND,t:'turret'},{x:3530,y:GND,t:'turret'},
      {x:3620,y:GND,t:'grunt'},{x:3680,y:GND,t:'grunt'},
    ];

    this.enemies=[];
    ED.forEach(ed=>{
      const tex=ed.t==='turret'?'e_turret':ed.t==='cap'?'e_grunt':'e_'+ed.t;

      sp.setActive(false).setVisible(false).setDepth(8);
      sp.body.setAllowGravity(ed.t!=='turret');
      if(ed.t!=='turret')sp.body.setGravityY(P_GRAV);
      sp.body.setSize(sp.width-4,sp.height-2);
      this.enemies.push({sp,t:ed.t,sx:ed.x,sy:ed.y,
        hp:ed.t==='turret'?3:ed.t==='cap'?1:1,
        active:false,alive:true,stCd:Phaser.Math.Between(50,140),
        dir:-1,wt:Phaser.Math.Between(40,100),
        drop:ed.d||null,dropChance:ed.t==='cap'?1:0.15});
      // Collide enemies with ground
      this.physics.add.collider(sp,this.ground);
      this.physics.add.collider(sp,this.platGroup);
    });

    // Pickups group
    this.pickups=[];

    // Boss sprite (hidden initially)
    this.bossSp=this.physics.add.image(WW+200,GND-40,'boss').setDepth(8).setAlpha(0);
    this.bossSp.body.setAllowGravity(false).setImmovable(true);
  }

  // ── Player ─────────────────────────────────────────────────────────────────
  mkPlayer(num,sx){
    const k=`p${num}`;
    const sp=this.physics.add.sprite(sx,GND-14,k+'_st');
    sp.setDepth(10).setCollideWorldBounds(true);
    sp.body.setGravityY(P_GRAV);
    sp.body.setSize(12,24).setOffset(4,4);
    return{sp,num,k,lives:this.startLives,continues:3,wpn:'D',
      inv:0,dead:false,deadT:0,faceX:1,aimX:1,aimY:0,
      shCD:0,wf:0,wt:0,cp:sx,onGnd:false};
  }

  setupColliders(){
    [this.p1,this.p2].filter(Boolean).forEach(p=>{
      this.physics.add.collider(p.sp,this.ground);
      this.physics.add.collider(p.sp,this.platGroup);
    });
  }

  // ── Keys ───────────────────────────────────────────────────────────────────
  setupKeys(){
    const kc=Phaser.Input.Keyboard.KeyCodes;
    this.k1={L:this.input.keyboard.addKey(kc.A),R:this.input.keyboard.addKey(kc.D),
              U:this.input.keyboard.addKey(kc.W),D:this.input.keyboard.addKey(kc.S),
              J:this.input.keyboard.addKey(kc.W), // jump same as up for p1
              S:this.input.keyboard.addKey(kc.F),
              S2:this.input.keyboard.addKey(kc.Z),
              S3:this.input.keyboard.addKey(kc.SPACE)};
    this.k2={L:this.input.keyboard.addKey(kc.LEFT),R:this.input.keyboard.addKey(kc.RIGHT),
              U:this.input.keyboard.addKey(kc.UP),D:this.input.keyboard.addKey(kc.DOWN),
              J:this.input.keyboard.addKey(kc.UP),
              S:this.input.keyboard.addKey(kc.SLASH),
              S2:this.input.keyboard.addKey(kc.PERIOD),
              S3:this.input.keyboard.addKey(kc.NUMPAD_ZERO)};
    // Jump edges
    this._j1=false;this._j2=false;
    this._tj1=false;
    this.input.keyboard.on('keydown-W',()=>this._j1=true);
    this.input.keyboard.on('keydown-UP',()=>this._j2=true);
  }

  // ── HUD emit ───────────────────────────────────────────────────────────────
  emitHUD(){
    this.events.emit('hud',{score:this.score,hi:this.hi,
      p1lives:this.p1.lives,p1wpn:this.p1.wpn,
      p2lives:this.p2?this.p2.lives:0,p2wpn:this.p2?this.p2.wpn:'D',np:this.np});
  }

  togglePause(){
    this._paused=!this._paused;
    this._paused?this.physics.pause():this.physics.resume();
    this.events.emit('paused',this._paused);
  }

  // ── Shoot ──────────────────────────────────────────────────────────────────
  doShoot(p){
    if(p.shCD>0)return;
    p.shCD=SHOOT_CD[p.wpn]||9;
    const ax=p.aimX,ay=p.aimY;
    const bx=p.sp.x+ax*16,by=p.sp.y+ay*8-4;

    if(p.wpn==='S'){
      // Spread: 5 bullets in a fan
      const angles=[-35,-17,0,17,35];
      angles.forEach(deg=>{
        const rad=Math.atan2(ay,ax)+deg*Math.PI/180;
        this.firePB(bx,by,Math.cos(rad)*B_SPEED,Math.sin(rad)*B_SPEED,'b_p',1);
      });
      SND.spread();
    }else if(p.wpn==='L'){
      this.firePB(bx,by,ax*B_SPEED,ay*B_SPEED,'b_laser',5,true);
      SND.laser();
    }else if(p.wpn==='F'){
      this.firePB(bx,by,ax*380,ay*380-80,'b_flame',2,false,true);
      SND.shoot();
    }else{ // D or R
      this.firePB(bx,by,ax*B_SPEED,ay*B_SPEED,'b_p',1);
      SND.shoot();
    }
    this.burst(bx,by,3,0xfef08a,60,0);
  }

  firePB(x,y,vx,vy,tex,dmg,laser=false,flame=false){
    const b=this.getpb();if(!b)return;
    b.setTexture(tex).setActive(true).setVisible(true);
    b.body.reset(x,y);b.body.setAllowGravity(flame);
    if(flame)b.body.setGravityY(400);
    b.setVelocity(vx,vy);b.dmg=dmg;b.laser=laser;b.ttl=80;b.pierced=0;
  }

  fireEB(x,y,tx,ty){
    const b=this.geteb();if(!b)return;
    const dist=Math.hypot(tx-x,ty-y)||1;
    const spd=EB_SPEED;
    b.setActive(true).setVisible(true);
    b.body.reset(x,y);
    b.setVelocity((tx-x)/dist*spd,(ty-y)/dist*spd);
    b.ttl=120;
  }

  // ── Player update ──────────────────────────────────────────────────────────
  updatePlayer(p,sec){
    const sp=p.sp;
    if(p.dead){
      p.deadT-=sec;
      if(p.deadT<=0){
        if(p.lives>0)this.respawn(p);
        else this.tryContinue(p);
      }
      return;
    }

    const onGnd=sp.body.blocked.down;
    p.onGnd=onGnd;
    const k=p.num===1?this.k1:this.k2;
    const isP1=p.num===1;

    const kL=k.L.isDown||(isP1&&TC.l);
    const kR=k.R.isDown||(isP1&&TC.r);
    const kU=k.U.isDown||(isP1&&TC.u);
    const kD=k.D.isDown||(isP1&&TC.d);
    const kJ=(isP1?(this._j1||TC.j):(this._j2));
    const kS=k.S.isDown||k.S2.isDown||k.S3.isDown||(isP1&&TC.s);

    // Crouch
    const crouch=onGnd&&kD&&!kL&&!kR;
    if(crouch){
      sp.setVelocityX(0);
      if(!sp.texture.key.endsWith('_cr')){sp.setTexture(p.k+'_cr');sp.body.setSize(12,16).setOffset(4,4);}
    }else{
      if(sp.texture.key.endsWith('_cr')){sp.body.setSize(12,24).setOffset(4,4);}
      // Move
      if(kL){sp.setVelocityX(-P_SPEED);sp.flipX=true;p.faceX=-1;}
      else if(kR){sp.setVelocityX(P_SPEED);sp.flipX=false;p.faceX=1;}
      else sp.setVelocityX(0);
      // Jump
      if(kJ&&onGnd){sp.setVelocityY(P_JUMP);SND.jump();}
    }
    if(isP1)this._j1=false;
    else this._j2=false;

    // 8-directional aim
    const d2=INV2;
    if(kU){
      if(kL){p.aimX=-d2;p.aimY=-d2;}
      else if(kR){p.aimX=d2;p.aimY=-d2;}
      else{p.aimX=0;p.aimY=-1;}
    }else if(kD&&!onGnd){p.aimX=0;p.aimY=1;}
    else{p.aimX=p.faceX;p.aimY=0;}

    // Shoot
    if(kS){this.doShoot(p);}
    if(p.shCD>0)p.shCD--;

    // Invincibility flash
    if(p.inv>0){
      p.inv--;sp.setAlpha(Math.floor(p.inv/5)%2===0?.3:1);
    }else sp.setAlpha(1);

    // Animation
    if(!sp.texture.key.endsWith('_cr')){
      if(!onGnd){sp.setTexture(p.k+'_jp');}
      else if(Math.abs(sp.body.velocity.x)>10){
        if(--p.wt<=0){p.wf^=1;sp.setTexture(p.k+'_r'+(p.wf+1));p.wt=8;}
      }else sp.setTexture(p.k+'_st');
    }

    // Checkpoint
    if(onGnd&&sp.x>p.cp+200)p.cp=sp.x;

    // Fell off world
    if(sp.y>GH+20)this.killPlayer(p);
  }

  respawn(p){
    const sp=p.sp;
    p.dead=false;
    sp.setActive(true).setVisible(true);
    sp.body.reset(p.cp,GND-14);
    p.inv=180;p.aimX=1;p.aimY=0;p.faceX=1;sp.flipX=false;
    sp.setTexture(p.k+'_st');
    sp.body.setSize(12,24).setOffset(4,4);
  }

  killPlayer(p){
    if(p.dead||p.inv>0)return;
    p.dead=true;p.deadT=2.5;p.lives--;
    p.sp.setActive(false).setVisible(false);
    this.burst(p.sp.x,p.sp.y,15,0xef4444,150,400);
    SND.die();
    this.events.emit('lives',{p:p.num,n:p.lives});
    this.cameras.main.shake(200,.015);
  }

  trycontinue(p){
    if(p.continues>0){p.continues--;p.lives=3;this.respawn(p);}
    else{
      // both players dead?
      const allDead=!this.p1||this.p1.dead&&this.p1.lives<=0;
      const allDead2=!this.p2||(this.p2.dead&&this.p2.lives<=0);
      if(allDead&&allDead2)this.triggerGameOver();
    }
  }

  tryContinue(p){this.trycontine||this.trycontine;
    if(p.continues>0){p.continues--;p.lives=3;this.respawn(p);}
    else this.checkAllDead();
  }

  checkAllDead(){
    const a=this.p1&&this.p1.dead&&this.p1.lives<=0;
    const b=!this.p2||(this.p2.dead&&this.p2.lives<=0);
    if(a&&b)this.triggerGameOver();
  }

  // ── Enemy AI ───────────────────────────────────────────────────────────────
  activateEnemies(){
    const camX=this.cameras.main.scrollX;
    this.enemies.forEach(e=>{
      if(!e.alive)return;
      if(e.active)return;
      if(Math.abs(e.sx-camX-GW/2)<GW*.8){
        e.active=true;
        e.sp.setActive(true).setVisible(true);
        e.sp.setPosition(e.sx,e.sy-14);
      }
    });
  }

  updateEnemies(sec){
    const players=[this.p1,this.p2].filter(p=>p&&!p.dead);
    this.enemies.forEach(e=>{
      if(!e.alive||!e.active)return;
      const sp=e.sp;
      // Find nearest player
      let target=players[0];
      if(players.length>1){
        const d1=Math.abs(sp.x-this.p1.sp.x);
        const d2=Math.abs(sp.x-this.p2.sp.x);
        target=d1<d2?this.p1:this.p2;
      }
      if(!target)return;
      const tx=target.sp.x,ty=target.sp.y;

      if(e.t==='turret'){
        // Turret: rotate to face player, shoot periodically
        if(--e.stCd<=0){
          this.fireEB(sp.x-8,sp.y-8,tx,ty);
          e.stCd=Phaser.Math.Between(60,90);
          SND.hit();
        }
      } else if(e.t==='grunt'){
        // Run toward player, stop and shoot when close
        const dist=Math.abs(sp.x-tx);
        if(--e.wt<=0){
          e.dir=tx<sp.x?-1:1;
          e.wt=Phaser.Math.Between(30,80);
        }
        if(dist>80){
          sp.setVelocityX(e.dir*70);
          sp.flipX=(e.dir<0);
        } else {
          sp.setVelocityX(0);
          sp.flipX=(tx<sp.x);
          if(--e.stCd<=0){
            this.fireEB(sp.x,sp.y-8,tx,ty);
            e.stCd=Phaser.Math.Between(40,80);
            SND.hit();
          }
        }
      } else if(e.t==='gunner'){
        // Stand still, shoot at player
        sp.setVelocityX(0);
        sp.flipX=(tx<sp.x);
        if(--e.stCd<=0){
          this.fireEB(sp.x+(sp.flipX?-12:12),sp.y-8,tx,ty);
          e.stCd=Phaser.Math.Between(45,70);
          SND.hit();
        }
      } else if(e.t==='cap'){
        // Walk slowly, doesn't shoot
        sp.setVelocityX(-50);sp.flipX=true;
      }
    });
  }

  killEnemy(e,silent=false){
    if(!e.alive)return;
    e.alive=false;e.active=false;
    e.sp.setActive(false).setVisible(false);
    if(!silent){
      this.burst(e.sp.x,e.sp.y,12,0xff8800,130,400);
      SND.explode();
    }
    this.score+=e.t==='turret'?500:e.t==='cap'?200:100;
    this.events.emit('score',this.score);
    // Drop weapon capsule
    if(e.drop||(Math.random()<e.dropChance)){
      this.dropCapsule(e.sp.x,e.sp.y,e.drop||(['S','R','L','F'][Math.floor(Math.random()*4)]));
    }
  }

  dropCapsule(x,y,type){
    const cap=this.add.image(x,y-10,'capsule').setDepth(12);
    // Letter label
    const lbl=this.add.text(x,y-12,type,{fontFamily:'monospace',fontSize:9,
      color:'#ff0000',stroke:'#fff',strokeThickness:2}).setOrigin(.5).setDepth(13);
    this.tweens.add({targets:[cap,lbl],y:y-24,duration:600,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    this.pickups.push({sp:cap,lbl,type,x,alive:true});
  }

  // ── Boss ───────────────────────────────────────────────────────────────────
  checkBossTrigger(){
    const camX=this.cameras.main.scrollX;
    if(!this.bossTriggered&&camX+GW>this.bossX-200){
      this.bossTriggered=true;
      this.spawnBoss();
    }
  }

  spawnBoss(){
    const b=this.bossSp;
    b.setPosition(this.bossX+40,GND-40).setAlpha(1);
    b.body.setSize(120,80).setImmovable(true);
    this.bossCanHP=[5,5,5];
    this.bossShotTimer=0;
    this.cameras.main.shake(300,.02);
    this.events.emit('boss',{hp:this.bossCanHP});
    SND.explode();
  }

  updateBoss(sec){
    if(!this.bossAlive||!this.bossTriggered)return;
    this.bossShotTimer-=sec;
    if(this.bossShotTimer<=0){
      // Each living cannon fires at nearest player
      const players=[this.p1,this.p2].filter(p=>p&&!p.dead);
      if(players.length===0){this.bossShotTimer=1;return;}
      const target=players[Math.floor(Math.random()*players.length)];
      const bx=this.bossSp.x,by=this.bossSp.y;
      const cannonX=[bx-48,bx,bx+48];
      this.bossCanHP.forEach((hp,i)=>{
        if(hp>0){
          this.fireEB(cannonX[i],by-40,target.sp.x,target.sp.y);
        }
      });
      this.bossShotTimer=.8;SND.hit();
    }
  }

  damageBossCannon(i){
    this.bossCanHP[i]--;
    this.burst(this.bossSp.x+(i-1)*50,this.bossSp.y-40,6,0xff8800,100,200);
    SND.hit();
    this.events.emit('boss',{hp:this.bossCanHP});
    if(this.bossCanHP[i]<=0){
      this.burst(this.bossSp.x+(i-1)*50,this.bossSp.y-40,16,0xff4400,200,400);
      SND.explode();
      if(this.bossCanHP.every(h=>h<=0)){
        this.bossAlive=false;
        this.bossSp.setAlpha(0);
        this.cameras.main.shake(500,.03);
        this.burst(this.bossSp.x,this.bossSp.y,30,0xff6600,250,300);
        this.score+=5000;
        this.time.delayedCall(2000,()=>this.triggerWin());
      }
    }
  }

  // ── Bullets ────────────────────────────────────────────────────────────────
  tickBullets(sec){
    // Player bullets
    for(const b of this.pbullets){
      if(!b.active)continue;
      b.ttl--;
      if(b.ttl<=0||b.x<-20||b.x>WW+20||b.y<-20||b.y>GH+20){
        b.setActive(false).setVisible(false);b.body.reset(-2000,-2000);continue;
      }
      // Check enemies
      for(const e of this.enemies){
        if(!e.alive||!e.active)continue;
        const sp=e.sp;
        if(Math.abs(b.x-sp.x)<sp.width/2+4&&Math.abs(b.y-sp.y)<sp.height/2+4){
          if(!b.laser){b.setActive(false).setVisible(false);b.body.reset(-2000,-2000);}
          else{b.pierced=(b.pierced||0)+1;if(b.pierced>3){b.setActive(false).setVisible(false);b.body.reset(-2000,-2000);}}
          e.hp-=(b.dmg||1);
          if(e.hp<=0)this.killEnemy(e);
          else{this.burst(sp.x,sp.y,4,0xff8800,80,200);SND.hit();}
          if(!b.laser)break;
        }
      }
      // Check boss
      if(this.bossTriggered&&this.bossAlive&&b.active){
        const bsp=this.bossSp;
        const bx=bsp.x,by=bsp.y;
        if(Math.abs(b.x-bx)<70&&Math.abs(b.y-by)<50){
          // Which cannon was hit?
          const cannonX=[bx-48,bx,bx+48];
          let closest=0,minD=Infinity;
          cannonX.forEach((cx,i)=>{if(this.bossCanHP[i]>0){const d=Math.abs(b.x-cx);if(d<minD){minD=d;closest=i;}}});
          if(!b.laser){b.setActive(false).setVisible(false);b.body.reset(-2000,-2000);}
          this.damageBossCannon(closest);
        }
      }
    }
    // Enemy bullets
    for(const b of this.ebullets){
      if(!b.active)continue;
      b.ttl--;
      if(b.ttl<=0||b.x<-20||b.x>WW+20||b.y<-20||b.y>GH+20){
        b.setActive(false).setVisible(false);b.body.reset(-2000,-2000);continue;
      }
      // Check players
      [this.p1,this.p2].filter(Boolean).forEach(p=>{
        if(p.dead||p.inv>0||!b.active)return;
        const sp=p.sp;
        if(Math.abs(b.x-sp.x)<12&&Math.abs(b.y-sp.y)<14){
          b.setActive(false).setVisible(false);b.body.reset(-2000,-2000);
          this.killPlayer(p);
        }
      });
    }
  }

  // ── Pickups ────────────────────────────────────────────────────────────────
  tickPickups(){
    [this.p1,this.p2].filter(Boolean).forEach(p=>{
      if(p.dead)return;
      this.pickups.forEach(pk=>{
        if(!pk.alive)return;
        if(Math.abs(pk.x-p.sp.x)<20&&Math.abs(pk.sp.y-p.sp.y)<30){
          pk.alive=false;pk.sp.destroy();pk.lbl.destroy();
          p.wpn=pk.type;
          this.events.emit('wpn',{p:p.num,w:pk.type});
          SND.pickup();
          this.burst(pk.x,pk.sp.y,8,0xfbbf24,100,200);
        }
      });
    });
    this.pickups=this.pickups.filter(pk=>pk.alive);
  }

  // ── Enemy touch ────────────────────────────────────────────────────────────
  checkEnemyTouch(){
    [this.p1,this.p2].filter(Boolean).forEach(p=>{
      if(p.dead||p.inv>0)return;
      const sp=p.sp;
      this.enemies.forEach(e=>{
        if(!e.alive||!e.active)return;
        if(Math.abs(e.sp.x-sp.x)<14&&Math.abs(e.sp.y-sp.y)<16)this.killPlayer(p);
      });
    });
  }

  // ── Parallax ───────────────────────────────────────────────────────────────
  updateParallax(){
    const sx=this.cameras.main.scrollX;
    this.bgFar.tilePositionX=sx*.1;
    this.bgNear.tilePositionX=sx*.35;
  }

  // ── End states ─────────────────────────────────────────────────────────────
  triggerGameOver(){
    this.physics.pause();
    const hi=Math.max(this.score,this.hi);
    localStorage.setItem('contra_hi',hi);
    this.time.delayedCall(800,()=>{
      this.scene.stop('UI');
      this.scene.start('GameOver',{score:this.score,hi});
    });
  }

  triggerWin(){
    this.physics.pause();this.stageClear=true;
    const hi=Math.max(this.score,this.hi);
    localStorage.setItem('contra_hi',hi);
    this.time.delayedCall(1500,()=>{
      this.scene.stop('UI');
      this.scene.start('Win',{score:this.score,hi});
    });
  }

  // ── Main update ────────────────────────────────────────────────────────────
  update(_,delta){
    if(this._paused||this.stageClear)return;
    const sec=delta/1000;
    this.updateParallax();
    this.updatePlayer(this.p1,sec);
    if(this.p2)this.updatePlayer(this.p2,sec);
    this.activateEnemies();
    this.updateEnemies(sec);
    this.tickBullets(sec);
    this.tickPartsAlias(sec);
    this.tickPickups();
    this.checkEnemyTouch();
    if(this.bossTriggered&&this.bossAlive)this.updateBoss(sec);
    this.checkBossTrigger();
  }

  tickPartsAlias(sec){this.tickParts(sec);}
}

// ─── UI Scene ─────────────────────────────────────────────────────────────────
class UIScene extends Phaser.Scene{
  constructor(){super('UI');}
  create(){
    const W=GW,H=GH;
    const gs=this.scene.get('Game');

    // HUD bar
    this.add.rectangle(W/2,8,W,16,0x000000,.75).setScrollFactor(0).setDepth(50);

    this.sc1=this.add.text(4,2,'P1 ♥♥♥',{fontFamily:'monospace',fontSize:9,color:'#ef4444'}).setScrollFactor(0).setDepth(51);
    this.sc2=this.add.text(4,10,'RIFLE',{fontFamily:'monospace',fontSize:8,color:'#fbbf24'}).setScrollFactor(0).setDepth(51);
    this.scoreTx=this.add.text(W/2,2,'0000000',{fontFamily:'monospace',fontSize:9,color:'#ffd700'}).setOrigin(.5,0).setScrollFactor(0).setDepth(51);
    this.hiTx=this.add.text(W-4,2,'HI 0000000',{fontFamily:'monospace',fontSize:8,color:'#aaa'}).setOrigin(1,0).setScrollFactor(0).setDepth(51);
    this.p2Tx=this.add.text(W-4,10,'',{fontFamily:'monospace',fontSize:8,color:'#f87171'}).setOrigin(1,0).setScrollFactor(0).setDepth(51);

    // Pause
    this.pauseBg=this.add.rectangle(W/2,H/2,W,H,0,0.7).setScrollFactor(0).setDepth(60).setVisible(false);
    this.pauseTx=this.add.text(W/2,H/2,'PAUSED  —  P or ESC',{fontFamily:'monospace',fontSize:18,color:'#fff'}).setOrigin(.5).setScrollFactor(0).setDepth(61).setVisible(false);

    // Boss HP
    this.bossBg=this.add.rectangle(W/2,H-10,300,8,0x550000,.9).setScrollFactor(0).setDepth(51).setVisible(false);
    this.bossBar=[
      this.add.rectangle(W/2-90,H-10,90,6,0xef4444,1).setScrollFactor(0).setDepth(52).setVisible(false),
      this.add.rectangle(W/2,H-10,90,6,0xef4444,1).setScrollFactor(0).setDepth(52).setVisible(false),
      this.add.rectangle(W/2+90,H-10,90,6,0xef4444,1).setScrollFactor(0).setDepth(52).setVisible(false),
    ];
    this.bossTx=this.add.text(W/2,H-20,'☠ BOSS',{fontFamily:'monospace',fontSize:9,color:'#ef4444'}).setOrigin(.5).setScrollFactor(0).setDepth(52).setVisible(false);
    this.bossMHP=[5,5,5];

    gs.events.on('hud',d=>{
      this.scoreTx.setText(String(d.score).padStart(7,'0'));
      this.hiTx.setText('HI '+String(d.hi).padStart(7,'0'));
      this.sc1.setText(`P1 ${'♥'.repeat(Math.max(0,d.p1lives))}`);
      this.sc2.setText(d.p1wpn||'RIFLE');
      if(d.np>=2)this.p2Tx.setText(`P2 ${'♥'.repeat(Math.max(0,d.p2lives))}`);
    },this);
    gs.events.on('score',v=>this.scoreTx.setText(String(v).padStart(7,'0')),this);
    gs.events.on('lives',d=>{
      if(d.p===1)this.sc1.setText(`P1 ${'♥'.repeat(Math.max(0,d.n))}`);
      else this.p2Tx.setText(`P2 ${'♥'.repeat(Math.max(0,d.n))}`);
    },this);
    gs.events.on('wpn',d=>{
      if(d.p===1)this.sc2.setText(d.w);
    },this);
    gs.events.on('paused',v=>{this.pauseBg.setVisible(v);this.pauseTx.setVisible(v);},this);
    gs.events.on('boss',d=>{
      [this.bossBg,this.bossTx,...this.bossBar].forEach(o=>o.setVisible(true));
      this.bossMHP=d.hp;
      const maxW=86;
      this.bossBar.forEach((b,i)=>{
        const pct=Math.max(0,d.hp[i]/5);
        b.setDisplaySize(maxW*pct,6).setX(GW/2+(i-1)*92-(maxW*(1-pct)/2));
      });
    },this);
  }
}

// ─── Game Over ────────────────────────────────────────────────────────────────
class GameOverScene extends Phaser.Scene{
  constructor(){super('GameOver');}
  init(d){this.sc=d.score||0;this.hi=d.hi||0;}
  create(){
    const W=GW,H=GH;
    this.add.image(W/2,H/2,'sky').setDisplaySize(W,H);
    this.add.rectangle(W/2,H/2,320,160,0,0.85);
    this.add.text(W/2,H/2-60,'GAME  OVER',{fontFamily:'monospace',fontSize:32,color:'#ef4444',stroke:'#7f1d1d',strokeThickness:4}).setOrigin(.5);
    this.add.text(W/2,H/2-10,`SCORE  ${String(this.sc).padStart(7,'0')}`,{fontFamily:'monospace',fontSize:14,color:'#fbbf24'}).setOrigin(.5);
    this.add.text(W/2,H/2+16,`HI-SCORE  ${String(this.hi).padStart(7,'0')}`,{fontFamily:'monospace',fontSize:12,color:'#aaa'}).setOrigin(.5);
    const t=this.add.text(W/2,H/2+52,'PRESS  ENTER  /  TAP  TO  RETRY',{fontFamily:'monospace',fontSize:12,color:'#fff'}).setOrigin(.5);
    this.tweens.add({targets:t,alpha:0,duration:500,yoyo:true,repeat:-1});
    const go=()=>{this.scene.start('Game');this.scene.launch('UI');};
    this.input.keyboard.once('keydown-RETURN',go);
    this.input.keyboard.once('keydown-SPACE',go);
    this.input.keyboard.once('keydown-ESC',()=>this.scene.start('Title'));
    this.input.once('pointerdown',go);
  }
}

// ─── Win ──────────────────────────────────────────────────────────────────────
class WinScene extends Phaser.Scene{
  constructor(){super('Win');}
  init(d){this.sc=d.score||0;this.hi=d.hi||0;}
  create(){
    const W=GW,H=GH;
    this.add.image(W/2,H/2,'sky').setDisplaySize(W,H);
    // Stars burst
    for(let i=0;i<20;i++){
      const s=this.add.text(Math.random()*W,Math.random()*H,'★',{fontSize:16,color:'#fbbf24'});
      this.tweens.add({targets:s,alpha:0,duration:600+Math.random()*900,yoyo:true,repeat:-1,delay:Math.random()*600});
    }
    this.add.rectangle(W/2,H/2,340,180,0,0.82);
    this.add.text(W/2,H/2-72,'MISSION  COMPLETE',{fontFamily:'monospace',fontSize:20,color:'#fbbf24',stroke:'#92400e',strokeThickness:3}).setOrigin(.5);
    this.add.text(W/2,H/2-40,'STAGE  1  CLEAR',{fontFamily:'monospace',fontSize:14,color:'#4ade80'}).setOrigin(.5);
    this.add.text(W/2,H/2+0,`SCORE  ${String(this.sc).padStart(7,'0')}`,{fontFamily:'monospace',fontSize:14,color:'#fbbf24'}).setOrigin(.5);
    this.add.text(W/2,H/2+24,`HI-SCORE  ${String(this.hi).padStart(7,'0')}`,{fontFamily:'monospace',fontSize:12,color:'#aaa'}).setOrigin(.5);
    const t=this.add.text(W/2,H/2+66,'PRESS  ENTER  /  TAP  TO  PLAY  AGAIN',{fontFamily:'monospace',fontSize:11,color:'#fff'}).setOrigin(.5);
    this.tweens.add({targets:t,alpha:0,duration:500,yoyo:true,repeat:-1});
    this.add.text(W/2,H-14,'ESC = TITLE',{fontFamily:'monospace',fontSize:9,color:'#666'}).setOrigin(.5);
    const go=()=>{this.scene.start('Game');this.scene.launch('UI');};
    this.input.keyboard.once('keydown-RETURN',go);
    this.input.keyboard.once('keydown-SPACE',go);
    this.input.keyboard.once('keydown-ESC',()=>this.scene.start('Title'));
    this.input.once('pointerdown',go);
  }
}
