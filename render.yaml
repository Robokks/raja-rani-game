services:
  # Realtime game server (Neon Racer rooms)
  - type: web
    name: gamezone-race-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /

  # The Game Zone website itself (static hosting, free)
  - type: web
    name: gamezone-portal
    runtime: static
    buildCommand: ""
    staticPublishPath: .
