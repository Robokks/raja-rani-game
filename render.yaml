services:
  # Realtime game server (Neon Racer rooms)
  - type: web
    name: gamezone-race-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      # Shared secret for ephemeral TURN tokens (GET /turn). Must byte-match the
      # coturn static-auth-secret. Set the real value in the Render dashboard;
      # sync:false keeps it out of git — never commit the secret itself.
      - key: TURN_SECRET
        sync: false
      - key: TURN_HOST
        value: 140.245.220.65

  # The Game Zone website itself (static hosting, free)
  - type: web
    name: gamezone-portal
    runtime: static
    buildCommand: ""
    staticPublishPath: .
