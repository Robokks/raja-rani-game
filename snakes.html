<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snakes & Ladders | Raja Rani Games</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@500;700;800&family=Catamaran:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--kraft:#d9b98a;--paper:#fdf6e3;--ink:#3a2a18;--red:#e74c3c;--green:#27ae60;--gold:#d49a2a;--blue:#2980b9;--yellow:#f0b429;--shadow:rgba(58,42,24,.25);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;}
body{font-family:'Baloo Thambi 2','Catamaran',sans-serif;background:var(--kraft);background-image:radial-gradient(circle at 20% 10%,rgba(255,255,255,.25),transparent 40%),radial-gradient(circle at 80% 90%,rgba(0,0,0,.08),transparent 45%);color:var(--ink);display:flex;flex-direction:column;align-items:center;min-height:100%;padding:16px 14px 80px;user-select:none;}
.screen{display:none;width:100%;max-width:480px;animation:fadein .3s ease;}
.screen.active{display:block;}
@keyframes fadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
h1{text-align:center;font-weight:800;font-size:28px;color:var(--ink);text-shadow:1px 2px 0 rgba(255,255,255,.5);margin-top:6px;}
.sub{text-align:center;font-family:'Catamaran';font-size:13px;font-weight:600;opacity:.7;margin-top:2px;letter-spacing:2px;text-transform:uppercase;}
.err{text-align:center;color:var(--red);font-weight:700;margin-top:8px;min-height:20px;font-size:14px;}
.panel{background:var(--paper);border-radius:6px;box-shadow:0 6px 0 var(--shadow),0 10px 24px rgba(0,0,0,.12);padding:20px 18px;margin-top:16px;position:relative;}
.panel::before{content:"";position:absolute;inset:6px;border:1.5px dashed rgba(58,42,24,.25);border-radius:4px;pointer-events:none;}
label{font-family:'Catamaran';font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;opacity:.65;display:block;margin:12px 0 4px;}
input[type=text]{width:100%;padding:10px 12px;font-family:'Baloo Thambi 2';font-size:18px;font-weight:700;border:2px solid rgba(58,42,24,.3);border-radius:6px;background:#fffdf6;color:var(--ink);outline:none;}
input[type=text]:focus{border-color:var(--red);}
input.code{text-transform:uppercase;letter-spacing:6px;text-align:center;font-size:24px;}
.btn{display:block;width:100%;margin-top:16px;padding:14px 0;font-family:'Baloo Thambi 2';font-size:19px;font-weight:800;background:var(--red);color:#fff;border:none;border-radius:8px;cursor:pointer;box-shadow:0 5px 0 #a93226;transition:transform .08s,box-shadow .08s;}
.btn:active{transform:translateY(4px);box-shadow:0 1px 0 #a93226;}
.btn.green{background:var(--green);box-shadow:0 5px 0 #1e8449;}
.btn.green:active{box-shadow:0 1px 0 #1e8449;}
.btn.blue{background:var(--blue);box-shadow:0 5px 0 #1a5276;}
.btn.blue:active{box-shadow:0 1px 0 #1a5276;}
.btn.ghost{background:transparent;color:var(--ink);box-shadow:none;border:2px solid rgba(58,42,24,.4);font-size:15px;padding:9px 0;}
.btn:disabled{opacity:.5;pointer-events:none;}
.waiting{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;font-weight:700;opacity:.7;}
.dotpulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--ink);animation:pulse 1s infinite alternate;}
.dotpulse:nth-child(2){animation-delay:.2s;}.dotpulse:nth-child(3){animation-delay:.4s;}
@keyframes pulse{from{opacity:.2;transform:scale(.7);}to{opacity:1;transform:scale(1);}}
.roomcode{font-size:44px;font-weight:800;letter-spacing:10px;text-align:center;color:var(--ink);background:#fffdf6;border:2px dashed rgba(58,42,24,.35);border-radius:8px;padding:10px 0;margin-top:10px;}
.player-list{margin-top:12px;}
.pl-row{display:flex;align-items:center;gap:10px;background:#fffdf6;border-radius:6px;padding:10px 14px;margin-top:8px;font-weight:700;font-size:16px;border:1.5px solid rgba(58,42,24,.15);}
.pl-tag{font-family:'Catamaran';font-size:11px;font-weight:800;letter-spacing:1px;padding:2px 8px;border-radius:10px;color:#fff;background:var(--ink);white-space:nowrap;}
.pl-row.empty{opacity:.45;font-weight:600;border-style:dashed;}
.kick-btn{background:none;border:none;color:var(--red);font-size:17px;font-weight:800;cursor:pointer;padding:2px 6px;margin-left:auto;line-height:1;flex-shrink:0;}
.conn-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;background:#888;vertical-align:middle;}
.conn-dot.ok{background:#27ae60;}.conn-dot.err{background:#e74c3c;}
.back-link{display:block;text-align:center;font-family:'Catamaran';font-size:13px;font-weight:700;color:var(--ink);opacity:.55;margin-top:18px;text-decoration:none;letter-spacing:1px;}
.back-link:hover{opacity:.9;}
#conn-banner{display:none;position:fixed;top:0;left:0;right:0;background:var(--red);color:#fff;font-family:'Baloo Thambi 2';font-size:14px;font-weight:700;text-align:center;padding:8px;z-index:9999;}
/* Board */
#sl-board{display:grid;grid-template-columns:repeat(10,1fr);grid-template-rows:repeat(10,1fr);width:100%;aspect-ratio:1;border:2.5px solid var(--ink);border-radius:6px;overflow:hidden;background:#fffdf6;margin-top:10px;position:relative;}
.sl-cell{border-right:1px solid rgba(58,42,24,.22);border-bottom:1px solid rgba(58,42,24,.22);display:flex;flex-direction:column;align-items:center;padding:1px;position:relative;}
.cell-num{font-size:7px;font-weight:800;opacity:.75;align-self:flex-start;line-height:1.2;flex-shrink:0;color:rgba(58,42,24,.7);}
.cell-tokens{display:flex;flex-wrap:wrap;gap:1px;justify-content:center;margin-top:auto;}
/* Game UI */
.game-panel{background:var(--paper);border-radius:6px;box-shadow:0 4px 0 var(--shadow);padding:12px 16px;margin-top:8px;width:100%;max-width:480px;}
.dice-row{display:flex;align-items:center;justify-content:center;gap:14px;}
.dice-face{font-size:50px;line-height:1;cursor:pointer;transition:transform .12s;display:block;}
.dice-face:active{transform:scale(.88);}
@keyframes diceShake{0%{transform:rotate(-20deg)scale(1.3);}25%{transform:rotate(14deg)scale(.92);}50%{transform:rotate(-10deg)scale(1.15);}75%{transform:rotate(7deg)scale(.97);}100%{transform:rotate(0)scale(1);}}
@keyframes diceLand{0%{transform:scale(1.5);}60%{transform:scale(.9);}100%{transform:scale(1);}}
.dice-face.rolling{animation:diceShake .1s ease-in-out infinite;cursor:default;}
.dice-face.dice-land{animation:diceLand .3s cubic-bezier(.34,1.56,.64,1) forwards;}
.turn-msg{font-weight:800;font-size:15px;flex:1;text-align:center;line-height:1.3;}
.move-msg{text-align:center;font-family:'Catamaran';font-size:13px;font-weight:700;min-height:20px;margin-top:8px;opacity:.8;}
.roll-btn{margin-top:10px;padding:12px 0;font-size:17px;}
/* Players */
.sl-players{display:flex;flex-direction:column;gap:6px;margin-top:8px;width:100%;max-width:480px;}
.sl-prow{display:flex;align-items:center;gap:8px;background:var(--paper);border-radius:6px;padding:8px 12px;box-shadow:0 2px 0 var(--shadow);border:2px solid transparent;}
.sl-prow.active-p{border-width:2.5px;}
.sl-pdot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.sl-pname{font-weight:800;font-size:14px;flex:1;}
.sl-ppos{font-family:'Catamaran';font-size:13px;font-weight:700;opacity:.7;}
/* Over */
.winner-box{text-align:center;padding:16px 0;}
.winner-emoji{font-size:56px;line-height:1;}
.winner-name{font-size:24px;font-weight:800;margin-top:8px;}
/* Chat */
.chat-panel{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--paper);border-top:2px solid rgba(58,42,24,.2);border-radius:12px 12px 0 0;box-shadow:0 -4px 16px rgba(0,0,0,.15);z-index:100;transition:transform .25s ease;}
.chat-panel.collapsed{transform:translateY(calc(100% - 46px));}
.chat-header{height:46px;padding:0 16px;display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:800;font-size:15px;}
.chat-badge{background:var(--red);color:#fff;border-radius:10px;font-size:11px;padding:1px 6px;font-weight:800;}
.chat-toggle{margin-left:auto;font-size:12px;opacity:.6;}
.chat-messages{height:170px;overflow-y:auto;padding:8px 14px;display:flex;flex-direction:column;gap:5px;}
.chat-bubble{font-size:13px;font-weight:600;line-height:1.4;}
.chat-bubble .who{font-weight:800;color:var(--red);}
.chat-bubble.me .who{color:var(--green);}
.chat-input-row{display:flex;gap:8px;padding:8px 14px 14px;}
.chat-input-row input{flex:1;padding:8px 10px;font-family:'Baloo Thambi 2';font-size:15px;font-weight:700;border:2px solid rgba(58,42,24,.3);border-radius:6px;background:#fffdf6;color:var(--ink);outline:none;}
.chat-input-row input:focus{border-color:var(--red);}
.chat-send{padding:8px 16px;font-family:'Baloo Thambi 2';font-size:14px;font-weight:800;background:var(--red);color:#fff;border:none;border-radius:6px;cursor:pointer;}
</style>
</head>
<body>
<div id="conn-banner">Connection lost — reconnecting…</div>

<!-- HOME -->
<div class="screen active" id="scr-home">
  <h1>🐍 Snakes &amp; Ladders</h1>
  <p class="sub">பாம்பு மற்றும் ஏணி</p>
  <div class="panel">
    <label>Your Name</label>
    <input type="text" id="home-name" maxlength="18" placeholder="Enter name…" autocomplete="off">
    <button class="btn green" onclick="createRoom()">Create Room</button>
    <label style="margin-top:18px;">Join with Code</label>
    <input type="text" id="home-code" class="code" maxlength="4" placeholder="ABCD" autocomplete="off">
    <button class="btn blue" onclick="joinRoom()">Join Room</button>
    <div class="err" id="home-err"></div>
    <label style="margin-top:18px;">ntfy Server</label>
    <div style="display:flex;align-items:center;gap:8px;margin-top:4px;">
      <span class="conn-dot" id="ntfy-dot"></span>
      <input type="text" id="ntfy-url" style="flex:1;font-size:14px;" placeholder="https://ntfy.sh">
    </div>
    <div style="font-family:'Catamaran';font-size:11px;opacity:.55;margin-top:4px;" id="ntfy-status"></div>
  </div>
  <a class="back-link" href="index.html">← All Games</a>
</div>

<!-- LOBBY -->
<div class="screen" id="scr-lobby">
  <h1>🐍 Snakes &amp; Ladders</h1>
  <p class="sub">Waiting for players</p>
  <div class="panel">
    <label>Room Code</label>
    <div class="roomcode" id="lobby-code">----</div>
    <button class="btn ghost" onclick="copyCode()" style="margin-top:10px;">Copy Code</button>
    <div id="sl-host-opts" style="display:none;">
      <label>Max Players</label>
      <div class="np-picker" id="sl-np-picker">
        <button class="np-btn" onclick="setNumPlayers(2)">2</button>
        <button class="np-btn" onclick="setNumPlayers(3)">3</button>
        <button class="np-btn active" onclick="setNumPlayers(4)">4</button>
      </div>
    </div>
    <div id="lobby-maxplayers" style="display:none;font-family:'Catamaran';font-size:13px;opacity:.6;margin:8px 0 0;"></div>
    <label>Players</label>
    <div class="player-list" id="lobby-players"></div>
    <div id="lobby-monitor" style="display:none;margin-top:10px;font-family:'Catamaran';font-size:12px;opacity:.7;text-align:center;word-break:break-all;"></div>
    <button class="btn green" id="lobby-start" style="display:none;" onclick="hostStart()">Start Game</button>
    <div class="waiting" id="lobby-wait" style="display:none;">
      <span class="dotpulse"></span><span class="dotpulse"></span><span class="dotpulse"></span>
      <span>Waiting for host…</span>
    </div>
    <div class="err" id="lobby-err"></div>
  </div>
  <a class="back-link" href="#" onclick="leaveRoom()">← Leave Room</a>
</div>

<!-- GAME -->
<div class="screen" id="scr-game">
  <div id="sl-board"></div>
  <div class="game-panel">
    <div class="dice-row">
      <div class="dice-face" id="dice-face" onclick="rollDice()">⚀</div>
      <div class="turn-msg" id="turn-msg">—</div>
    </div>
    <div class="move-msg" id="move-msg"></div>
    <button class="btn roll-btn" id="btn-roll" onclick="rollDice()" style="display:none;">🎲 Roll Dice</button>
  </div>
  <div class="sl-players" id="sl-players"></div>
</div>

<!-- OVER -->
<div class="screen" id="scr-over">
  <h1>🐍 Snakes &amp; Ladders</h1>
  <div class="panel">
    <div class="winner-box" id="winner-box"></div>
    <button class="btn green" id="btn-playagain" style="display:none;" onclick="playAgain()">Play Again</button>
    <div class="waiting" id="over-wait" style="display:none;">
      <span class="dotpulse"></span><span class="dotpulse"></span><span class="dotpulse"></span>
      <span>Waiting for host…</span>
    </div>
  </div>
  <a class="back-link" href="#" onclick="leaveRoom()">← Leave Room</a>
</div>

<!-- CHAT -->
<div class="chat-panel collapsed" id="chat-panel" style="display:none;">
  <div class="chat-header" onclick="toggleChat()">💬 <span>Chat</span><span class="chat-badge" id="chat-badge" style="display:none;"></span><span class="chat-toggle" id="chat-icon">▲</span></div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-row"><input type="text" id="chat-input" maxlength="100" placeholder="Message…" autocomplete="off" onkeydown="if(event.key==='Enter')submitChat()"><button class="chat-send" onclick="submitChat()">Send</button></div>
</div>

<script>
const SNAKES  = {17:7,54:34,62:19,64:60,87:24,93:73,95:75,99:78};
const LADDERS = {4:14,9:31,20:38,28:84,40:59,51:67,63:81,71:91};
const PCOLORS = ['#e74c3c','#3498db','#2ecc71','#f0b429'];
const FACES   = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
const RNAMES  = ['SwiftTiger','BoldLion','BravePanda','CleverFox','LuckyDragon','WildNinja','EpicShark','SneakyOwl','MightyWolf','RoyalEagle','CoolBear','DarkPhoenix'];
function randomName(){ return RNAMES[Math.floor(Math.random()*RNAMES.length)]; }

let NTFY = normalizeNtfy(
  localStorage.getItem('sl-ntfy-url') ||
  localStorage.getItem('lu-ntfy-url') ||
  localStorage.getItem('rr-ntfy-url') ||
  'https://ntfy.sh'
);
let myId   = localStorage.getItem('sl-pid') || uid();
let myName = localStorage.getItem('sl-name') || '';
let roomCode = '', state = null, lastVer = 0, roomEs = null, chatEs = null;
let busy = false, animating = false;
let presEs = null, heartbeatInterval = null;
const lastSeenMap = {};
let chatCollapsed = true, unreadCount = 0;
const seenMsgs = new Set();
localStorage.setItem('sl-pid', myId);

function uid(){ return Math.random().toString(36).slice(2,10); }
function normalizeNtfy(r){ let v=(r||'https://ntfy.sh').trim();try{v=new URL(v).origin;}catch{}return v.replace(/\/+$/,'')||'https://ntfy.sh'; }
function $(id){ return document.getElementById(id); }
function deepCopy(o){ return JSON.parse(JSON.stringify(o)); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function randCode(){ return Array.from({length:4},()=>'ABCDEFGHJKLMNPQRSTUVWXYZ'[Math.floor(Math.random()*23)]).join(''); }

function topic(code){ return 'sl-'+code+'-s'; }

async function readRoom(code){
  for(let a=0;a<3;a++){
    if(a>0) await new Promise(r=>setTimeout(r,1500));
    try{
      const res=await fetch(NTFY+'/'+topic(code)+'/json?poll=1&since=all');
      if(!res.ok) continue;
      const text=await res.text(); let latest=null;
      for(const line of text.trim().split('\n').filter(Boolean)){
        try{ const ev=JSON.parse(line); if(ev.event==='message'&&ev.message){ const s=JSON.parse(ev.message); if(!latest||(s.version||0)>(latest.version||0)) latest=s; } }catch{}
      }
      if(latest) return latest;
    }catch{}
  }
  return null;
}

function writeRoom(s){
  s.version=(s.version||0)+1; s.ts=Date.now();
  fetch(NTFY+'/'+topic(s.code),{method:'POST',body:JSON.stringify(s)}).catch(()=>onConnLost());
  state=s; lastVer=s.version; render();
}

function subscribeRoom(code){
  if(roomEs) roomEs.close();
  const since=Math.floor((Date.now()-5000)/1000);
  roomEs=new EventSource(NTFY+'/'+topic(code)+'/sse?since='+since);
  roomEs.onmessage=e=>{
    try{
      const ev=JSON.parse(e.data); if(ev.event!=='message') return;
      const s=JSON.parse(ev.message); if((s.version||0)<=lastVer) return;
      lastVer=s.version; state=s; render();
    }catch{}
  };
  roomEs.onerror=()=>onConnLost();
  roomEs.onopen=()=>onConnBack();
}

function subscribePresence(code){
  if(presEs) presEs.close();
  presEs=new EventSource(NTFY+'/sl-'+code+'-pres/sse?since='+Math.floor((Date.now()-25000)/1000));
  presEs.onmessage=e=>{
    try{
      const ev=JSON.parse(e.data); if(ev.event!=='message') return;
      const d=JSON.parse(ev.message);
      if(d.id&&d.ts) lastSeenMap[d.id]={ts:Date.now(),ping:Math.max(0,Date.now()-d.ts)};
    }catch{}
  };
}
function pingPresence(){
  if(!roomCode) return;
  fetch(NTFY+'/sl-'+roomCode+'-pres',{method:'POST',body:JSON.stringify({id:myId,name:myName,ts:Date.now()})}).catch(()=>{});
}
function pingBadge(pid){
  if(pid===myId) return '<span style="font-family:Catamaran;font-size:11px;opacity:.45;margin-left:auto;">you</span>';
  const p=lastSeenMap[pid];
  if(!p||Date.now()-p.ts>25000) return '<span style="color:#888;font-size:13px;margin-left:auto;">⚫</span>';
  const ms=p.ping, col=ms<400?'#27ae60':ms<1000?'#d49a2a':'#e74c3c';
  const lbl=ms<1000?ms+'ms':(ms/1000).toFixed(1)+'s';
  return '<span style="color:'+col+';font-size:11px;font-family:Catamaran;font-weight:700;margin-left:auto;">● '+lbl+'</span>';
}

function subscribeChat(code){
  if(chatEs) chatEs.close();
  chatEs=new EventSource(NTFY+'/sl-'+code+'-c/sse?since='+Math.floor((Date.now()-60000)/1000));
  chatEs.onmessage=e=>{
    try{
      const ev=JSON.parse(e.data); if(ev.event!=='message') return;
      const msg=JSON.parse(ev.message); if(seenMsgs.has(msg.id)) return;
      seenMsgs.add(msg.id); appendMsg(msg);
    }catch{}
  };
}

function appendMsg(msg){
  const el=$('chat-messages'); if(!el) return;
  const isMe=msg.senderId===myId;
  const d=document.createElement('div');
  d.className='chat-bubble'+(isMe?' me':'');
  d.innerHTML='<span class="who">'+esc(msg.senderName)+':</span> '+esc(msg.text);
  el.appendChild(d); el.scrollTop=el.scrollHeight;
  if(chatCollapsed&&!isMe){ unreadCount++; const b=$('chat-badge'); if(b){b.textContent=unreadCount;b.style.display='inline';} }
}

function toggleChat(){
  chatCollapsed=!chatCollapsed;
  const p=$('chat-panel');
  if(chatCollapsed){ p.classList.add('collapsed'); $('chat-icon').textContent='▲'; }
  else{ p.classList.remove('collapsed'); $('chat-icon').textContent='▼'; unreadCount=0; const b=$('chat-badge'); if(b) b.style.display='none'; }
}

function submitChat(){
  const inp=$('chat-input'); if(!inp) return;
  const text=inp.value.trim(); if(!text||!roomCode) return;
  inp.value='';
  fetch(NTFY+'/sl-'+roomCode+'-c',{method:'POST',body:JSON.stringify({id:uid(),senderId:myId,senderName:myName,text})}).catch(()=>{});
}

function onConnLost(){ $('conn-banner').style.display='block'; }
function onConnBack(){ $('conn-banner').style.display='none'; }

// ntfy URL setup
(function(){
  const inp=$('ntfy-url'); inp.value=NTFY;
  function check(){
    NTFY=normalizeNtfy(inp.value); inp.value=NTFY; localStorage.setItem('sl-ntfy-url',NTFY);
    $('ntfy-dot').className='conn-dot'; $('ntfy-status').textContent='Checking…';
    fetch(NTFY+'/',{method:'HEAD'})
      .then(()=>{ $('ntfy-dot').className='conn-dot ok'; $('ntfy-status').textContent=NTFY+' ✓'; })
      .catch(()=>{ $('ntfy-dot').className='conn-dot err'; $('ntfy-status').textContent='Cannot reach '+NTFY; });
  }
  inp.addEventListener('blur',check); check();
})();

// Pre-fill name
(function(){
  const inp=$('home-name');
  if(!myName){ myName=randomName(); localStorage.setItem('sl-name',myName); }
  inp.value=myName;
  inp.addEventListener('input',()=>{ myName=inp.value.trim(); localStorage.setItem('sl-name',myName); });
})();

function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); $(id).classList.add('active'); }
function isHost(){ return state&&state.players[0]&&state.players[0].id===myId; }
function setNumPlayers(n){
  if(!isHost()||!state) return;
  const s=deepCopy(state); s.numPlayers=n; writeRoom(s);
}
function updateNpPicker(n){
  const btns=document.querySelectorAll('#sl-np-picker .np-btn');
  [2,3,4].forEach((v,i)=>{ if(btns[i]) btns[i].classList.toggle('active',v===n); });
}
function isMyTurn(){ return state&&state.players[state.currentTurnIdx]&&state.players[state.currentTurnIdx].id===myId; }

async function createRoom(){
  myName=$('home-name').value.trim()||randomName();
  $('home-name').value=myName; localStorage.setItem('sl-name',myName);
  const code=randCode();
  const s={code,version:0,ts:Date.now(),phase:'lobby',
    players:[{id:myId,name:myName,pos:0,colorIdx:0}],
    hostId:myId,numPlayers:4,currentTurnIdx:0,diceValue:null,lastMove:null,winner:null};
  roomCode=code; writeRoom(s); subscribeRoom(code); subscribeChat(code);
  subscribePresence(code); clearInterval(heartbeatInterval); pingPresence(); heartbeatInterval=setInterval(pingPresence,15000);
  sessionStorage.setItem('sl-room',code);
  showScreen('scr-lobby');
}

async function joinRoom(){
  myName=$('home-name').value.trim()||randomName();
  $('home-name').value=myName; localStorage.setItem('sl-name',myName);
  const code=$('home-code').value.trim().toUpperCase().slice(0,4);
  if(code.length<4){ $('home-err').textContent='Enter a 4-letter room code.'; return; }
  $('home-err').textContent='';
  const existing=await readRoom(code);
  if(!existing){ $('home-err').textContent='Room not found. Check the code.'; return; }
  if(existing.phase!=='lobby'){ $('home-err').textContent='Game already in progress.'; return; }
  if(existing.players.length>=(existing.numPlayers||4)){ $('home-err').textContent='Room is full (max '+(existing.numPlayers||4)+' players).'; return; }
  if(existing.players.find(p=>p.id===myId)){
    roomCode=code; state=existing; lastVer=existing.version;
    subscribeRoom(code); subscribeChat(code);
    subscribePresence(code); clearInterval(heartbeatInterval); pingPresence(); heartbeatInterval=setInterval(pingPresence,15000);
    sessionStorage.setItem('sl-room',code);
    showScreen('scr-lobby'); render(); return;
  }
  const s=deepCopy(existing);
  s.players.push({id:myId,name:myName,pos:0,colorIdx:s.players.length});
  roomCode=code; lastVer=existing.version;
  writeRoom(s); subscribeRoom(code); subscribeChat(code);
  subscribePresence(code); clearInterval(heartbeatInterval); pingPresence(); heartbeatInterval=setInterval(pingPresence,15000);
  sessionStorage.setItem('sl-room',code);
  showScreen('scr-lobby');
}

function copyCode(){
  navigator.clipboard.writeText(roomCode).catch(()=>{});
  const btn=event.target; const orig=btn.textContent;
  btn.textContent='Copied!'; setTimeout(()=>{btn.textContent=orig;},1200);
}

function leaveRoom(){
  if(roomEs){roomEs.close();roomEs=null;} if(chatEs){chatEs.close();chatEs=null;}
  if(presEs){presEs.close();presEs=null;} clearInterval(heartbeatInterval); heartbeatInterval=null;
  state=null; roomCode=''; lastVer=0;
  sessionStorage.removeItem('sl-room');
  const cp=$('chat-panel'); if(cp){cp.style.display='none';chatCollapsed=true;cp.classList.add('collapsed');}
  showScreen('scr-home');
}

function hostStart(){
  if(!isHost()||busy) return;
  if(state.players.length<2){ $('lobby-err').textContent='Need at least 2 players.'; return; }
  const s=deepCopy(state);
  s.phase='play';
  s.players.forEach((p,i)=>{p.pos=0;p.colorIdx=i;});
  s.currentTurnIdx=0; s.diceValue=null; s.lastMove=null; s.winner=null;
  writeRoom(s);
}

function applyMove(s,pi,rawPos){
  const lm={playerId:s.players[pi].id,from:s.players[pi].pos,dice:s.diceValue,landed:rawPos,final:rawPos,snake:false,ladder:false};
  if(SNAKES[rawPos]!==undefined){lm.final=SNAKES[rawPos];lm.snake=true;}
  else if(LADDERS[rawPos]!==undefined){lm.final=LADDERS[rawPos];lm.ladder=true;}
  s.players[pi].pos=lm.final; s.lastMove=lm;
  if(lm.final===100){s.winner=s.players[pi].id;s.phase='over';}
  else if(s.diceValue!==6) s.currentTurnIdx=(s.currentTurnIdx+1)%s.players.length;
  // skip players who already finished (pos=100) - find next active
  if(s.phase!=='over'){
    let tries=s.players.length;
    while(tries-->0&&s.players[s.currentTurnIdx].pos===100)
      s.currentTurnIdx=(s.currentTurnIdx+1)%s.players.length;
  }
}

function rollDice(){
  if(!isMyTurn()||state.phase!=='play'||busy||animating) return;
  busy=true;
  const roll=Math.ceil(Math.random()*6);
  const dEl=$('dice-face');
  if(dEl){
    animating=true; dEl.classList.remove('dice-land'); dEl.classList.add('rolling');
    let elapsed=0;
    const tick=setInterval(()=>{
      dEl.textContent=FACES[Math.ceil(Math.random()*6)]; elapsed+=80;
      if(elapsed>=720){
        clearInterval(tick); dEl.classList.remove('rolling'); dEl.textContent=FACES[roll];
        dEl.classList.add('dice-land');
        setTimeout(()=>{ dEl.classList.remove('dice-land'); animating=false; doRoll(roll); },320);
      }
    },80);
  } else { doRoll(roll); }
}

function doRoll(roll){
  const s=deepCopy(state);
  const pi=s.currentTurnIdx;
  s.diceValue=roll;
  let newPos=s.players[pi].pos+roll;
  if(newPos>100) newPos=200-newPos; // bounce back
  if(newPos<1) newPos=1;
  applyMove(s,pi,newPos);
  writeRoom(s); busy=false;
}

function playAgain(){
  if(!isHost()) return;
  const s=deepCopy(state);
  s.phase='lobby'; s.players.forEach(p=>{p.pos=0;});
  s.currentTurnIdx=0; s.diceValue=null; s.lastMove=null; s.winner=null;
  writeRoom(s);
}

// ── Board ────────────────────────────────────────────────────────────────────
function sq2grid(n){
  const rfb=Math.floor((n-1)/10), pir=(n-1)%10;
  return{gridRow:10-rfb, gridCol:(rfb%2===0?pir:9-pir)+1};
}

const CELL_COLORS=['#ffd6e7','#ffeaa7','#d4f5d4','#a8d8ea','#e8c0f5','#ffd4a3'];
const SNAKE_COLORS=['#e74c3c','#e67e22','#27ae60','#8e44ad','#2980b9','#d35400','#16a085','#c0392b'];

function getCellPos(n){
  const {gridRow,gridCol}=sq2grid(n);
  return{x:(gridCol-0.5)*10, y:(gridRow-0.5)*10};
}
function svgEl(tag,attrs){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
  return el;
}
function svgLine(svg,x1,y1,x2,y2,color,w){
  svg.appendChild(svgEl('line',{x1,y1,x2,y2,stroke:color,'stroke-width':w,'stroke-linecap':'round'}));
}
function svgCircle(parent,cx,cy,r,fill,stroke,sw){
  const attrs={cx,cy,r,fill};
  if(stroke){attrs.stroke=stroke;attrs['stroke-width']=sw||0.5;}
  parent.appendChild(svgEl('circle',attrs));
}

function drawLadder(svg,from,to){
  const b=getCellPos(from),t=getCellPos(to);
  const dx=t.x-b.x,dy=t.y-b.y,len=Math.sqrt(dx*dx+dy*dy);
  const nx=-dy/len*1.5,ny=dx/len*1.5;
  svgLine(svg,b.x-nx,b.y-ny,t.x-nx,t.y-ny,'#8B4513',1.1);
  svgLine(svg,b.x+nx,b.y+ny,t.x+nx,t.y+ny,'#8B4513',1.1);
  for(let frac=0.12;frac<0.92;frac+=0.14){
    const rx=b.x+dx*frac,ry=b.y+dy*frac;
    svgLine(svg,rx-nx,ry-ny,rx+nx,ry+ny,'#D2691E',1.0);
  }
}

function drawSnake(svg,head,tail,color){
  const h=getCellPos(head),t=getCellPos(tail);
  const dx=t.x-h.x,dy=t.y-h.y,len=Math.sqrt(dx*dx+dy*dy);
  const nx=-dy/len,ny=dx/len;
  const off=Math.min(len*0.45,20);
  const c1={x:h.x+dx*0.3+nx*off,y:h.y+dy*0.3+ny*off};
  const c2={x:h.x+dx*0.7-nx*off,y:h.y+dy*0.7-ny*off};
  // Outline (slightly wider, darker)
  svg.appendChild(svgEl('path',{d:`M${h.x},${h.y} C${c1.x},${c1.y} ${c2.x},${c2.y} ${t.x},${t.y}`,
    stroke:'rgba(0,0,0,.25)','stroke-width':'5','fill':'none','stroke-linecap':'round'}));
  // Body
  svg.appendChild(svgEl('path',{d:`M${h.x},${h.y} C${c1.x},${c1.y} ${c2.x},${c2.y} ${t.x},${t.y}`,
    stroke:color,'stroke-width':'3.8','fill':'none','stroke-linecap':'round'}));
  // Head circle
  svgCircle(svg,h.x,h.y,3.2,color,'rgba(0,0,0,.3)',0.5);
  // Eyes (offset perpendicular to body direction)
  const ex=-dx/len*0.8,ey=-dy/len*0.8;
  svgCircle(svg,h.x+nx*1.3+ex,h.y+ny*1.3+ey,0.75,'white');
  svgCircle(svg,h.x-nx*1.3+ex,h.y-ny*1.3+ey,0.75,'white');
  // Tail dot
  svgCircle(svg,t.x,t.y,1.3,color,'white',0.4);
}

function drawSnakesLadders(){
  const board=$('sl-board');
  const old=board.querySelector('svg.sl-overlay'); if(old) old.remove();
  const svg=svgEl('svg',{class:'sl-overlay',viewBox:'0 0 100 100',preserveAspectRatio:'none'});
  svg.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;';
  Object.entries(LADDERS).forEach(([from,to])=>drawLadder(svg,+from,+to));
  Object.entries(SNAKES).forEach(([head,tail],i)=>drawSnake(svg,+head,+tail,SNAKE_COLORS[i%SNAKE_COLORS.length]));
  board.appendChild(svg);
}

function buildBoard(){
  const board=$('sl-board'); board.innerHTML='';
  for(let n=1;n<=100;n++){
    const {gridRow,gridCol}=sq2grid(n);
    const cell=document.createElement('div');
    cell.className='sl-cell';
    cell.id='sq'+n;
    cell.style.gridRow=gridRow; cell.style.gridColumn=gridCol;
    cell.style.background = n===100 ? '#fef3cd' : CELL_COLORS[(n-1)%6];
    const num=document.createElement('div'); num.className='cell-num'; num.textContent=n; cell.appendChild(num);
    if(n===100){ const ic=document.createElement('div'); ic.style.cssText='font-size:11px;line-height:1;'; ic.textContent='🏆'; cell.appendChild(ic); }
    const toks=document.createElement('div'); toks.className='cell-tokens'; toks.id='toks'+n; cell.appendChild(toks);
    board.appendChild(cell);
  }
  drawSnakesLadders();
}
buildBoard();

function renderBoard(s){
  const svg=$('sl-board').querySelector('svg.sl-overlay'); if(!svg) return;
  svg.querySelectorAll('.sl-token').forEach(e=>e.remove());
  s.players.forEach((p,i)=>{
    if(p.pos<1||p.pos>100) return;
    const {x,y}=getCellPos(p.pos);
    const color=PCOLORS[p.colorIdx]||PCOLORS[i%4];
    const samePos=s.players.filter(pp=>pp.pos===p.pos);
    const idx=samePos.findIndex(pp=>pp.id===p.id);
    const ox=(idx-(samePos.length-1)/2)*3.0;
    const g=svgEl('g',{class:'sl-token'});
    svgCircle(g,x+ox,y,3.8,color,'white',0.9);
    const txt=svgEl('text',{x:x+ox,y:y+1.4,'text-anchor':'middle','font-size':'4','font-weight':'800',fill:'white'});
    txt.textContent=(p.name||'?')[0].toUpperCase();
    g.appendChild(txt); svg.appendChild(g);
  });
}

function kickPlayer(pid){
  if(!isHost()||!state) return;
  const s=deepCopy(state);
  s.players=s.players.filter(p=>p.id!==pid);
  s.players.forEach((p,i)=>{ p.colorIdx=i; });
  writeRoom(s);
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderLobby(s){
  $('lobby-code').textContent=s.code;
  const lp=$('lobby-players'); lp.innerHTML='';
  const numP=s.numPlayers||4;
  for(let i=0;i<numP;i++){
    const row=document.createElement('div');
    if(s.players[i]){
      const p=s.players[i]; row.className='pl-row';
      const dot=document.createElement('span');
      dot.style.cssText='display:inline-block;width:12px;height:12px;border-radius:50%;background:'+PCOLORS[i%4]+';flex-shrink:0;';
      row.appendChild(dot);
      const nm=document.createElement('span'); nm.textContent=p.name; row.appendChild(nm);
      if(i===0){ const t=document.createElement('span'); t.className='pl-tag'; t.textContent='HOST'; row.appendChild(t); }
      const pb=document.createElement('span'); pb.innerHTML=pingBadge(p.id); row.appendChild(pb);
      if(isHost()&&p.id!==myId){
        const kb=document.createElement('button'); kb.className='kick-btn'; kb.textContent='✕';
        kb.onclick=()=>kickPlayer(p.id); row.appendChild(kb);
      }
    } else {
      row.className='pl-row empty'; row.textContent='Waiting…';
    }
    lp.appendChild(row);
  }
  const hostOpts=$('sl-host-opts'), mon=$('lobby-monitor'), mp=$('lobby-maxplayers');
  if(isHost()){
    hostOpts.style.display='block'; mp.style.display='none';
    updateNpPicker(numP);
    const link=NTFY+'/sl-'+s.code+'-s';
    mon.style.display='block';
    mon.innerHTML='Monitor: <a href="'+link+'" target="_blank" style="color:var(--blue);">'+link+'</a>';
  } else {
    hostOpts.style.display='none'; mon.style.display='none';
    mp.style.display='block'; mp.textContent='Max players: '+numP;
  }
  $('lobby-start').style.display=(isHost()&&s.players.length>=2)?'block':'none';
  $('lobby-wait').style.display=isHost()?'none':'flex';
  $('lobby-err').textContent='';
}

function renderGame(s){
  renderBoard(s);
  if(!animating){ const d=$('dice-face'); if(d) d.textContent=s.diceValue?FACES[s.diceValue]:'⚀'; }
  const cp=s.players[s.currentTurnIdx];
  const tm=$('turn-msg');
  if(cp) tm.textContent=isMyTurn()?'Your turn — roll!':esc(cp.name)+"'s turn";
  $('btn-roll').style.display=(isMyTurn()&&!animating)?'block':'none';
  const lm=s.lastMove, me2=$('move-msg');
  if(lm){
    const pn=esc((s.players.find(p=>p.id===lm.playerId)||{}).name||'?');
    let msg=pn+' rolled '+lm.dice;
    if(lm.snake) msg+=' — 🐍 slid from '+lm.landed+' → '+lm.final;
    else if(lm.ladder) msg+=' — 🪜 climbed to '+lm.final;
    else msg+=' → square '+lm.final;
    if(lm.dice===6&&!lm.snake&&lm.final!==100) msg+=' (roll again!)';
    me2.innerHTML=msg;
  } else me2.textContent='';
  const pl=$('sl-players'); pl.innerHTML='';
  s.players.forEach((p,i)=>{
    const row=document.createElement('div');
    row.className='sl-prow'+(i===s.currentTurnIdx?' active-p':'');
    if(i===s.currentTurnIdx) row.style.borderColor=PCOLORS[p.colorIdx]||PCOLORS[i%4];
    const dot=document.createElement('div'); dot.className='sl-pdot'; dot.style.background=PCOLORS[p.colorIdx]||PCOLORS[i%4]; row.appendChild(dot);
    const nm=document.createElement('div'); nm.className='sl-pname'; nm.textContent=p.name+(p.id===myId?' (you)':''); row.appendChild(nm);
    const pos=document.createElement('div'); pos.className='sl-ppos';
    pos.textContent=p.pos===0?'At start':(p.pos===100?'Finished 🏆':'Square '+p.pos); row.appendChild(pos);
    pl.appendChild(row);
  });
  const cp2=$('chat-panel'); if(cp2) cp2.style.display='block';
}

function renderOver(s){
  const w=s.players.find(p=>p.id===s.winner);
  $('winner-box').innerHTML=w
    ?'<div class="winner-emoji">🏆</div><div class="winner-name">'+esc(w.name)+' wins!</div>'
    :'<div class="winner-name">Game over!</div>';
  $('btn-playagain').style.display=isHost()?'block':'none';
  $('over-wait').style.display=isHost()?'none':'flex';
  const cp=$('chat-panel'); if(cp) cp.style.display='none';
}

function render(){
  if(!state) return;
  if(state.phase==='lobby'){ showScreen('scr-lobby'); renderLobby(state); }
  else if(state.phase==='play'){ showScreen('scr-game'); renderGame(state); }
  else if(state.phase==='over'){ showScreen('scr-over'); renderOver(state); }
}

(async function(){
  const saved=sessionStorage.getItem('sl-room'); if(!saved) return;
  const existing=await readRoom(saved);
  if(!existing||!existing.players||!existing.players.find(p=>p.id===myId)){sessionStorage.removeItem('sl-room');return;}
  roomCode=saved; state=existing; lastVer=existing.version||0;
  subscribeRoom(saved); subscribeChat(saved); subscribePresence(saved);
  clearInterval(heartbeatInterval); pingPresence(); heartbeatInterval=setInterval(pingPresence,15000);
  render();
})();
</script>
