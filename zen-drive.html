<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1e;font-family:'Segoe UI',system-ui,sans-serif;user-select:none;-webkit-user-select:none;touch-action:none}
#c{position:absolute;inset:0;width:100%;height:100%}
/* graded vignette overlay (free, GPU-cheap) */
#vig{position:fixed;inset:0;z-index:5;pointer-events:none;background:radial-gradient(ellipse 78% 74% at 50% 44%,transparent 55%,rgba(25,12,35,.42) 100%)}
#back{position:fixed;top:12px;left:12px;z-index:20;font-size:13px;font-weight:700;color:rgba(255,255,255,.85);text-decoration:none;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.2);padding:8px 14px;border-radius:20px;backdrop-filter:blur(8px)}

#title{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,20,.42);backdrop-filter:blur(3px);transition:opacity .6s;color:#fff;text-align:center;padding:20px}

#title .go{margin-top:26px;font-size:17px;font-weight:700;color:#06121f;background:linear-gradient(180deg,#8fd8ff,#3fa9e8);border:none;border-radius:14px;padding:15px 44px;cursor:pointer;box-shadow:0 6px 28px rgba(80,170,255,.45)}
.ctl{position:fixed;bottom:20px;z-index:20;width:72px;height:72px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);backdrop-filter:blur(6px);color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;touch-action:none}

</style>

<body>
<canvas id="c"></canvas>
<div id="vig"></div>
<a id="back" href="index.html">‹ Games</a>
<div id="hud"><div class="spd"><span id="spd">0</span> <small>km/h</small></div><div class="odo" id="odo">0.0 km</div></div>
<div class="ctl" id="s-left">◀</div>
<div class="ctl" id="s-right">▶</div>
<div class="ctl" id="s-fast">+</div>
<div class="ctl" id="s-slow">−</div>
<div id="title">
  <h1>ZEN DRIVE</h1>
  <div class="ta">நிதான ஓட்டம் · endless road</div>
  <p>No traffic. No timer. Just you, the hills and an endless procedurally-generated road.<br><br>◀ ▶ steer · + − speed<br>(or arrow keys)</p>
  <button class="go" onclick="startDrive()">Start driving</button>
</div>
<script src="lib/three.min.js"></script>
<script>
'use strict';
/* ═══════════════════════════════════════════════════════════════════
   ZEN DRIVE v3 — endless procedural driving.
   Original implementation of standard techniques: 1D-noise road spline,
   indexed height-field terrain with analytic normals (seamless chunks),
   instanced vegetation, layered mountain silhouettes, banked road,
   gradient sky + additive sun glow, ACES tone mapping, CSS vignette.
   ═══════════════════════════════════════════════════════════════════ */

/* ── 1D value noise (road shape / scatter) ── */
function makeNoise(seed){
  const perm=new Uint8Array(512);
  let s=seed>>>0;
  const rnd=()=>((s=(s*1664525+1013904223)>>>0)/4294967296);
  const p=[...Array(256).keys()];
  for(let i=255;i>0;i--){const j=(rnd()*(i+1))|0;[p[i],p[j]]=[p[j],p[i]];}
  for(let i=0;i<512;i++)perm[i]=p[i&255];
  const fade=t=>t*t*(3-2*t);
  return function(x){
    const xi=Math.floor(x)&255, xf=x-Math.floor(x);
    const a=perm[xi]/255, b=perm[xi+1]/255;
    return a+(b-a)*fade(xf);
  };
}
const n1=makeNoise(1337), n2=makeNoise(9001), n3=makeNoise(4242), n4=makeNoise(777);

/* ── 2D value noise (terrain heightfield) ── */
function makeNoise2D(seed){
  const perm=new Uint8Array(512);
  let s=seed>>>0;
  const rnd=()=>((s=(s*1664525+1013904223)>>>0)/4294967296);
  const p=[...Array(256).keys()];
  for(let i=255;i>0;i--){const j=(rnd()*(i+1))|0;[p[i],p[j]]=[p[j],p[i]];}
  for(let i=0;i<512;i++)perm[i]=p[i&255];
  const fade=t=>t*t*(3-2*t);
  return function(x,y){
    const xi=Math.floor(x),yi=Math.floor(y);
    const xf=x-xi,yf=y-yi;
    const X=xi&255,Y=yi&255;
    const aa=perm[(perm[X]+Y)&255]/255, ba=perm[(perm[(X+1)&255]+Y)&255]/255;
    const ab=perm[(perm[X]+Y+1)&255]/255, bb=perm[(perm[(X+1)&255]+Y+1)&255]/255;
    const u=fade(xf),v=fade(yf);
    const top=aa+(ba-aa)*u, bot=ab+(bb-ab)*u;
    return top+(bot-top)*v;
  };
}
const N2A=makeNoise2D(52), N2B=makeNoise2D(1953);
function fbm2(x,y){
  return N2A(x,y)*0.55 + N2A(x*2.6+37,y*2.6+11)*0.28 + N2B(x*6.5+91,y*6.5+43)*0.17;
}
function smoothstep(a,b,t){t=Math.min(1,Math.max(0,(t-a)/(b-a)));return t*t*(3-2*t);}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

/* ── road centreline (with superelevation / bank) ── */
const STEP=4, ROAD_W=9, SHOULDER=1.5;
const pts=[];
function samplePoint(i){
  while(pts.length<=i){
    const k=pts.length;
    if(k===0){pts.push({x:0,z:0,y:0,dx:0,dz:-1,heading:-Math.PI/2,curv:0,bank:0});continue;}
    const prev=pts[k-1];
    const s=k*STEP;
    const curv=(n1(s*0.0035)-0.5)*0.055 + (n2(s*0.012)-0.5)*0.02;
    const heading=prev.heading+curv;
    const x=prev.x+Math.cos(heading)*STEP;
    const z=prev.z+Math.sin(heading)*STEP;
    const y=(n3(s*0.0016)-0.5)*80 + (n4(s*0.006)-0.5)*10;
    const bank=clamp(-curv*3.4,-0.11,0.11);       // outer edge rises into curves
    pts.push({x,z,y,dx:Math.cos(heading),dz:Math.sin(heading),heading,curv,bank});
  }
  return pts[i];
}
function roadPose(sMet){
  const f=sMet/STEP;
  const i=Math.floor(f), t=f-i;
  const a=samplePoint(i), b=samplePoint(i+1);
  return {
    x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t, z:a.z+(b.z-a.z)*t,
    dx:a.dx+(b.dx-a.dx)*t, dz:a.dz+(b.dz-a.dz)*t,
    heading:a.heading+(b.heading-a.heading)*t,
    bank:a.bank+(b.bank-a.bank)*t,
  };
}
/* terrain heightfield: flat shoulder near road, rolling hills beyond */
function terrainH(x,z,roadY,dist){
  const sh=smoothstep(13,85,dist);
  const h=(fbm2(x*0.0058,z*0.0058)-0.5)*2*54 + (fbm2(x*0.021+77,z*0.021+29)-0.5)*9;
  return roadY + h*sh;
}
const NRM=new THREE.Vector3();
function terrainNormal(x,z,roadY,dist){
  const e=1.6;
  const hL=terrainH(x-e,z,roadY,dist), hR=terrainH(x+e,z,roadY,dist);
  const hD=terrainH(x,z-e,roadY,dist), hU=terrainH(x,z+e,roadY,dist);
  return NRM.set(hL-hR,2*e,hD-hU).normalize();
}

/* ── renderer / scene ── */
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=0.95;
const scene=new THREE.Scene();
const HORIZON=new THREE.Color(0xecbf98);
scene.fog=new THREE.Fog(HORIZON,320,1150);
const camera=new THREE.PerspectiveCamera(62,1,0.1,3000);
function onResize(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}
addEventListener('resize',onResize);onResize();

scene.add(new THREE.AmbientLight(0xffffff,0.22));
scene.add(new THREE.HemisphereLight(0xffeacc,0x5e7a4e,0.66));
const sun=new THREE.DirectionalLight(0xffdba6,1.05);
sun.position.set(0.35,0.78,0.5);
scene.add(sun);

/* ── sky dome (gradient) ── */
const skyMat=new THREE.ShaderMaterial({
  side:THREE.BackSide,depthWrite:false,fog:false,
  vertexShader:'varying vec3 vP;void main(){vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
  fragmentShader:`varying vec3 vP;
    void main(){
      float h=normalize(vP).y;
      vec3 top=vec3(0.31,0.50,0.80);
      vec3 mid=vec3(0.97,0.74,0.53);
      vec3 low=vec3(0.94,0.63,0.45);
      vec3 col=h>0.22?mix(mid,top,smoothstep(0.22,0.88,h)):mix(low,mid,smoothstep(-0.10,0.22,h));
      gl_FragColor=vec4(col,1.0);
    }`
});
const skyDome=new THREE.Mesh(new THREE.SphereGeometry(2000,24,16),skyMat);
scene.add(skyDome);

/* additive sun glow sprite */
(function(){
  const cv=document.createElement('canvas');cv.width=cv.height=256;
  const cx=cv.getContext('2d');
  const g=cx.createRadialGradient(128,128,4,128,128,128);
  g.addColorStop(0,'rgba(255,252,240,1)');
  g.addColorStop(0.10,'rgba(255,246,214,0.95)');
  g.addColorStop(0.28,'rgba(255,214,150,0.55)');
  g.addColorStop(0.60,'rgba(255,180,120,0.16)');
  g.addColorStop(1,'rgba(255,170,110,0)');
  cx.fillStyle=g;cx.fillRect(0,0,256,256);
  const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),blending:THREE.AdditiveBlending,depthWrite:false,depthTest:false,fog:false}));
  spr.scale.set(520,520,1);
  const dir=new THREE.Vector3(0.34,0.24,-0.9).normalize().multiplyScalar(1700);
  spr.position.copy(dir);
  skyDome.add(spr);
})();

/* soft drifting clouds */
(function(){
  const cnv=document.createElement('canvas');cnv.width=cnv.height=128;
  const cx=cnv.getContext('2d');
  const g=cx.createRadialGradient(64,64,6,64,64,62);
  g.addColorStop(0,'rgba(255,255,255,.9)');g.addColorStop(.55,'rgba(255,255,255,.4)');g.addColorStop(1,'rgba(255,255,255,0)');
  cx.fillStyle=g;cx.beginPath();cx.ellipse(64,64,60,34,0,0,7);cx.fill();
  const mat=new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(cnv),transparent:true,depthWrite:false,fog:false,opacity:.4});
  const R=1500;
  for(let i=0;i<10;i++){
    const az=(i/10)*Math.PI*2+0.4, el=0.16+((i*53)%42)/150;
    const m=new THREE.Mesh(new THREE.PlaneGeometry(320+((i*37)%160),110+((i*29)%70)),mat);
    m.position.set(Math.cos(az)*Math.cos(el)*R,Math.sin(el)*R,Math.sin(az)*Math.cos(el)*R);
    m.lookAt(0,0,0);
    skyDome.add(m);
  }
})();

/* ── layered distant mountains (aerial perspective) ── */
const mountains=new THREE.Group();
scene.add(mountains);
(function(){
  const FLOOR=-800;                                  // hidden well below the horizon
  const layers=[
    // nearer = darker & lower ridge; farther = hazier & taller (aerial perspective)
    {R:1150,ridge:10, amp:150,seed:31,col:0xb59b7e,op:0.95},
    {R:1600,ridge:40, amp:230,seed:74,col:0xc9b193,op:0.85},
    {R:2100,ridge:80, amp:330,seed:128,col:0xdcc4a8,op:0.72},
  ];
  for(const L of layers){
    const mnoise=makeNoise(L.seed);
    const segs=140, pos=[];
    const peak=i=>L.ridge + (mnoise(i*0.33)*0.55+mnoise(i*0.85+5)*0.3+mnoise(i*2.1+9)*0.15)*L.amp;
    for(let i=0;i<segs;i++){
      const a0=(i/segs)*Math.PI*2, a1=((i+1)/segs)*Math.PI*2;
      const h0=peak(i), h1=peak(i+1);
      const x0=Math.cos(a0)*L.R,z0=Math.sin(a0)*L.R;
      const x1=Math.cos(a1)*L.R,z1=Math.sin(a1)*L.R;
      pos.push(x0,FLOOR,z0, x1,FLOOR,z1, x0,h0,z0,  x1,FLOOR,z1, x1,h1,z1, x0,h0,z0);
    }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
    const m=new THREE.Mesh(g,new THREE.MeshBasicMaterial({color:L.col,fog:false,transparent:true,opacity:L.op,side:THREE.DoubleSide}));
    m.renderOrder=-1;
    mountains.add(m);
  }
})();

/* ── shared materials ── */
const roadMat=new THREE.MeshLambertMaterial({color:0x2f3540});
const shoulderMat=new THREE.MeshLambertMaterial({color:0x7d6c4e});
const grassMat=new THREE.MeshLambertMaterial({vertexColors:true,side:THREE.DoubleSide});
const lineMat=new THREE.MeshBasicMaterial({color:0xf5efdc});
const edgeMat=new THREE.MeshBasicMaterial({color:0xf3f3ee});
const trunkMat=new THREE.MeshLambertMaterial({color:0x5f4230});
const coneMat=new THREE.MeshLambertMaterial({color:0x2f6b3c});
const bushMat=new THREE.MeshLambertMaterial({color:0x3c7a45});
const grassBladeMat=new THREE.MeshLambertMaterial({color:0x5f9a4a,side:THREE.DoubleSide,vertexColors:true});
const rockMat=new THREE.MeshLambertMaterial({color:0x8a8f98});

/* instancing base geometries */
const trunkGeo=new THREE.CylinderGeometry(0.16,0.26,1,5);      // scaled per instance in y
const coneGeo=new THREE.ConeGeometry(1,1,7);                    // scaled per instance
const bushGeo=new THREE.IcosahedronGeometry(1,0);
const bladeGeo=(function(){
  // two crossed vertical quads, unit height, centred at base y=0
  const g=new THREE.BufferGeometry();
  const v=[];
  const quad=(ax,az,bx,bz)=>{v.push(ax,0,az, bx,0,bz, ax,1,az,  bx,0,bz, bx,1,bz, ax,1,az);};
  quad(-0.5,0,0.5,0); quad(0,-0.5,0,0.5);
  g.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
  const col=[]; for(let i=0;i<12;i++)col.push(1,1,1);
  g.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
  g.computeVertexNormals();
  return g;
})();

/* colour ramp for terrain */
const C_LUSH=[0.19,0.42,0.18], C_DRY=[0.42,0.45,0.22], C_ROCK=[0.42,0.42,0.44];
function terrainColor(out,x,z,rel){
  const patch=fbm2(x*0.013+99,z*0.013+61);
  let r=C_LUSH[0]+(C_DRY[0]-C_LUSH[0])*patch;
  let g=C_LUSH[1]+(C_DRY[1]-C_LUSH[1])*patch;
  let b=C_LUSH[2]+(C_DRY[2]-C_LUSH[2])*patch;
  const rk=smoothstep(15,34,rel);
  r+=(C_ROCK[0]-r)*rk;g+=(C_ROCK[1]-g)*rk;b+=(C_ROCK[2]-b)*rk;
  const v=0.92+((Math.sin(x*1.7)+Math.cos(z*1.3))*0.5+1)*0.06;
  out[0]=r*v;out[1]=g*v;out[2]=b*v;
}

/* ── chunked world ── */
const CHUNK=32, AHEAD=6, BEHIND=2;
const chunks=new Map();
/* lateral columns (signed metres). 0 = under road; symmetric out to 560m */
const HALF=[6,8,11,15,21,30,44,64,92,132,190,275,395,560];
const COLS=[...HALF.map(d=>-d).reverse(),0,...HALF];

const _c=[0,0,0];
function buildChunk(ci){
  const group=new THREE.Group();
  const i0=ci*CHUNK;
  const ROWS=CHUNK+1, NC=COLS.length;

  /* — indexed terrain grid (seamless via analytic normals) — */
  const tpos=new Float32Array(ROWS*NC*3);
  const tnor=new Float32Array(ROWS*NC*3);
  const tcol=new Float32Array(ROWS*NC*3);
  for(let r=0;r<ROWS;r++){
    const p=samplePoint(i0+r);
    const nx=-p.dz,nz=p.dx;
    for(let c=0;c<NC;c++){
      const off=COLS[c], ad=Math.abs(off);
      const x=p.x+nx*off, z=p.z+nz*off;
      const y=terrainH(x,z,p.y,ad);
      const idx=(r*NC+c)*3;
      tpos[idx]=x;tpos[idx+1]=y;tpos[idx+2]=z;
      const n=terrainNormal(x,z,p.y,ad);
      tnor[idx]=n.x;tnor[idx+1]=n.y;tnor[idx+2]=n.z;
      terrainColor(_c,x,z,y-p.y);
      tcol[idx]=_c[0];tcol[idx+1]=_c[1];tcol[idx+2]=_c[2];
    }
  }
  const tidx=[];
  for(let r=0;r<ROWS-1;r++)for(let c=0;c<NC-1;c++){
    const a=r*NC+c, b=r*NC+c+1, d=(r+1)*NC+c, e=(r+1)*NC+c+1;
    tidx.push(a,d,b, b,d,e);
  }
  const tg=new THREE.BufferGeometry();
  tg.setAttribute('position',new THREE.BufferAttribute(tpos,3));
  tg.setAttribute('normal',new THREE.BufferAttribute(tnor,3));
  tg.setAttribute('color',new THREE.BufferAttribute(tcol,3));
  tg.setIndex(tidx);
  group.add(new THREE.Mesh(tg,grassMat));

  /* — road ribbon (asphalt + shoulders + lines), banked — */
  const rv=[],sv=[],lv=[],ev=[];
  const quad=(arr,A,B,C,D)=>{arr.push(A[0],A[1],A[2],B[0],B[1],B[2],C[0],C[1],C[2], B[0],B[1],B[2],D[0],D[1],D[2],C[0],C[1],C[2]);};
  // cross-section point at road sample `p`, lateral offset off, height lift
  const csPt=(p,off,lift)=>{
    const nx=-p.dz,nz=p.dx;
    const bankY=off*Math.tan(p.bank);       // superelevation
    return [p.x+nx*off,p.y+bankY+lift,p.z+nz*off];
  };
  for(let r=0;r<CHUNK;r++){
    const p=samplePoint(i0+r), q=samplePoint(i0+r+1);
    // asphalt
    quad(rv, csPt(p,-ROAD_W/2,0.03), csPt(q,-ROAD_W/2,0.03), csPt(p,ROAD_W/2,0.03), csPt(q,ROAD_W/2,0.03));
    // shoulders
    for(const s of [1,-1]){
      quad(sv, csPt(p,s*ROAD_W/2,0.015), csPt(q,s*ROAD_W/2,0.015), csPt(p,s*(ROAD_W/2+SHOULDER),0.0), csPt(q,s*(ROAD_W/2+SHOULDER),0.0));
    }
    // white edge lines
    for(const s of [1,-1]){
      quad(ev, csPt(p,s*(ROAD_W/2-0.5),0.05), csPt(q,s*(ROAD_W/2-0.5),0.05), csPt(p,s*(ROAD_W/2-0.28),0.05), csPt(q,s*(ROAD_W/2-0.28),0.05));
    }
    // centre dashes
    if((i0+r)%4<2){
      quad(lv, csPt(p,-0.26,0.055), csPt(q,-0.26,0.055), csPt(p,0.26,0.055), csPt(q,0.26,0.055));
    }
  }
  const mkFlat=(arr,mat)=>{
    if(!arr.length)return;
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(arr,3));
    g.computeVertexNormals();
    group.add(new THREE.Mesh(g,mat));
  };
  mkFlat(rv,roadMat);mkFlat(sv,shoulderMat);mkFlat(ev,edgeMat);mkFlat(lv,lineMat);

  /* — instanced vegetation — */
  const srnd=makeNoise(ci*131+7);
  const M=new THREE.Matrix4(), Q=new THREE.Quaternion(), Yx=new THREE.Vector3(0,1,0),
        Pv=new THREE.Vector3(), Sv=new THREE.Vector3();
  const trees=[], bushes=[], blades=[];
  const CAND=180;
  for(let t=0;t<CAND;t++){
    const rr=srnd(t*1.7)*CHUNK;
    const p=samplePoint(i0+(rr|0));
    const nx=-p.dz,nz=p.dx;
    const side=srnd(t*3.3)>0.5?1:-1;
    const dist=(ROAD_W/2+SHOULDER+2)+srnd(t*2.1)*170;
    const x=p.x+nx*dist*side, z=p.z+nz*dist*side;
    const y=terrainH(x,z,p.y,dist);
    const rel=y-p.y;
    if(rel>26)continue;                       // no plants high on rock
    const grow=fbm2(x*0.02+3,z*0.02+9);       // vegetation density field
    const pick=srnd(t*5.9);
    if(pick<0.30 && grow>0.42){
      trees.push({x,y,z,s:0.85+srnd(t*7.1)*0.9,rot:srnd(t*8)*6.28});
    }else if(pick<0.55 && grow>0.35){
      bushes.push({x,y,z,s:0.6+srnd(t*4.4)*0.9});
    }else if(grow>0.30){
      blades.push({x,y,z,s:0.5+srnd(t*6.6)*0.7,rot:srnd(t*2.9)*6.28,g:0.32+grow*0.4});
    }
  }
  if(trees.length){
    const trunkI=new THREE.InstancedMesh(trunkGeo,trunkMat,trees.length);
    const coneI=new THREE.InstancedMesh(coneGeo,coneMat,trees.length);
    trees.forEach((o,i)=>{
      const h=3.4*o.s;
      Q.setFromAxisAngle(Yx,o.rot);
      Pv.set(o.x,o.y+h*0.21,o.z);Sv.set(1,h*0.42,1);
      M.compose(Pv,Q,Sv);trunkI.setMatrixAt(i,M);
      Pv.set(o.x,o.y+h*0.42+h*0.44,o.z);Sv.set(h*0.42,h*0.9,h*0.42);
      M.compose(Pv,Q,Sv);coneI.setMatrixAt(i,M);
    });
    group.add(trunkI,coneI);
  }
  if(bushes.length){
    const bI=new THREE.InstancedMesh(bushGeo,bushMat,bushes.length);
    bushes.forEach((o,i)=>{
      Pv.set(o.x,o.y+o.s*0.5,o.z);Sv.set(o.s,o.s*0.8,o.s);
      M.compose(Pv,new THREE.Quaternion(),Sv);bI.setMatrixAt(i,M);
    });
    group.add(bI);
  }
  if(blades.length){
    const gI=new THREE.InstancedMesh(bladeGeo,grassBladeMat,blades.length);
    blades.forEach((o,i)=>{
      Q.setFromAxisAngle(Yx,o.rot);
      Pv.set(o.x,o.y,o.z);Sv.set(o.s*1.4,o.s*1.6,o.s*1.4);
      M.compose(Pv,Q,Sv);gI.setMatrixAt(i,M);
      gI.setColorAt(i,new THREE.Color(o.g*0.7,o.g*1.15,o.g*0.55));
    });
    if(gI.instanceColor)gI.instanceColor.needsUpdate=true;
    group.add(gI);
  }

  scene.add(group);
  return {group};
}
function disposeChunk(c){
  c.group.traverse(o=>{if(o.geometry&&o.geometry!==trunkGeo&&o.geometry!==coneGeo&&o.geometry!==bushGeo&&o.geometry!==bladeGeo)o.geometry.dispose();});
  scene.remove(c.group);
}
function ensureChunks(sMet){
  const ci=Math.floor(sMet/(CHUNK*STEP));
  for(let i=ci-BEHIND;i<=ci+AHEAD;i++)if(i>=0&&!chunks.has(i))chunks.set(i,buildChunk(i));
  for(const [i,c] of chunks)if(i<ci-BEHIND||i>ci+AHEAD){disposeChunk(c);chunks.delete(i);}
}

/* ── the car ── */
const car=new THREE.Group();
(function(){
  const paint=new THREE.MeshPhongMaterial({color:0xc0281c,shininess:110,specular:0x664444});
  const glassM=new THREE.MeshPhongMaterial({color:0x18222f,shininess:160,specular:0x99bbdd});
  const chassis=new THREE.Mesh(new THREE.BoxGeometry(1.86,0.42,4.35),paint);chassis.position.y=0.56;
  const hood=new THREE.Mesh(new THREE.BoxGeometry(1.7,0.24,1.15),paint);hood.position.set(0,0.82,-1.35);
  const boot=new THREE.Mesh(new THREE.BoxGeometry(1.7,0.28,0.85),paint);boot.position.set(0,0.84,1.6);
  const glass=new THREE.Mesh(new THREE.BoxGeometry(1.52,0.44,2.05),glassM);glass.position.set(0,1.02,0.25);
  const roof=new THREE.Mesh(new THREE.BoxGeometry(1.58,0.09,1.55),paint);roof.position.set(0,1.27,0.28);
  car.add(chassis,hood,boot,glass,roof);
  const hl=new THREE.MeshBasicMaterial({color:0xfff4cc}), tl=new THREE.MeshBasicMaterial({color:0xff3b30});
  [[-0.58],[0.58]].forEach(([lx])=>{
    const h=new THREE.Mesh(new THREE.BoxGeometry(0.34,0.13,0.06),hl);h.position.set(lx,0.62,-2.18);
    const t=new THREE.Mesh(new THREE.BoxGeometry(0.34,0.12,0.06),tl);t.position.set(lx,0.64,2.18);
    car.add(h,t);
  });
  const wg=new THREE.CylinderGeometry(0.40,0.40,0.34,12), wm=new THREE.MeshLambertMaterial({color:0x14181f});
  [[-0.97,1.42],[0.97,1.42],[-0.97,-1.42],[0.97,-1.42]].forEach(([wx,wz])=>{
    const w=new THREE.Mesh(wg,wm);w.rotation.z=Math.PI/2;w.position.set(wx,0.40,wz);car.add(w);
  });
  const sh=new THREE.Mesh(new THREE.CircleGeometry(2.0,20),new THREE.MeshBasicMaterial({color:0,transparent:true,opacity:0.3,depthWrite:false}));
  sh.rotation.x=-Math.PI/2;sh.position.y=0.03;sh.scale.set(0.72,1.18,1);car.add(sh);
})();
scene.add(car);

/* ── driving state ── */
let S=0, lat=0, speed=0, targetSpeed=22, driving=false;
const keys={l:false,r:false,f:false,s:false};
addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')keys.l=true;
  if(e.key==='ArrowRight'||e.key==='d')keys.r=true;
  if(e.key==='ArrowUp'||e.key==='w')keys.f=true;
  if(e.key==='ArrowDown'||e.key==='s')keys.s=true;
});
addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')keys.l=false;
  if(e.key==='ArrowRight'||e.key==='d')keys.r=false;
  if(e.key==='ArrowUp'||e.key==='w')keys.f=false;
  if(e.key==='ArrowDown'||e.key==='s')keys.s=false;
});
[['s-left','l'],['s-right','r'],['s-fast','f'],['s-slow','s']].forEach(([id,k])=>{
  const el=document.getElementById(id);
  const on=e=>{e.preventDefault();keys[k]=true;el.classList.add('pressed');};
  const off=e=>{e.preventDefault();keys[k]=false;el.classList.remove('pressed');};
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off);el.addEventListener('touchcancel',off);
  el.addEventListener('mousedown',on);addEventListener('mouseup',off);
});
function startDrive(){driving=true;document.getElementById('title').classList.add('hide');}
window.startDrive=startDrive;

/* ── main loop ── */
const camPos=new THREE.Vector3(0,4,8);
let last=0;
function frame(ts){
  requestAnimationFrame(frame);
  const dt=Math.min((ts-last)/1000,0.05);last=ts;

  if(driving){
    if(keys.f)targetSpeed=Math.min(targetSpeed+18*dt,58);
    if(keys.s)targetSpeed=Math.max(targetSpeed-30*dt,0);
    speed+=(targetSpeed-speed)*Math.min(1,dt*1.4);
    const off=Math.max(0,Math.abs(lat)-(ROAD_W/2-1));
    if(off>0)speed*=Math.max(0.3,1-off*0.09*dt*60);
    S+=speed*dt;
    const steer=(keys.l?-1:0)+(keys.r?1:0);
    lat+=steer*(6+speed*0.24)*dt;
    lat=clamp(lat,-ROAD_W*1.6,ROAD_W*1.6);
    if(!steer)lat*=Math.pow(0.6,dt);
  }

  ensureChunks(S+200);

  const p=roadPose(S);
  const nx=-p.dz,nz=p.dx;
  const bankY=lat*Math.tan(p.bank);
  const cx=p.x+nx*lat, cz=p.z+nz*lat, cy=p.y+bankY;
  const ahead=roadPose(S+3);
  car.position.set(cx,cy,cz);
  const dxm=ahead.x+(-ahead.dz)*lat-cx, dzm=ahead.z+ahead.dx*lat-cz;
  car.rotation.y=Math.atan2(-dxm,-dzm)+Math.PI;
  const back=roadPose(Math.max(0,S-3));
  car.rotation.x=Math.atan2(ahead.y-back.y,6)*-1;
  car.rotation.z=p.bank + ((keys.l?-1:0)+(keys.r?1:0))*0.05;

  const camBack=roadPose(Math.max(0,S-9.5));
  const desired=new THREE.Vector3(camBack.x+nx*lat*0.6,Math.max(camBack.y,p.y)+3.05,camBack.z+nz*lat*0.6);
  camPos.lerp(desired,Math.min(1,dt*3.4));
  camera.position.copy(camPos);
  const lookAhead=roadPose(S+15);
  camera.lookAt(lookAhead.x+nx*lat*0.4,p.y+1.5,lookAhead.z+nz*lat*0.4);
  camera.rotateZ((roadPose(S+14).heading-p.heading)*0.5 + p.bank*0.4);
  const fov=62+(speed/58)*9;
  if(Math.abs(camera.fov-fov)>0.1){camera.fov=fov;camera.updateProjectionMatrix();}

  skyDome.position.copy(camera.position);
  skyDome.rotation.y+=dt*0.004;
  mountains.position.set(camera.position.x,p.y,camera.position.z);

  document.getElementById('spd').textContent=Math.round(speed*3.6);
  document.getElementById('odo').textContent=(S/1000).toFixed(1)+' km';

  renderer.render(scene,camera);
}
ensureChunks(0);
requestAnimationFrame(frame);
</script>
