<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Surf — Edge Style</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0c1a3d;
  font-family:'Segoe UI',system-ui,sans-serif;display:flex;
  align-items:center;justify-content:center}
canvas{display:block;max-width:100%;max-height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const GW = 900, GH = 500;
canvas.width = GW; canvas.height = GH;

// Scale canvas to fill screen while keeping aspect ratio
function resize(){
  const scl = Math.min(window.innerWidth/GW, window.innerHeight/GH);
  canvas.style.width  = GW*scl+'px';
  canvas.style.height = GH*scl+'px';
}
window.addEventListener('resize', resize); resize();

// ── Constants ─────────────────────────────────────────────────────────────────
const WAVE_BASE = GH * 0.60; // baseline of wave surface
const PLAYER_X  = 160;       // fixed horizontal position
const GRAVITY    = 0.55;
const JUMP_VEL   = -14;
const SPEED_INIT = 5.5;
const SPEED_MAX  = 14;

// ── Game state ────────────────────────────────────────────────────────────────
let state = 'title'; // title | playing | flash | gameover
let score, hiScore=0, dist, speed, frame;
let scrollX;         // wave/bg scroll offset (pixels)
let lives, invTimer;
let flashTimer=0;
let groundFlash=0;

// ── Player ────────────────────────────────────────────────────────────────────
const P = {
  y:0, vy:0, onGround:false,
  dead:false, deadTimer:0,
  lean:0, jumpGlow:0,
};

// ── Object arrays ──────────────────────────────────────────────────────────────
let obstacles=[], pickups=[], clouds=[], particles=[], birds=[];

// ── Wave geometry ─────────────────────────────────────────────────────────────
function waveY(x) {
  return WAVE_BASE
    + Math.sin((x + scrollX) * 0.019) * 13
    + Math.sin((x + scrollX*1.25) * 0.038) * 7
    + Math.sin((x + scrollX*0.65) * 0.058) * 4;
}

// ── Input ─────────────────────────────────────────────────────────────────────
const K = {};
window.addEventListener('keydown', e=>{
  K[e.code]=true;
  if((e.code==='Space'||e.code==='ArrowUp')&&state==='playing') tryJump();
  if(e.code==='Space'||e.code==='ArrowUp') tryStart();
});
window.addEventListener('keyup', e=>K[e.code]=false);
canvas.addEventListener('pointerdown', e=>{e.preventDefault();tryJump();tryStart();});
canvas.addEventListener('touchstart', e=>{e.preventDefault();tryJump();tryStart();},{passive:false});

function tryJump(){
  if(state!=='playing') return;
  if(P.onGround&&!P.dead){ P.vy=JUMP_VEL; P.onGround=false; P.jumpGlow=1; }
}
function tryStart(){
  if(state==='title'||state==='gameover') startGame();
}

// ── Game init / restart ────────────────────────────────────────────────────────
function startGame(){
  state='playing';
  score=0; dist=0; speed=SPEED_INIT; frame=0; scrollX=0;
  lives=3; invTimer=0;
  P.y=waveY(PLAYER_X); P.vy=0; P.onGround=true;
  P.dead=false; P.deadTimer=0; P.lean=0; P.jumpGlow=0;
  obstacles=[]; pickups=[]; clouds=[]; particles=[]; birds=[];
  // Seed clouds
  for(let i=0;i<6;i++) spawnCloud(Math.random()*GW);
  // First obstacles far away
  lastObsX = GW + 400;
  lastPuX  = GW + 200;
}

// ── Spawning ──────────────────────────────────────────────────────────────────
let lastObsX=0, lastPuX=0;

function spawnCloud(x){
  clouds.push({
    x, y:40+Math.random()*GH*.22,
    w:60+Math.random()*80, h:22+Math.random()*18,
    alpha:0.55+Math.random()*.3,
    spd:0.3+Math.random()*.5,
  });
}

function spawnObstacle(){
  const t = Math.random();
  if(t < 0.45){
    // Rock in water
    const h = 22+Math.random()*20;
    obstacles.push({
      type:'rock', x:GW+60,
      w:28+Math.random()*20, h,
      col1:'#374151',col2:'#4b5563',col3:'#6b7280',
      wob:Math.random()*Math.PI*2,
    });
  } else if(t < 0.75){
    // Bird in air (low, medium, high)
    const airH = [WAVE_BASE-65, WAVE_BASE-115, WAVE_BASE-165];
    const y = airH[Math.floor(Math.random()*3)];
    birds.push({x:GW+60, y, wingPhase:0, spd:speed*1.1+1});
  } else {
    // Boat
    obstacles.push({
      type:'boat', x:GW+60,
      w:70, h:30,
      col1:'#b45309',col2:'#d97706',col3:'#fbbf24',
      wob:Math.random()*Math.PI*2,
    });
  }
}

function spawnPickup(){
  const y = WAVE_BASE - 55 - Math.random()*80;
  pickups.push({
    x:GW+40, y,
    type:Math.random()<.7?'ring':'gem',
    phase:Math.random()*Math.PI*2,
    rot:0,
  });
}

function spawnParticle(x,y,col,vx,vy,life,r=4){
  particles.push({x,y,vx,vy,life,maxLife:life,col,r});
}

function spawnSplash(x,y,col='#7dd3fc'){
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI, sp=2+Math.random()*6;
    spawnParticle(x,y,col,Math.cos(a)*sp,-Math.abs(Math.sin(a)*sp)-2,.7+Math.random()*.5,3+Math.random()*3);
  }
}

function spawnScorePopup(x,y,txt,col='#fbbf24'){
  particles.push({type:'text',x,y,vy:-1.2,life:1.2,maxLife:1.2,txt,col});
}

// ── Drawing helpers ────────────────────────────────────────────────────────────
function drawSky(){
  // Sky gradient
  const g=ctx.createLinearGradient(0,0,0,WAVE_BASE+20);
  g.addColorStop(0,'#0c1445');
  g.addColorStop(0.35,'#1e40af');
  g.addColorStop(0.72,'#3b82f6');
  g.addColorStop(1,'#93c5fd');
  ctx.fillStyle=g; ctx.fillRect(0,0,GW,WAVE_BASE+20);

  // Sun
  const sx=GW*.82, sy=GH*.11;
  const sg=ctx.createRadialGradient(sx,sy,8,sx,sy,70);
  sg.addColorStop(0,'rgba(254,240,138,1)');
  sg.addColorStop(0.28,'rgba(253,224,71,0.6)');
  sg.addColorStop(1,'rgba(253,224,71,0)');
  ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sx,sy,70,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fef08a'; ctx.beginPath(); ctx.arc(sx,sy,20,0,Math.PI*2); ctx.fill();

  // Sun rays
  ctx.save(); ctx.translate(sx,sy);
  ctx.strokeStyle='rgba(254,240,138,0.18)'; ctx.lineWidth=14;
  for(let i=0;i<8;i++){
    ctx.beginPath(); ctx.rotate(Math.PI/4);
    ctx.moveTo(24,0); ctx.lineTo(68,0); ctx.stroke();
  }
  ctx.restore();

  // Horizon glow
  const hg=ctx.createLinearGradient(0,WAVE_BASE-40,0,WAVE_BASE+10);
  hg.addColorStop(0,'rgba(147,197,253,0)');
  hg.addColorStop(0.6,'rgba(186,230,253,0.25)');
  hg.addColorStop(1,'rgba(186,230,253,0)');
  ctx.fillStyle=hg; ctx.fillRect(0,WAVE_BASE-40,GW,50);
}

function drawClouds(){
  for(const c of clouds){
    ctx.save(); ctx.globalAlpha=c.alpha;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(c.x,c.y,c.w,c.h,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x+c.w*.4,c.y-c.h*.45,c.w*.72,c.h*.9,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x-c.w*.38,c.y-c.h*.3,c.w*.6,c.h*.75,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawOcean(){
  // Main water fill
  ctx.beginPath();
  ctx.moveTo(0,GH);
  for(let x=0;x<=GW;x+=4) ctx.lineTo(x,waveY(x));
  ctx.lineTo(GW,GH); ctx.closePath();
  const wg=ctx.createLinearGradient(0,WAVE_BASE-10,0,GH);
  wg.addColorStop(0,'#0ea5e9');
  wg.addColorStop(0.18,'#0284c7');
  wg.addColorStop(0.55,'#075985');
  wg.addColorStop(1,'#0c2d4e');
  ctx.fillStyle=wg; ctx.fill();

  // Foam line (white edge)
  ctx.strokeStyle='rgba(255,255,255,0.65)';
  ctx.lineWidth=2.5; ctx.lineCap='round';
  ctx.beginPath();
  for(let x=0;x<=GW;x+=4){
    const y=waveY(x);
    x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Inner foam strips
  ctx.strokeStyle='rgba(255,255,255,0.18)';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  for(let x=0;x<=GW;x+=4){
    const y=waveY(x)+8+Math.sin((x+scrollX*.8)*.025)*5;
    x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Wave highlight sheen
  for(let i=0;i<3;i++){
    const ox=((scrollX*0.6+i*200)%GW);
    const pg=ctx.createLinearGradient(ox-60,0,ox+60,0);
    pg.addColorStop(0,'rgba(255,255,255,0)');
    pg.addColorStop(0.5,'rgba(255,255,255,0.07)');
    pg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=pg;
    ctx.fillRect(ox-60, WAVE_BASE-5, 120, 20);
  }
}

function drawWake(px,py){
  // Spray trail behind player
  for(let i=1;i<=5;i++){
    const wx=px-i*16, wy=py+2;
    const alpha=0.5-i*.08;
    ctx.fillStyle=`rgba(186,230,253,${alpha})`;
    ctx.beginPath(); ctx.ellipse(wx,wy,8-i,3,0.1,0,Math.PI*2); ctx.fill();
  }
}

function drawRock(obs){
  const x=obs.x, y=waveY(obs.x)+obs.h*.3;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(x,y+obs.h*.5,obs.w*.7,6,0,0,Math.PI*2); ctx.fill();
  // Rock body (jagged polygon)
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle=obs.col1;
  ctx.beginPath();
  const verts=[[-obs.w*.55,-obs.h*.2],[-obs.w*.4,-obs.h*.85],[-obs.w*.1,-obs.h],
    [obs.w*.22,-obs.h*.9],[obs.w*.5,-obs.h*.55],[obs.w*.55,-obs.h*.1],
    [obs.w*.3,obs.h*.25],[obs.w*.05,obs.h*.35],[-obs.w*.35,obs.h*.25]];
  ctx.moveTo(verts[0][0],verts[0][1]);
  for(const v of verts) ctx.lineTo(v[0],v[1]);
  ctx.closePath(); ctx.fill();
  // Highlight face
  ctx.fillStyle=obs.col2;
  ctx.beginPath();
  ctx.moveTo(-obs.w*.38,-obs.h*.82); ctx.lineTo(-obs.w*.08,-obs.h*.95);
  ctx.lineTo(obs.w*.2,-obs.h*.88); ctx.lineTo(-obs.w*.05,-obs.h*.5);
  ctx.closePath(); ctx.fill();
  // Small highlight
  ctx.fillStyle=obs.col3;
  ctx.beginPath(); ctx.ellipse(-obs.w*.12,-obs.h*.68,obs.w*.1,obs.h*.08,-0.3,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawBoat(obs){
  const x=obs.x, y=waveY(obs.x)+obs.h*.1;
  ctx.save(); ctx.translate(x,y);
  // Hull
  ctx.fillStyle=obs.col1;
  ctx.beginPath();
  ctx.moveTo(-obs.w*.55,0); ctx.lineTo(-obs.w*.45,-obs.h*.65);
  ctx.lineTo(obs.w*.45,-obs.h*.65); ctx.lineTo(obs.w*.6,0);
  ctx.quadraticCurveTo(0,obs.h*.5,-obs.w*.55,0);
  ctx.fill();
  // Deck
  ctx.fillStyle=obs.col2;
  ctx.fillRect(-obs.w*.45,-obs.h*.75,obs.w*.9,obs.h*.15);
  // Cabin
  ctx.fillStyle='#1e293b';
  ctx.fillRect(-obs.w*.15,-obs.h*1.3,obs.w*.3,obs.h*.6);
  // Windows
  ctx.fillStyle='rgba(250,204,21,0.8)';
  ctx.fillRect(-obs.w*.1,-obs.h*1.2,obs.w*.08,obs.h*.14);
  ctx.fillRect(obs.w*.02,-obs.h*1.2,obs.w*.08,obs.h*.14);
  // Mast
  ctx.strokeStyle='#374151'; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,-obs.h*.75); ctx.lineTo(0,-obs.h*2.2); ctx.stroke();
  // Flag
  ctx.fillStyle='#ef4444';
  ctx.beginPath(); ctx.moveTo(0,-obs.h*2.2); ctx.lineTo(obs.w*.22,-obs.h*2.0); ctx.lineTo(0,-obs.h*1.8); ctx.closePath(); ctx.fill();
  // Wake
  ctx.fillStyle='rgba(186,230,253,0.35)';
  ctx.beginPath(); ctx.ellipse(-obs.w*.3,obs.h*.3,obs.w*.5,8,-.15,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawBird(b){
  ctx.save(); ctx.translate(b.x,b.y);
  const w=Math.sin(b.wingPhase)*.5;
  ctx.fillStyle='#1e293b';
  // Left wing
  ctx.beginPath(); ctx.moveTo(0,0);
  ctx.bezierCurveTo(-10,-6+w*8,-20,-4+w*10,-26,2+w);
  ctx.bezierCurveTo(-14,-1+w*5,0,2,0,0); ctx.fill();
  // Right wing
  ctx.beginPath(); ctx.moveTo(0,0);
  ctx.bezierCurveTo(10,-6+w*8,20,-4+w*10,26,2+w);
  ctx.bezierCurveTo(14,-1+w*5,0,2,0,0); ctx.fill();
  // Body + head
  ctx.fillStyle='#1e293b';
  ctx.beginPath(); ctx.ellipse(0,1,7,4,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#374151';
  ctx.beginPath(); ctx.arc(7,-1,3.5,0,Math.PI*2); ctx.fill();
  // Beak
  ctx.fillStyle='#fbbf24';
  ctx.beginPath(); ctx.moveTo(9.5,-1); ctx.lineTo(14,-1.5); ctx.lineTo(9.5,1); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawPickup(pu){
  ctx.save(); ctx.translate(pu.x, pu.y);
  pu.rot+=0.06;
  ctx.rotate(pu.rot);
  if(pu.type==='ring'){
    // Glowing ring
    ctx.strokeStyle='#38bdf8'; ctx.lineWidth=4;
    const rg=ctx.createRadialGradient(0,0,8,0,0,20);
    rg.addColorStop(0,'rgba(56,189,248,0.4)');
    rg.addColorStop(1,'rgba(56,189,248,0)');
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(0,0,20,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.stroke();
    // Inner star
    ctx.fillStyle='rgba(56,189,248,0.6)';
    for(let i=0;i<5;i++){
      const a=(i/5)*Math.PI*2-Math.PI/2;
      const a2=((i+.5)/5)*Math.PI*2-Math.PI/2;
      if(i===0)ctx.beginPath();
      ctx.lineTo(Math.cos(a)*10,Math.sin(a)*10);
      ctx.lineTo(Math.cos(a2)*5,Math.sin(a2)*5);
    }
    ctx.closePath(); ctx.fill();
  } else {
    // Gem
    const gems=ctx.createRadialGradient(-3,-3,1,0,0,14);
    gems.addColorStop(0,'#a78bfa');
    gems.addColorStop(.5,'#7c3aed');
    gems.addColorStop(1,'#4c1d95');
    ctx.fillStyle=gems;
    ctx.beginPath();
    ctx.moveTo(0,-14); ctx.lineTo(10,-4); ctx.lineTo(10,4);
    ctx.lineTo(0,14); ctx.lineTo(-10,4); ctx.lineTo(-10,-4);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(167,139,250,0.7)'; ctx.lineWidth=1.5;
    ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.moveTo(-2,-12); ctx.lineTo(4,-4); ctx.lineTo(-2,-2); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawSurfer(py, lean, dead, frame){
  ctx.save(); ctx.translate(PLAYER_X, py);
  if(dead) ctx.rotate(Math.PI*.35);
  ctx.rotate(lean*0.05);

  // Board
  const bg=ctx.createLinearGradient(-32,0,32,0);
  bg.addColorStop(0,'#ea580c'); bg.addColorStop(.5,'#f97316'); bg.addColorStop(1,'#ea580c');
  ctx.fillStyle=bg;
  ctx.beginPath(); ctx.ellipse(0,3,32,5.5,.06,0,Math.PI*2); ctx.fill();
  // Board stripe
  ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.fillRect(-22,1,44,2.5);
  // Fins
  ctx.fillStyle='#c2410c';
  ctx.beginPath(); ctx.moveTo(24,3); ctx.lineTo(31,13); ctx.lineTo(20,7); ctx.closePath(); ctx.fill();

  // Legs
  ctx.fillStyle='#0c4a6e';
  ctx.fillRect(-8,-2,6,12); ctx.fillRect(2,-2,6,12);

  // Body
  const bodyG=ctx.createLinearGradient(0,-24,0,0);
  bodyG.addColorStop(0,'#0ea5e9'); bodyG.addColorStop(1,'#0284c7');
  ctx.fillStyle=bodyG; ctx.fillRect(-7,-24,14,22);

  // Arms (wave with run frame)
  const armB=Math.sin(frame*.1)*.25;
  ctx.strokeStyle='#0ea5e9'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-7,-15); ctx.lineTo(-25,-9+armB*8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(7,-15);  ctx.lineTo(25,-9-armB*8); ctx.stroke();

  // Head
  ctx.fillStyle='#f4a261';
  ctx.beginPath(); ctx.arc(0,-30,9,0,Math.PI*2); ctx.fill();

  // Hair
  ctx.fillStyle='#92400e';
  ctx.beginPath(); ctx.ellipse(0,-37,9,5,0,0,Math.PI); ctx.fill();

  // Sunglasses
  ctx.fillStyle='#0f172a';
  ctx.beginPath(); ctx.arc(-3.5,-30.5,3.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3.5,-30.5,3.5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#1e293b'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,-30.5); ctx.lineTo(1,-30.5); ctx.stroke();
  // Smile
  ctx.strokeStyle='#92400e'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(0,-28,4,.2,Math.PI-.2); ctx.stroke();

  ctx.restore();

  // Jump glow
  if(P.jumpGlow>0){
    const jg=ctx.createRadialGradient(PLAYER_X,py,5,PLAYER_X,py,40);
    jg.addColorStop(0,`rgba(56,189,248,${P.jumpGlow*.4})`);
    jg.addColorStop(1,'rgba(56,189,248,0)');
    ctx.fillStyle=jg; ctx.beginPath(); ctx.arc(PLAYER_X,py,40,0,Math.PI*2); ctx.fill();
    P.jumpGlow=Math.max(0,P.jumpGlow-.06);
  }
}

function drawParticles(){
  for(const p of particles){
    const f=p.life/p.maxLife;
    if(p.type==='text'){
      ctx.globalAlpha=f;
      ctx.fillStyle=p.col;
      ctx.font=`bold ${18-f*2}px 'Segoe UI',system-ui`;
      ctx.textAlign='center';
      ctx.fillText(p.txt,p.x,p.y);
      ctx.globalAlpha=1;
    } else {
      ctx.globalAlpha=f*.9;
      ctx.fillStyle=p.col;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*f+.5,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }
  }
  ctx.textAlign='left';
}

function drawHUD(){
  // Score bar background
  ctx.fillStyle='rgba(0,0,0,0.38)';
  ctx.beginPath(); ctx.roundRect(12,12,220,38,10); ctx.fill();

  // Score
  ctx.fillStyle='#fff'; ctx.font='bold 20px "Segoe UI",system-ui';
  ctx.fillText(String(Math.floor(score)).padStart(6,'0'),22,38);

  // Hi
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='11px "Segoe UI",system-ui';
  ctx.fillText('HI  '+String(hiScore).padStart(6,'0'),22,56);

  // Lives (heart icons)
  for(let i=0;i<3;i++){
    drawHeart(GW-24-i*28, 28, i<lives);
  }

  // Speed
  const spLabel=`SPEED ${Math.round(speed/SPEED_INIT*10)/10}×`;
  ctx.fillStyle='rgba(56,189,248,0.85)';
  ctx.font='bold 11px "Segoe UI",system-ui';
  ctx.textAlign='right';
  ctx.fillText(spLabel, GW-18, 52);
  ctx.textAlign='left';

  // Invincibility flicker bar
  if(invTimer>0){
    ctx.fillStyle='rgba(56,189,248,0.2)';
    ctx.fillRect(0,0,GW,GH);
    // Shield ring around player
    ctx.strokeStyle=`rgba(56,189,248,${0.4+Math.sin(frame*.3)*.3})`;
    ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(PLAYER_X,P.y,48,0,Math.PI*2); ctx.stroke();
  }
}

function drawHeart(x,y,filled){
  ctx.save(); ctx.translate(x,y); ctx.scale(.85,.85);
  if(filled){
    ctx.fillStyle='#ef4444';
    const hg=ctx.createRadialGradient(-3,-3,1,0,0,12);
    hg.addColorStop(0,'#f87171'); hg.addColorStop(1,'#b91c1c');
    ctx.fillStyle=hg;
  } else {
    ctx.fillStyle='rgba(255,255,255,0.15)';
  }
  ctx.beginPath();
  ctx.moveTo(0,3);
  ctx.bezierCurveTo(-12,-8,-16,8,-4,14);
  ctx.bezierCurveTo(0,17,4,14,4,14);
  ctx.bezierCurveTo(16,8,12,-8,0,3);
  ctx.fill();
  if(filled){ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.stroke();}
  ctx.restore();
}

function drawTitle(){
  // Big SURF text
  ctx.save();
  ctx.font='bold 96px "Segoe UI",system-ui';
  ctx.textAlign='center';
  const tg=ctx.createLinearGradient(GW/2-120,0,GW/2+120,0);
  tg.addColorStop(0,'#38bdf8'); tg.addColorStop(.5,'#7dd3fc'); tg.addColorStop(1,'#0ea5e9');
  ctx.fillStyle=tg;
  ctx.shadowColor='rgba(14,165,233,0.6)'; ctx.shadowBlur=24;
  ctx.fillText('SURF', GW/2, GH/2-40);
  ctx.shadowBlur=0;
  ctx.font='16px "Segoe UI",system-ui';
  ctx.fillStyle='rgba(255,255,255,0.75)';
  ctx.fillText('Press SPACE or Tap to Start', GW/2, GH/2+20);
  ctx.font='12px "Segoe UI",system-ui';
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fillText('Jump over rocks, birds & boats — collect rings & gems!', GW/2, GH/2+50);
  if(hiScore>0){
    ctx.fillStyle='#fbbf24'; ctx.font='bold 14px "Segoe UI",system-ui';
    ctx.fillText('HI SCORE  ' + hiScore, GW/2, GH/2+82);
  }
  ctx.textAlign='left'; ctx.restore();
}

function drawGameOver(){
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.fillRect(0,0,GW,GH);
  ctx.font='bold 62px "Segoe UI",system-ui';
  ctx.textAlign='center';
  ctx.fillStyle='#ef4444';
  ctx.shadowColor='rgba(239,68,68,.6)'; ctx.shadowBlur=20;
  ctx.fillText('WIPED OUT', GW/2, GH/2-30);
  ctx.shadowBlur=0;
  ctx.font='bold 22px "Segoe UI",system-ui';
  ctx.fillStyle='#fbbf24';
  ctx.fillText('Score: ' + Math.floor(score), GW/2, GH/2+20);
  if(Math.floor(score)>=hiScore&&hiScore>0){
    ctx.fillStyle='#fbbf24';
    ctx.font='15px "Segoe UI",system-ui';
    ctx.fillText('🏆  NEW HIGH SCORE!', GW/2, GH/2+52);
  }
  ctx.font='15px "Segoe UI",system-ui';
  ctx.fillStyle='rgba(255,255,255,.6)';
  ctx.fillText('Press SPACE or Tap to Surf Again', GW/2, GH/2+82);
  ctx.textAlign='left'; ctx.restore();
}

// ── Obstacle/pickup hitbox helpers ────────────────────────────────────────────
function obsHitBox(obs){
  const y=waveY(obs.x)-obs.h*.8;
  return{x1:obs.x-obs.w*.45,x2:obs.x+obs.w*.45,y1:y,y2:y+obs.h*.9};
}
function birdHitBox(b){return{x1:b.x-20,x2:b.x+20,y1:b.y-8,y2:b.y+8};}

function playerBox(){
  return{x1:PLAYER_X-12,x2:PLAYER_X+14,y1:P.y-36,y2:P.y+4};
}

function boxOverlap(a,b){
  return a.x1<b.x2&&a.x2>b.x1&&a.y1<b.y2&&a.y2>b.y1;
}

// ── Main update ───────────────────────────────────────────────────────────────
let obsGap=0, puGap=0;
const OBS_INTERVAL = ()=>Math.max(60,160-speed*6);
const PU_INTERVAL  = ()=>Math.max(80,200-speed*5);

function update(){
  if(state!=='playing') return;

  frame++;
  scrollX += speed;
  dist += speed;
  score = dist * 0.04 + (score - dist * 0.04) * 1; // preserve collected pts
  score += speed * 0.04;
  speed = Math.min(SPEED_MAX, SPEED_INIT + dist * 0.0012);
  if(invTimer>0) invTimer--;

  // ── Player physics ────────────────────────────────────────────────────────
  const surfaceY = waveY(PLAYER_X);
  if(!P.onGround){
    P.vy += GRAVITY;
    P.y  += P.vy;
    if(P.y >= surfaceY){ P.y=surfaceY; P.vy=0; P.onGround=true; spawnSplash(PLAYER_X,P.y,'#7dd3fc'); }
  } else {
    P.y = surfaceY;
    // Wake particles
    if(frame%4===0) spawnParticle(PLAYER_X-30,P.y,'rgba(186,230,253,0.7)',
      -speed*.8,-1-Math.random()*.5,.45+Math.random()*.3,3);
  }
  P.lean+=(0-P.lean)*.15;

  // ── Clouds ────────────────────────────────────────────────────────────────
  for(const c of clouds) c.x -= c.spd;
  clouds=clouds.filter(c=>c.x>-150);
  if(clouds.length<7) spawnCloud(GW+80);

  // ── Obstacles ────────────────────────────────────────────────────────────
  obsGap++;
  if(obsGap>=OBS_INTERVAL()){obsGap=0;spawnObstacle();}
  // Move obstacles
  for(const ob of obstacles){ ob.x-=speed; ob.wob+=0.07; }
  obstacles=obstacles.filter(o=>o.x>-120);
  // Move birds
  for(const b of birds){ b.x-=b.spd; b.wingPhase+=0.14; }
  birds=birds.filter(b=>b.x>-60);

  // ── Pickups ───────────────────────────────────────────────────────────────
  puGap++;
  if(puGap>=PU_INTERVAL()){puGap=0;spawnPickup();}
  for(const p of pickups) p.x-=speed;
  pickups=pickups.filter(p=>p.x>-60);

  // ── Collision detection ────────────────────────────────────────────────────
  if(invTimer<=0 && !P.dead){
    const pb=playerBox();
    for(const ob of obstacles){
      if(boxOverlap(pb,obsHitBox(ob))){
        hitPlayer(ob.x, P.y);
        obstacles=obstacles.filter(o=>o!==ob);
        break;
      }
    }
    for(const b of birds){
      if(boxOverlap(pb,birdHitBox(b))){
        hitPlayer(b.x,b.y);
        birds=birds.filter(x=>x!==b);
        break;
      }
    }
  }

  // Pickup collection
  const pb=playerBox();
  for(let i=pickups.length-1;i>=0;i--){
    const pu=pickups[i];
    if(Math.abs(pu.x-PLAYER_X)<30&&Math.abs(pu.y-P.y)<44){
      const pts=pu.type==='ring'?50:120;
      score+=pts;
      spawnSplash(pu.x,pu.y,pu.type==='ring'?'#38bdf8':'#a78bfa');
      spawnScorePopup(pu.x,pu.y-30,'+'+pts,pu.type==='ring'?'#38bdf8':'#a78bfa');
      pickups.splice(i,1);
    }
  }

  // ── Particles ─────────────────────────────────────────────────────────────
  for(const p of particles){
    p.x+=p.vx||0; p.y+=p.vy||0;
    if(p.vy!==undefined&&p.type!=='text') p.vy+=0.08;
    p.life-=0.016;
  }
  particles=particles.filter(p=>p.life>0);
}

function hitPlayer(hx,hy){
  lives--;
  spawnSplash(PLAYER_X,P.y,'#ef4444');
  spawnScorePopup(PLAYER_X,P.y-50,'💥','#ef4444');
  P.vy=JUMP_VEL*.7; P.onGround=false; // bump up
  P.lean=lives>0?-8:0;
  P.jumpGlow=0.6;
  if(lives<=0){
    state='gameover';
    hiScore=Math.max(hiScore,Math.floor(score));
  } else {
    invTimer=120; // 2 seconds invincibility
  }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);

  // Idle wave scroll on title/gameover
  if(state!=='playing') scrollX+=1.5;

  ctx.clearRect(0,0,GW,GH);

  drawSky();
  drawClouds();
  drawOcean();
  drawParticles();

  if(state==='playing'||state==='gameover'){
    // Obstacles
    for(const ob of obstacles){
      if(ob.type==='rock') drawRock(ob);
      else drawBoat(ob);
    }
    for(const b of birds) drawBird(b);
    for(const pu of pickups) drawPickup(pu);

    // Wake trail
    if(state==='playing') drawWake(PLAYER_X,P.y);

    // Player
    const blink=invTimer>0&&Math.floor(invTimer/4)%2===0;
    if(!blink) drawSurfer(P.y, P.lean, P.dead, frame);

    drawHUD();
  }

  if(state==='title') drawTitle();
  if(state==='gameover'){ drawSurfer(P.y,P.lean,true,frame); drawGameOver(); }

  update();
}

// ── Boot ─────────────────────────────────────────────────────────────────────
// Seed background clouds for title
for(let i=0;i<6;i++) spawnCloud(Math.random()*GW);
loop();
</script>
