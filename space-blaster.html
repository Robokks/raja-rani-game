<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Space Blaster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#020212;overflow:hidden;touch-action:none;font-family:'Orbitron',monospace;}
canvas{display:block;position:fixed;inset:0;}
#ctrl{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 20px max(16px,env(safe-area-inset-bottom));
  z-index:10;pointer-events:none;height:100px;
}
.cb{
  pointer-events:auto;
  min-width:72px;min-height:66px;
  border-radius:14px;
  border:2px solid rgba(34,197,94,.35);
  background:rgba(0,5,30,.75);
  color:#22c55e;font-size:26px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  user-select:none;-webkit-user-select:none;
  touch-action:none;
  backdrop-filter:blur(6px);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:background .1s,border-color .1s;
}
.cb:active,.cb.pressed{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.7);}
.cb span{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;opacity:.65;color:#22c55e;}
#btn-fire{
  border-color:rgba(220,38,38,.4);color:#ef4444;
  min-width:80px;min-height:74px;border-radius:50%;
  background:rgba(30,0,0,.75);
}
#btn-fire:active,#btn-fire.pressed{background:rgba(220,38,38,.2);border-color:rgba(220,38,38,.8);}
#btn-fire span{color:#ef4444;}
@media (hover:hover) and (pointer:fine){#ctrl{display:none;}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ctrl">
  <div class="cb" id="btn-left" aria-label="Move left"><div>◀</div><span>LEFT</span></div>
  <div class="cb" id="btn-fire" aria-label="Fire"><div>🔥</div><span>FIRE</span></div>
  <div class="cb" id="btn-right" aria-label="Move right"><div>▶</div><span>RIGHT</span></div>
</div>
<script>
'use strict';
const C=document.getElementById('c'),X=C.getContext('2d');
const GW=400,GH=660;
let SW,SH,sc,ox,oy;

function resize(){
  SW=window.innerWidth;SH=window.innerHeight;
  C.width=SW;C.height=SH;
  sc=Math.min(SW/GW,SH/GH);
  ox=(SW-GW*sc)/2;oy=(SH-GH*sc)/2;
}
resize();
window.addEventListener('resize',resize);

// ─── Input ────────────────────────────────────────────────────────────────────
const K={};
let tL=false,tR=false,tF=false;

document.addEventListener('keydown',e=>{
  K[e.code]=true;
  if(e.code==='Space'){e.preventDefault();tryStart();}
  if(e.code==='Enter')tryStart();
});
document.addEventListener('keyup',e=>{K[e.code]=false;});

function addTouch(id,onDown,onUp){
  const el=document.getElementById(id);
  const dn=e=>{e.preventDefault();el.classList.add('pressed');onDown();};
  const up=e=>{e.preventDefault();el.classList.remove('pressed');onUp();};
  el.addEventListener('touchstart',dn,{passive:false});
  el.addEventListener('touchend',up,{passive:false});
  el.addEventListener('touchcancel',up,{passive:false});
}
addTouch('btn-left',()=>tL=true,()=>tL=false);
addTouch('btn-right',()=>tR=true,()=>tR=false);
addTouch('btn-fire',()=>tF=true,()=>tF=false);

C.addEventListener('touchend',e=>{e.preventDefault();tryStart();},{passive:false});
C.addEventListener('click',tryStart);

function tryStart(){if(gs==='menu'||gs==='over')startGame();}

// ─── Audio ────────────────────────────────────────────────────────────────────
let AC;
function initAC(){
  if(AC)return;
  try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(_){}
}
['click','touchstart'].forEach(ev=>document.addEventListener(ev,initAC,{once:true}));

function beep(freq,dur,type='square',vol=0.1,sweep=0){
  if(!AC)return;
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=type;o.frequency.value=freq;
    if(sweep)o.frequency.linearRampToValueAtTime(sweep,AC.currentTime+dur);
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur);
    o.start();o.stop(AC.currentTime+dur+0.01);
  }catch(_){}
}

// ─── Constants ───────────────────────────────────────────────────────────────
const CLR={
  bg:'#0F172A',bg2:'#020212',
  player:'#22d3ee',playerGlow:'#06b6d4',
  bullet:'#67e8f9',bulletGlow:'#22d3ee',
  eBullet:'#f87171',eBulletGlow:'#dc2626',
  score:'#22c55e',hi:'#4ade80',
  lvl:'#a78bfa',
  hud:'rgba(255,255,255,0.5)',
  bang:['#f87171','#fb923c','#fbbf24','#22d3ee','#a78bfa'],
  row:[
    ['#f87171','#fca5a5','#fbbf24'],
    ['#fb923c','#fcd34d','#f87171'],
    ['#a78bfa','#c4b5fd','#f0abfc'],
    ['#22d3ee','#67e8f9','#a5f3fc'],
  ]
};

// ─── State ────────────────────────────────────────────────────────────────────
let gs='menu'; // menu|play|over
let score=0,hiScore=+(localStorage.getItem('sbhs')||0),lives=3,level=1;

const P={x:GW/2,y:GH-78,w:36,h:30,spd:215,lastFire:0,fireRate:300,invuln:0};
let bulls=[],eBulls=[],parts=[],enems=[],stars=[];
let eDir=1,eMvTimer=0,eMvInterval=900,eFireTimer=0,comboTimer=0;
let flashMsg='',flashT=0;

// ─── Stars ────────────────────────────────────────────────────────────────────
function initStars(){
  stars=Array.from({length:130},()=>({
    x:Math.random()*GW,y:Math.random()*GH,
    r:Math.random()*1.4+0.3,
    sp:Math.random()*50+8,
    ph:Math.random()*Math.PI*2,
    bright:Math.random()*.8+.2
  }));
}

// ─── Wave spawn ───────────────────────────────────────────────────────────────
function spawnWave(){
  enems=[];
  const rows=Math.min(4,2+Math.floor((level-1)/2));
  const cols=8;
  for(let r=0;r<rows;r++){
    const colors=CLR.row[Math.min(r,3)];
    const pts=[10,20,40,80][Math.min(r,3)];
    for(let c=0;c<cols;c++){
      enems.push({
        x:26+c*44,y:78+r*52,
        w:30,h:26,
        alive:true,pts,colors,
        row:r,ph:Math.random()*Math.PI*2
      });
    }
  }
  eDir=1;eMvTimer=0;
  eMvInterval=Math.max(120,900-(level-1)*70);
}

// ─── Game lifecycle ───────────────────────────────────────────────────────────
function startGame(){
  initAC();
  score=0;lives=3;level=1;
  bulls=[];eBulls=[];parts=[];flashMsg='';
  P.x=GW/2;P.invuln=0;
  initStars();spawnWave();
  gs='play';
  beep(440,.15,'sine',.15);
}

function showFlash(msg){flashMsg=msg;flashT=1.4;}

// ─── Fire ─────────────────────────────────────────────────────────────────────
function fire(){
  const now=performance.now();
  if(now-P.lastFire<P.fireRate)return;
  P.lastFire=now;
  bulls.push({x:P.x,y:P.y-P.h/2-6,vy:-420});
  beep(1400,.055,'square',.07);
}

// ─── Explosion ────────────────────────────────────────────────────────────────
function explode(x,y,colors,n=14){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=Math.random()*130+30;
    parts.push({
      x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:1,dec:.8+Math.random()*.6,
      r:Math.random()*4.5+1.5,
      col:colors[~~(Math.random()*colors.length)]
    });
  }
}

function loseLife(){
  if(gs!=='play')return;
  lives--;
  P.invuln=2.2;
  explode(P.x,P.y,['#22d3ee','#ffffff','#a5f3fc'],22);
  beep(80,.5,'sawtooth',.2);
  if(lives<=0){
    gs='over';
    explode(P.x,P.y,CLR.bang,30);
    beep(40,1.2,'sawtooth',.25,20);
  }
}

// ─── Main loop ────────────────────────────────────────────────────────────────
let lt=0;
function loop(ts){
  const dt=Math.min((ts-lt)/1000,.05);lt=ts;
  requestAnimationFrame(loop);
  update(dt,ts);
  draw(ts);
}
requestAnimationFrame(loop);

// ─── Update ───────────────────────────────────────────────────────────────────
function update(dt,ts){
  // Stars always scroll
  stars.forEach(s=>{s.y=(s.y+s.sp*dt)%GH;});

  // Particles always update
  parts.forEach(p=>{
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vx*=1-3*dt;p.vy*=1-3*dt;
    p.life-=p.dec*dt;
    p.r=Math.max(0,p.r-.4*dt);
  });
  parts=parts.filter(p=>p.life>0&&p.r>.1);

  // Flash message timer
  if(flashT>0)flashT-=dt;

  if(gs!=='play')return;

  if(P.invuln>0)P.invuln-=dt;

  // Player movement
  const mL=K.ArrowLeft||K.KeyA||tL;
  const mR=K.ArrowRight||K.KeyD||tR;
  const sh=K.Space||K.KeyZ||K.KeyX||tF;

  if(mL)P.x=Math.max(P.w/2+2,P.x-P.spd*dt);
  if(mR)P.x=Math.min(GW-P.w/2-2,P.x+P.spd*dt);
  if(sh)fire();

  // Move player bullets
  bulls.forEach(b=>{b.y+=b.vy*dt;});
  bulls=bulls.filter(b=>b.y>-20);

  // Move enemy bullets
  const esp=165+level*20;
  eBulls.forEach(b=>{b.y+=esp*dt;});
  eBulls=eBulls.filter(b=>b.y<GH+20);

  // Enemy grid movement
  eMvTimer+=dt*1000;
  if(eMvTimer>=eMvInterval){
    eMvTimer=0;
    const alv=enems.filter(e=>e.alive);

    if(alv.length===0){
      // Next wave
      level++;
      bulls=[];eBulls=[];
      spawnWave();
      showFlash('WAVE '+(level));
      beep(660,.35,'sine',.2);
      return;
    }

    let minX=Infinity,maxX=-Infinity;
    alv.forEach(e=>{
      if(e.x<minX)minX=e.x;
      if(e.x>maxX)maxX=e.x;
    });

    const hitWall=(eDir===1&&maxX>GW-20)||(eDir===-1&&minX<20);
    if(hitWall){
      eDir*=-1;
      alv.forEach(e=>{e.y+=24;});
      beep(150,.06,'square',.06);
    } else {
      alv.forEach(e=>{e.x+=eDir*18;});
    }

    // Enemies reach player zone
    if(alv.some(e=>e.y>GH-108)){loseLife();return;}

    // Speed up as enemies dwindle
    const pct=alv.length/enems.length;
    eMvInterval=Math.max(100,(900-(level-1)*70)*(0.25+0.75*pct));
  }

  // Enemy shooting
  eFireTimer+=dt*1000;
  const efi=Math.max(450,2100-level*100);
  if(eFireTimer>=efi){
    eFireTimer=0;
    const alv=enems.filter(e=>e.alive);
    if(alv.length){
      const s=alv[~~(Math.random()*alv.length)];
      eBulls.push({x:s.x,y:s.y+s.h/2+5,col:s.colors[0]});
      beep(160,.09,'sawtooth',.06);
    }
  }

  // Bullet vs enemy collision
  for(let bi=bulls.length-1;bi>=0;bi--){
    const b=bulls[bi];
    let hit=false;
    for(const e of enems){
      if(!e.alive)continue;
      if(Math.abs(b.x-e.x)<e.w/2+4&&Math.abs(b.y-e.y)<e.h/2+5){
        e.alive=false;
        score+=e.pts*(level);
        if(score>hiScore){hiScore=score;localStorage.setItem('sbhs',hiScore);}
        explode(e.x,e.y,e.colors,15);
        beep(300+Math.random()*200,.12,'square',.09);
        hit=true;break;
      }
    }
    if(hit)bulls.splice(bi,1);
  }

  // Enemy bullet vs player
  if(P.invuln<=0){
    for(let bi=eBulls.length-1;bi>=0;bi--){
      const b=eBulls[bi];
      if(Math.abs(b.x-P.x)<P.w/2+1&&Math.abs(b.y-P.y)<P.h/2+2){
        eBulls.splice(bi,1);
        loseLife();
        break;
      }
    }
  }
}

// ─── Drawing helpers ──────────────────────────────────────────────────────────
function glow(color,blur){X.shadowColor=color;X.shadowBlur=blur;}
function noGlow(){X.shadowColor='transparent';X.shadowBlur=0;}

function drawStars(ts){
  stars.forEach(s=>{
    const t=.5+.5*Math.sin(ts/900+s.ph);
    X.globalAlpha=s.bright*(.4+.6*t);
    X.fillStyle='#fff';
    X.beginPath();X.arc(s.x,s.y,s.r,0,Math.PI*2);X.fill();
  });
  X.globalAlpha=1;
}

function drawShip(ts){
  const x=P.x,y=P.y;
  X.save();X.translate(x,y);

  // Engine flame
  const fl=7+Math.random()*5;
  const fg=X.createLinearGradient(0,P.h/4,0,P.h/2+fl);
  fg.addColorStop(0,'#f97316');fg.addColorStop(.5,'#ef4444');fg.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=fg;
  X.beginPath();
  X.moveTo(-6,P.h/4);
  X.quadraticCurveTo(-2,P.h/2+fl*.7,0,P.h/2+fl);
  X.quadraticCurveTo(2,P.h/2+fl*.7,6,P.h/4);
  X.closePath();X.fill();

  // Wing glow
  glow(CLR.playerGlow,16+6*Math.sin(ts/120));

  // Ship body
  const sg=X.createLinearGradient(0,-P.h/2,0,P.h/2);
  sg.addColorStop(0,'#e0f9ff');sg.addColorStop(.35,CLR.player);sg.addColorStop(1,'#0e7490');
  X.fillStyle=sg;
  X.strokeStyle='rgba(255,255,255,.45)';X.lineWidth=1.5;

  X.beginPath();
  X.moveTo(0,-P.h/2);
  X.lineTo(P.w/2,P.h/3);
  X.lineTo(P.w/3,P.h/2);
  X.lineTo(-P.w/3,P.h/2);
  X.lineTo(-P.w/2,P.h/3);
  X.closePath();
  X.fill();X.stroke();

  // Wing shade
  X.fillStyle='rgba(8,80,120,.5)';
  X.beginPath();
  X.moveTo(P.w/5,-P.h/10);X.lineTo(P.w/2,P.h/3);X.lineTo(P.w/4,P.h/4);X.closePath();
  X.fill();
  X.beginPath();
  X.moveTo(-P.w/5,-P.h/10);X.lineTo(-P.w/2,P.h/3);X.lineTo(-P.w/4,P.h/4);X.closePath();
  X.fill();

  // Cockpit
  const cg=X.createRadialGradient(0,-P.h/7,1,0,-P.h/7,8);
  cg.addColorStop(0,'#fff');cg.addColorStop(1,'rgba(103,232,249,.2)');
  X.fillStyle=cg;
  X.beginPath();X.ellipse(0,-P.h/7,5,8,0,0,Math.PI*2);X.fill();

  noGlow();X.restore();
}

function drawEnemy(e,ts){
  const w=2.5*Math.sin(ts/320+e.ph);
  X.save();X.translate(e.x,e.y+w);
  glow(e.colors[0],12);

  // Body
  X.fillStyle=e.colors[0];
  X.strokeStyle=e.colors[1];X.lineWidth=1.5;

  if(e.row===0){
    // Bug shape
    X.beginPath();
    X.ellipse(0,0,e.w/2,e.h/2,0,0,Math.PI*2);
    X.fill();X.stroke();
    // Eyes
    X.fillStyle='#000';
    X.beginPath();X.arc(-5,-3,3,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(5,-3,3,0,Math.PI*2);X.fill();
    X.fillStyle='#fff';
    X.beginPath();X.arc(-4,-4,1.2,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(6,-4,1.2,0,Math.PI*2);X.fill();
    // Antennae
    X.strokeStyle=e.colors[1];X.lineWidth=1.5;
    X.beginPath();X.moveTo(-5,-e.h/2);X.lineTo(-9,-e.h/2-6);X.stroke();
    X.beginPath();X.moveTo(5,-e.h/2);X.lineTo(9,-e.h/2-6);X.stroke();
  } else if(e.row===1){
    // Crab shape
    X.beginPath();
    X.roundRect(-e.w/2,-e.h/2,e.w,e.h,4);
    X.fill();X.stroke();
    // Claws
    X.fillStyle=e.colors[0];
    X.beginPath();X.ellipse(-e.w/2-5,4,5,3,-.4,0,Math.PI*2);X.fill();
    X.beginPath();X.ellipse(e.w/2+5,4,5,3,.4,0,Math.PI*2);X.fill();
    // Eyes
    X.fillStyle='#000';
    X.beginPath();X.arc(-5,-2,3,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(5,-2,3,0,Math.PI*2);X.fill();
    X.fillStyle=e.colors[2]||'#fff';
    X.beginPath();X.arc(-4,-3,1.3,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(6,-3,1.3,0,Math.PI*2);X.fill();
  } else if(e.row===2){
    // UFO
    X.beginPath();X.ellipse(0,3,e.w/2,e.h/3,0,0,Math.PI*2);X.fill();X.stroke();
    X.fillStyle=e.colors[1];
    X.beginPath();X.ellipse(0,-2,e.w/3,e.h/2.5,0,0,Math.PI*2);X.fill();
    // Window
    X.fillStyle='rgba(255,255,255,.7)';
    X.beginPath();X.ellipse(0,-3,5,5,0,0,Math.PI*2);X.fill();
    // Lights
    for(let i=-1;i<=1;i++){
      X.fillStyle=i===0?'#fff':e.colors[2]||e.colors[0];
      X.beginPath();X.arc(i*8,3,2.5,0,Math.PI*2);X.fill();
    }
  } else {
    // Robot
    X.beginPath();
    X.roundRect(-e.w/2,-e.h/2,e.w,e.h,3);
    X.fill();X.stroke();
    // Visor
    X.fillStyle='rgba(0,0,0,.6)';
    X.beginPath();X.roundRect(-7,-7,14,6,2);X.fill();
    X.fillStyle=e.colors[2]||'#fff';
    X.beginPath();X.arc(-3,-4,2,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(3,-4,2,0,Math.PI*2);X.fill();
    // Mouth
    X.strokeStyle=e.colors[1];X.lineWidth=1.5;
    X.beginPath();X.moveTo(-5,3);X.lineTo(-2,5);X.lineTo(2,5);X.lineTo(5,3);X.stroke();
    // Antenna
    X.beginPath();X.moveTo(0,-e.h/2);X.lineTo(0,-e.h/2-6);
    X.arc(0,-e.h/2-8,2,0,Math.PI*2);X.stroke();
  }

  noGlow();X.restore();
}

function drawMiniShip(x,y){
  X.save();X.translate(x,y);X.scale(.5,.5);
  glow(CLR.playerGlow,8);
  X.fillStyle=CLR.player;X.strokeStyle='rgba(255,255,255,.4)';X.lineWidth=1.5;
  X.beginPath();
  X.moveTo(0,-14);X.lineTo(14,10);X.lineTo(8,16);
  X.lineTo(-8,16);X.lineTo(-14,10);X.closePath();
  X.fill();X.stroke();
  noGlow();X.restore();
}

function drawHUD(){
  X.textBaseline='top';

  // Score
  X.textAlign='left';
  X.fillStyle='rgba(34,197,94,.5)';
  X.font='9px "JetBrains Mono",monospace';
  X.fillText('SCORE',10,8);
  glow(CLR.score,8);
  X.fillStyle=CLR.score;
  X.font='bold 21px "Orbitron",monospace';
  X.fillText(String(score).padStart(7,'0'),10,19);
  noGlow();

  // Level
  X.textAlign='center';
  X.fillStyle='rgba(167,139,250,.55)';
  X.font='9px "JetBrains Mono",monospace';
  X.fillText('LEVEL',GW/2,8);
  glow(CLR.lvl,8);
  X.fillStyle=CLR.lvl;
  X.font='bold 20px "Orbitron",monospace';
  X.fillText(String(level),GW/2,19);
  noGlow();

  // Lives
  for(let i=0;i<Math.max(0,lives);i++) drawMiniShip(GW-14-i*24,28);

  // Divider
  X.strokeStyle='rgba(34,197,94,.15)';X.lineWidth=1;
  X.beginPath();X.moveTo(0,52);X.lineTo(GW,52);X.stroke();
}

function drawMenu(ts){
  X.textAlign='center';X.textBaseline='middle';

  // Glow title
  const g1=10+8*Math.sin(ts/700);
  glow('#06b6d4',30+g1);
  X.fillStyle='#22d3ee';
  X.font='bold 58px "Orbitron",monospace';
  X.fillText('SPACE',GW/2,185);
  glow('#7c3aed',25+g1);
  X.fillStyle='#a78bfa';
  X.fillText('BLASTER',GW/2,255);
  noGlow();

  X.fillStyle='rgba(251,191,36,.85)';
  X.font='700 12px "JetBrains Mono",monospace';
  X.fillText('·  A R C A D E  E D I T I O N  ·',GW/2,291);

  // Enemy showcase
  const types=[0,1,2,3];
  types.forEach((r,i)=>{
    const ex=GW/2+(i-1.5)*50;
    const ey=370+Math.sin(ts/400+i*.9)*8;
    const fake={x:0,y:0,w:30,h:26,alive:true,row:r,ph:i,colors:CLR.row[r]};
    X.save();X.translate(ex,ey);drawEnemy(fake,ts);X.restore();
  });

  // Blink prompt
  if(Math.sin(ts/520)>0){
    glow('#ffffff',6);
    X.fillStyle='#fff';
    X.font='bold 15px "Orbitron",monospace';
    X.fillText('TAP  OR  PRESS  SPACE',GW/2,438);
    noGlow();
  }

  X.fillStyle='rgba(255,255,255,.3)';
  X.font='11px "JetBrains Mono",monospace';
  X.fillText('← → MOVE  |  SPACE FIRE',GW/2,466);

  if(hiScore>0){
    X.fillStyle='rgba(251,191,36,.65)';
    X.font='13px "JetBrains Mono",monospace';
    X.fillText('BEST  '+String(hiScore).padStart(7,'0'),GW/2,512);
  }
}

function drawGameOver(ts){
  X.textAlign='center';X.textBaseline='middle';

  glow('#dc2626',30+10*Math.sin(ts/500));
  X.fillStyle='#f87171';
  X.font='bold 60px "Orbitron",monospace';
  X.fillText('GAME',GW/2,192);
  X.fillText('OVER',GW/2,263);
  noGlow();

  X.fillStyle='rgba(255,255,255,.55)';
  X.font='10px "JetBrains Mono",monospace';
  X.fillText('FINAL SCORE',GW/2,318);
  glow(CLR.score,12);
  X.fillStyle=CLR.score;
  X.font='bold 36px "Orbitron",monospace';
  X.fillText(String(score).padStart(7,'0'),GW/2,355);
  noGlow();

  X.fillStyle='rgba(255,255,255,.4)';
  X.font='11px "JetBrains Mono",monospace';
  X.fillText('LEVEL REACHED · '+level,GW/2,392);

  if(score>0&&score>=hiScore){
    glow('#fbbf24',14);
    X.fillStyle='#fbbf24';
    X.font='bold 15px "Orbitron",monospace';
    X.fillText('✦  NEW HIGH SCORE  ✦',GW/2,422);
    noGlow();
  } else if(hiScore>0){
    X.fillStyle='rgba(251,191,36,.5)';
    X.font='11px "JetBrains Mono",monospace';
    X.fillText('BEST  '+String(hiScore).padStart(7,'0'),GW/2,422);
  }

  if(Math.sin(ts/520)>0){
    glow('#fff',4);
    X.fillStyle='#fff';
    X.font='bold 14px "Orbitron",monospace';
    X.fillText('TAP  OR  PRESS  SPACE',GW/2,475);
    noGlow();
  }
}

// ─── Main draw ────────────────────────────────────────────────────────────────
function draw(ts){
  X.save();
  X.clearRect(0,0,SW,SH);

  // Full background
  const bg=X.createLinearGradient(0,0,0,SH);
  bg.addColorStop(0,CLR.bg2);bg.addColorStop(1,CLR.bg);
  X.fillStyle=bg;X.fillRect(0,0,SW,SH);

  // Apply game-space transform
  X.translate(ox,oy);X.scale(sc,sc);
  X.beginPath();X.rect(0,0,GW,GH);X.clip();

  // Stars
  drawStars(ts);

  // ── MENU ──
  if(gs==='menu'){drawMenu(ts);X.restore();return;}

  // ── GAME OVER ──
  if(gs==='over'){
    drawGameOver(ts);
    // Particles still render
    parts.forEach(p=>{
      X.globalAlpha=Math.max(0,p.life);
      glow(p.col,5);
      X.fillStyle=p.col;
      X.beginPath();X.arc(p.x,p.y,Math.max(.1,p.r),0,Math.PI*2);X.fill();
      noGlow();
    });
    X.globalAlpha=1;
    X.restore();return;
  }

  // ── PLAYING ──

  // Enemies
  enems.forEach(e=>{if(e.alive)drawEnemy(e,ts);});

  // Player bullets
  bulls.forEach(b=>{
    X.save();
    glow(CLR.bulletGlow,14);
    X.fillStyle='#e0f9ff';X.fillRect(b.x-2,b.y-16,4,24);
    X.fillStyle=CLR.bullet;X.fillRect(b.x-1.5,b.y-16,3,20);
    noGlow();X.restore();
  });

  // Enemy bullets
  eBulls.forEach(b=>{
    X.save();X.translate(b.x,b.y);
    glow(CLR.eBulletGlow,12);
    X.fillStyle='#fb923c';
    X.beginPath();
    X.moveTo(0,-10);X.lineTo(4,0);X.lineTo(0,10);X.lineTo(-4,0);
    X.closePath();X.fill();
    X.fillStyle=CLR.eBullet;
    X.beginPath();
    X.moveTo(0,-7);X.lineTo(2.5,0);X.lineTo(0,7);X.lineTo(-2.5,0);
    X.closePath();X.fill();
    noGlow();X.restore();
  });

  // Particles
  parts.forEach(p=>{
    X.globalAlpha=Math.max(0,p.life);
    glow(p.col,5);
    X.fillStyle=p.col;
    X.beginPath();X.arc(p.x,p.y,Math.max(.1,p.r),0,Math.PI*2);X.fill();
    noGlow();
  });
  X.globalAlpha=1;

  // Player (blinks when invulnerable)
  if(!(P.invuln>0&&Math.sin(ts/65)>0))drawShip(ts);

  // Flash message
  if(flashT>0){
    const a=Math.min(1,flashT);
    X.globalAlpha=a;
    X.textAlign='center';X.textBaseline='middle';
    glow('#a78bfa',20);
    X.fillStyle='#fff';
    X.font='bold 28px "Orbitron",monospace';
    X.fillText(flashMsg,GW/2,GH/2-40);
    noGlow();
    X.globalAlpha=1;
  }

  // HUD
  drawHUD();

  X.restore();
}
</script>

</html>
