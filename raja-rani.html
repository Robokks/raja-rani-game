<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ராஜா ராணி | Raja Rani Game</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@500;700;800&family=Catamaran:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--kraft:#d9b98a;--paper:#fdf6e3;--ink:#3a2a18;--red:#b3322b;--green:#2e6e4e;--gold:#d49a2a;--shadow:rgba(58,42,24,.25);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'Baloo Thambi 2','Catamaran',sans-serif;background:var(--kraft);background-image:radial-gradient(circle at 20% 10%,rgba(255,255,255,.25),transparent 40%),radial-gradient(circle at 80% 90%,rgba(0,0,0,.08),transparent 45%);color:var(--ink);display:flex;flex-direction:column;align-items:center;min-height:100%;padding:16px 14px 72px;user-select:none;}
.screen{display:none;width:100%;max-width:430px;animation:fadein .3s ease;}
.screen.active{display:block;}
@keyframes fadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.crown{font-size:44px;text-align:center;line-height:1;}
h1{text-align:center;font-weight:800;font-size:32px;color:var(--red);text-shadow:1px 2px 0 rgba(255,255,255,.5);line-height:1.1;}
.sub{text-align:center;font-family:'Catamaran';font-size:13px;font-weight:600;opacity:.7;margin-top:2px;letter-spacing:2px;text-transform:uppercase;}
.centertext{text-align:center;font-size:17px;font-weight:700;margin-top:6px;}
.hint{text-align:center;font-family:'Catamaran';font-size:13px;font-weight:600;opacity:.6;margin-top:10px;}
.err{text-align:center;color:var(--red);font-weight:700;margin-top:8px;min-height:20px;font-size:14px;}
.tagwrap{text-align:center;margin-top:4px;}
.roundtag{font-family:'Catamaran';font-weight:800;font-size:13px;letter-spacing:2px;text-transform:uppercase;background:var(--ink);color:var(--kraft);display:inline-block;padding:4px 14px;border-radius:20px;}
.panel{background:var(--paper);border-radius:6px;box-shadow:0 6px 0 var(--shadow),0 10px 24px rgba(0,0,0,.12);padding:20px 18px;margin-top:16px;position:relative;}
.panel::before{content:"";position:absolute;inset:6px;border:1.5px dashed rgba(58,42,24,.25);border-radius:4px;pointer-events:none;}
label{font-family:'Catamaran';font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;opacity:.65;display:block;margin:12px 0 4px;}
input[type=text]{width:100%;padding:10px 12px;font-family:'Baloo Thambi 2';font-size:18px;font-weight:700;border:2px solid rgba(58,42,24,.3);border-radius:6px;background:#fffdf6;color:var(--ink);outline:none;}
input[type=text]:focus{border-color:var(--red);}
input.code{text-transform:uppercase;letter-spacing:6px;text-align:center;font-size:24px;}
.btn{display:block;width:100%;margin-top:16px;padding:14px 0;font-family:'Baloo Thambi 2';font-size:19px;font-weight:800;background:var(--red);color:#fff;border:none;border-radius:8px;cursor:pointer;box-shadow:0 5px 0 #7e1f1a;transition:transform .08s,box-shadow .08s;}
.btn:active{transform:translateY(4px);box-shadow:0 1px 0 #7e1f1a;}
.btn.green{background:var(--green);box-shadow:0 5px 0 #1c4732;}
.btn.green:active{box-shadow:0 1px 0 #1c4732;}
.btn.ghost{background:transparent;color:var(--ink);box-shadow:none;border:2px solid rgba(58,42,24,.4);font-size:15px;padding:9px 0;}
.btn:disabled{opacity:.5;pointer-events:none;}
.waiting{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;font-weight:700;opacity:.7;}
.dotpulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--ink);animation:pulse 1s infinite alternate;}
.dotpulse:nth-child(2){animation-delay:.2s;}.dotpulse:nth-child(3){animation-delay:.4s;}
@keyframes pulse{from{opacity:.2;transform:scale(.7);}to{opacity:1;transform:scale(1);}}
.roomcode{font-size:44px;font-weight:800;letter-spacing:10px;text-align:center;color:var(--ink);background:#fffdf6;border:2px dashed rgba(58,42,24,.35);border-radius:8px;padding:10px 0;margin-top:10px;}
.player-list{margin-top:12px;}
.pl-row{display:flex;align-items:center;gap:10px;background:#fffdf6;border-radius:6px;padding:10px 14px;margin-top:8px;font-weight:700;font-size:16px;border:1.5px solid rgba(58,42,24,.15);}
.pl-row .tag{font-family:'Catamaran';font-size:11px;font-weight:800;letter-spacing:1px;background:var(--gold);color:#fff;padding:2px 8px;border-radius:10px;white-space:nowrap;}
.pl-row.empty{opacity:.45;font-weight:600;border-style:dashed;}
.np-picker{display:flex;gap:8px;margin-top:8px;}
.np-btn{flex:1;padding:10px 0;font-family:'Baloo Thambi 2';font-size:18px;font-weight:800;border:2px solid rgba(58,42,24,.3);border-radius:8px;background:#fffdf6;color:var(--ink);cursor:pointer;}
.np-btn.active{background:var(--ink);color:var(--kraft);border-color:var(--ink);}
.np-btn:disabled{opacity:.35;pointer-events:none;}
.avatar-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.av-opt{font-size:26px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:2px solid transparent;cursor:pointer;background:#fffdf6;transition:transform .1s;}
.av-opt:active{transform:scale(.88);}
.av-opt.selected{border-color:var(--red);background:#fce8e7;transform:scale(1.1);}
.kick-btn{background:none;border:none;color:var(--red);font-size:17px;font-weight:800;cursor:pointer;padding:2px 6px;margin-left:auto;line-height:1;flex-shrink:0;}
.offline-badge{font-family:'Catamaran';font-size:10px;font-weight:800;color:#fff;background:#999;padding:1px 6px;border-radius:8px;margin-left:4px;vertical-align:middle;}
.dice-wrap{display:flex;flex-direction:column;align-items:center;margin-top:24px;}
.dice{width:110px;height:110px;background:var(--paper);border-radius:20px;box-shadow:0 8px 0 var(--shadow),0 12px 24px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:68px;cursor:pointer;transition:transform .08s;line-height:1;}
.dice:active{transform:scale(.92);}
.dice.rolling{animation:diceRoll 1.2s ease-in-out;pointer-events:none;}
@keyframes diceRoll{0%{transform:rotate(0)scale(1)}15%{transform:rotate(-20deg)scale(1.1)}35%{transform:rotate(30deg)scale(.9)}55%{transform:rotate(-15deg)scale(1.05)}75%{transform:rotate(25deg)scale(.95)}100%{transform:rotate(0)scale(1)}}
.flip-scene{perspective:800px;width:210px;height:270px;margin:20px auto 0;}
.flip-card-inner{width:100%;height:100%;position:relative;transition:transform .7s ease;transform-style:preserve-3d;}
.flip-card-inner.flipped{transform:rotateY(180deg);}
.flip-card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 8px 0 var(--shadow),0 14px 28px rgba(0,0,0,.2);}
.flip-card-front{background:var(--kraft);background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.07) 0,rgba(255,255,255,.07) 1px,transparent 0,transparent 50%);background-size:8px 8px;}
.flip-card-back{background:var(--paper);transform:rotateY(180deg);text-align:center;padding:20px 16px;}
.flip-card-front .qm{font-size:72px;font-weight:800;color:rgba(58,42,24,.3);}
.flip-card-back .role-emoji{font-size:68px;line-height:1;}
.flip-card-back .role-ta{font-size:32px;font-weight:800;margin-top:6px;}
.flip-card-back .role-en{font-family:'Catamaran';font-size:12px;font-weight:800;letter-spacing:3px;text-transform:uppercase;opacity:.6;}
.flip-card-back .role-pts{font-size:17px;font-weight:800;margin-top:8px;color:var(--gold);}
.progress-track{height:4px;background:rgba(58,42,24,.15);border-radius:2px;margin-top:20px;overflow:hidden;}
.progress-fill{height:100%;background:var(--red);border-radius:2px;}
@keyframes shrinkWidth{from{width:100%;}to{width:0%;}}
.chain-progress{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:2px;margin-top:8px;padding:2px 4px;}
.cp-role{font-family:'Catamaran';font-size:12px;font-weight:800;background:#fffdf6;border:2px solid rgba(58,42,24,.2);border-radius:20px;padding:3px 9px;white-space:nowrap;}
.cp-role.declared{background:var(--gold);color:#fff;border-color:var(--gold);}
.cp-role.found{background:var(--green);color:#fff;border-color:var(--green);}
.cp-role.target{background:var(--red);color:#fff;border-color:var(--red);animation:tpulse 1s infinite alternate;}
@keyframes tpulse{from{opacity:.75;transform:scale(1);}to{opacity:1;transform:scale(1.07);}}
.cp-arrow{font-size:12px;opacity:.4;padding:0 2px;}
.candidates{margin-top:12px;}
.candidate{display:flex;align-items:center;gap:12px;background:var(--paper);border-radius:8px;padding:13px 14px;margin-top:10px;box-shadow:0 4px 0 var(--shadow);cursor:pointer;transition:transform .1s;}
.candidate:active{transform:scale(.97);}
.candidate.passive{cursor:default;opacity:.75;}
.candidate.tappable{border:2px solid var(--ink);}
.candidate .cface{font-size:30px;flex-shrink:0;}
.candidate .cinfo{display:flex;flex-direction:column;flex:1;gap:2px;}
.candidate .cname{font-size:18px;font-weight:800;line-height:1.2;}
.candidate .csub{font-size:13px;font-family:'Catamaran';font-weight:700;opacity:.7;}
.candidate .cq{font-size:22px;font-weight:800;color:var(--red);margin-left:auto;}
.candidate.revealed{background:#fffdf6;cursor:default;}
.candidate.revealed .crole{margin-left:auto;font-weight:800;font-size:13px;font-family:'Catamaran';color:var(--green);}
.mychit{position:fixed;bottom:58px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--kraft);font-weight:800;padding:7px 18px;border-radius:20px;font-size:13px;z-index:50;box-shadow:0 4px 12px rgba(0,0,0,.35);white-space:nowrap;}
.result-banner{text-align:center;border-radius:8px;padding:14px;margin-top:14px;font-size:17px;font-weight:800;color:#fff;animation:pop .35s ease;line-height:1.5;}
@keyframes pop{from{transform:scale(.7);opacity:0;}to{transform:none;opacity:1;}}
.result-banner.good{background:var(--green);box-shadow:0 5px 0 #1c4732;}
.role-row{display:flex;align-items:center;gap:10px;background:var(--paper);border-radius:6px;padding:10px 14px;margin-top:8px;box-shadow:0 3px 0 var(--shadow);font-weight:700;font-size:15px;}
.role-row .em{font-size:22px;}
.role-row .pt{margin-left:auto;font-weight:800;color:var(--gold);}
.score-table{width:100%;margin-top:12px;border-collapse:collapse;}
.score-table td{padding:9px 8px;font-weight:700;font-size:16px;border-bottom:1.5px dashed rgba(58,42,24,.25);}
.score-table td:last-child{text-align:right;font-weight:800;color:var(--green);font-size:18px;}
.score-table tr.leader td{color:var(--red);}
.winner-big{font-size:64px;text-align:center;margin-top:8px;}
.chat-panel{position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;background:var(--paper);border-top:2px solid rgba(58,42,24,.2);border-radius:12px 12px 0 0;box-shadow:0 -4px 16px rgba(0,0,0,.15);z-index:100;transition:transform .25s ease;display:none;}
.chat-panel.collapsed{transform:translateY(calc(100% - 46px));}
.chat-header{height:46px;padding:0 16px;display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:800;font-size:15px;border-radius:12px 12px 0 0;}
.chat-badge{background:var(--red);color:#fff;border-radius:10px;font-size:11px;padding:1px 6px;font-weight:800;}
.chat-toggle{margin-left:auto;font-size:12px;opacity:.6;}
.chat-messages{height:175px;overflow-y:auto;padding:8px 14px;display:flex;flex-direction:column;gap:5px;}
.chat-bubble{font-size:13px;font-weight:600;line-height:1.4;}
.chat-bubble .who{font-weight:800;color:var(--red);}
.chat-bubble.me .who{color:var(--green);}
.chat-input-row{display:flex;gap:8px;padding:8px 14px 14px;}
.chat-input-row input{flex:1;padding:8px 10px;font-family:'Baloo Thambi 2';font-size:15px;font-weight:700;border:2px solid rgba(58,42,24,.3);border-radius:6px;background:#fffdf6;color:var(--ink);outline:none;}
.chat-input-row input:focus{border-color:var(--red);}
.chat-send{padding:8px 16px;font-family:'Baloo Thambi 2';font-size:14px;font-weight:800;background:var(--red);color:#fff;border:none;border-radius:6px;cursor:pointer;}
.conn-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;background:#888;vertical-align:middle;}
.conn-dot.ok{background:#2e6e4e;}.conn-dot.err{background:#b3322b;}
.log-entry{padding:3px 0;border-bottom:1px solid rgba(58,42,24,.1);line-height:1.5;}
.log-entry:last-child{border-bottom:none;}
.log-time{opacity:.45;font-size:10px;margin-right:4px;}
.rxn-bar{position:fixed;bottom:54px;left:0;right:0;max-width:430px;margin:0 auto;display:none;justify-content:center;gap:6px;padding:5px 10px;background:rgba(253,246,227,.88);backdrop-filter:blur(6px);border-top:1px solid rgba(58,42,24,.1);border-radius:12px 12px 0 0;z-index:95;}
.rxn-btn{font-size:24px;background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:8px;transition:transform .1s;}
.rxn-btn:active{transform:scale(1.5);}
.rxn-float{position:fixed;font-size:34px;pointer-events:none;z-index:200;animation:rxnRise 2s ease-out forwards;}
@keyframes rxnRise{0%{opacity:1;transform:translateY(0) scale(1);}60%{opacity:1;transform:translateY(-80px) scale(1.2);}100%{opacity:0;transform:translateY(-140px) scale(.8);}}
</style>
</head>
<body>
<div id="conn-banner" style="display:none;position:fixed;top:0;left:0;right:0;background:var(--red);color:#fff;text-align:center;font-size:13px;font-weight:800;padding:7px;z-index:500;letter-spacing:.5px;">&#x26A1; Connection lost &mdash; reconnecting&hellip;</div>

<!-- HOME -->
<div class="screen active" id="scr-home">
  <div class="crown">&#x1F451;</div>
  <h1>ராஜா ராணி</h1>
  <div class="sub">Online Multiplayer</div>
  <div class="panel">
    <label>உங்க பெயர் / Your name</label>
    <input type="text" id="myname" maxlength="12" placeholder="Name" autocomplete="off">
    <label>Avatar தேர்வு / Pick your avatar</label>
    <div class="avatar-grid" id="avatar-grid"></div>
    <button class="btn" onclick="createRoom()">&#x2795; Create room</button>
    <label style="margin-top:18px;">Room code join பண்ண</label>
    <input type="text" class="code" id="joincode" maxlength="4" placeholder="ABCD" autocomplete="off"
      autocapitalize="characters" autocorrect="off" spellcheck="false"
      oninput="this.value=this.value.toUpperCase().replace(/[^A-Z]/g,'')">
    <button class="btn green" onclick="joinRoom()">&#x1F6AA; Join room</button>
    <div class="err" id="home-err"></div>
  </div>
  <p class="hint"><span class="conn-dot" id="conn-dot"></span><span id="conn-txt">Connecting…</span><br>Host creates room &middot; Others join with code</p>
  <button class="btn ghost" style="margin-top:10px;font-size:13px;opacity:.7;" onclick="
    sessionStorage.removeItem('rr-room');
    localStorage.removeItem('rr-room');
    document.getElementById('joincode').value='';
    document.getElementById('home-err').textContent='✅ Session cleared. Try joining again.';
  ">&#x1F504; Clear session / Stuck? Tap here</button>
</div>

<!-- LOBBY -->
<div class="screen" id="scr-lobby">
  <div class="tagwrap"><span class="roundtag">Lobby</span></div>
  <div class="panel">
    <div class="centertext">Room code &mdash; நண்பர்களுக்கு சொல்லுங்க:</div>
    <div class="roomcode" id="lobby-code"></div>
    <button class="btn ghost" id="copy-code-btn" onclick="copyCode()" style="margin-top:8px;padding:8px 0;font-size:14px;">&#x1F4CB; Copy code</button>
    <div id="lobby-host-settings">
      <label>Number of players / வீரர்கள் எத்தனை</label>
      <div class="np-picker" id="np-picker">
        <button class="np-btn active" onclick="setNumPlayers(4)">4</button>
        <button class="np-btn" onclick="setNumPlayers(5)">5</button>
        <button class="np-btn" onclick="setNumPlayers(6)">6</button>
      </div>
      <label>Total rounds / மொத்த சுற்று</label>
      <div class="np-picker" id="rounds-picker">
        <button class="np-btn" onclick="setRounds(3)">3</button>
        <button class="np-btn active" onclick="setRounds(5)">5</button>
        <button class="np-btn" onclick="setRounds(7)">7</button>
        <button class="np-btn" onclick="setRounds(10)">10</button>
      </div>
    </div>
    <div class="player-list" id="lobby-players"></div>
    <button class="btn" id="lobby-start" onclick="hostStart()" style="display:none;" disabled>Waiting&hellip;</button>
    <div class="waiting" id="lobby-wait"><span class="dotpulse"></span><span class="dotpulse"></span><span class="dotpulse"></span><span style="margin-left:4px;font-size:13px;">நண்பர்களை எதிர்பார்க்கிறோம்&hellip;</span></div>
  </div>
  <button class="btn ghost" onclick="sessionStorage.removeItem('rr-room');location.reload()" style="margin-top:12px;">&#x2190; Leave / New game</button>
</div>

<!-- DICE -->
<div class="screen" id="scr-dice">
  <div class="tagwrap"><span class="roundtag" id="dice-round"></span></div>
  <div class="panel" style="text-align:center;">
    <div id="dice-msg" class="centertext" style="margin-top:0;font-size:16px;"></div>
    <div class="dice-wrap">
      <div class="dice" id="dice-el" onclick="tapDice()">&#x1F3B2;</div>
      <div class="hint" id="dice-hint" style="margin-top:14px;"></div>
    </div>
    <div class="waiting" id="dice-wait" style="display:none;margin-top:18px;"><span class="dotpulse"></span><span class="dotpulse"></span><span class="dotpulse"></span></div>
  </div>
</div>

<!-- MY CARD -->
<div class="screen" id="scr-mycard">
  <div class="tagwrap"><span class="roundtag" id="mc-round"></span></div>
  <div style="text-align:center;margin-top:10px;font-weight:700;font-size:15px;opacity:.7;">உங்களின் சீட்டு / Your card</div>
  <div class="flip-scene">
    <div class="flip-card-inner" id="flip-inner">
      <div class="flip-card-face flip-card-front"><span class="qm">?</span></div>
      <div class="flip-card-face flip-card-back">
        <div class="role-emoji" id="mc-emoji"></div>
        <div class="role-ta" id="mc-ta"></div>
        <div class="role-en" id="mc-en"></div>
        <div class="role-pts" id="mc-pts"></div>
      </div>
    </div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="mc-progress" style="width:100%;"></div></div>
  <div class="hint" id="mc-hint" style="margin-top:12px;"></div>
</div>

<!-- DECLARE -->
<div class="screen" id="scr-declare">
  <div class="tagwrap"><span class="roundtag" id="decl-round"></span></div>
  <div class="panel" style="text-align:center;padding-top:24px;padding-bottom:24px;">
    <div style="font-size:52px;">&#x1F451;</div>
    <div id="decl-content"></div>
  </div>
</div>

<!-- CHAIN -->
<div class="screen" id="scr-chain">
  <div class="tagwrap"><span class="roundtag" id="chain-round"></span></div>
  <div class="chain-progress" id="chain-progress"></div>
  <div id="chain-finder-label" class="centertext" style="margin-top:10px;font-size:15px;"></div>
  <div class="candidates" id="chain-candidates"></div>
  <div id="game-log-wrap" style="margin-top:14px;">
    <div style="font-family:'Catamaran';font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;opacity:.5;margin-bottom:5px;">&#x1F4CB; Activity</div>
    <div id="game-log" style="max-height:110px;overflow-y:auto;background:rgba(58,42,24,.06);border-radius:6px;padding:8px 10px;font-family:'Catamaran';font-size:12px;font-weight:600;"></div>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="scr-result">
  <div class="result-banner good" id="res-banner"></div>
  <div id="res-roles"></div>
  <div class="panel">
    <div class="tagwrap"><span class="roundtag">Scoreboard</span></div>
    <table class="score-table" id="res-table"></table>
  </div>
  <button class="btn" id="res-next" style="display:none;" onclick="hostNextRound()"></button>
  <div class="waiting" id="res-wait"><span class="dotpulse"></span><span class="dotpulse"></span><span class="dotpulse"></span></div>
</div>

<!-- WINNER -->
<div class="screen" id="scr-winner">
  <div class="winner-big">&#x1F3C6;</div>
  <h1 id="w-name"></h1>
  <div class="sub" id="w-pts"></div>
  <div class="panel">
    <div class="tagwrap"><span class="roundtag">Final Scores</span></div>
    <table class="score-table" id="w-table"></table>
  </div>
  <button class="btn green" id="w-rematch" style="display:none;" onclick="hostRematch()">மறுபடியும்! Rematch</button>
  <button class="btn ghost" onclick="sessionStorage.removeItem('rr-room');location.reload()" style="margin-top:12px;">Leave game</button>
</div>

// ── Sound effects ──────────────────────────────────────────────────────
let audioCtx=null;
function getAudio(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playSound(type){
  try{
    const ctx=getAudio();
    const g=ctx.createGain();g.connect(ctx.destination);
    if(type==='flip'){
      const len=Math.floor(ctx.sampleRate*0.12);
      const buf=ctx.createBuffer(1,len,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);
      const src=ctx.createBufferSource();src.buffer=buf;src.connect(g);
      g.gain.setValueAtTime(0.3,ctx.currentTime);src.start();
    }else if(type==='correct'){
      [523,784].forEach((f,i)=>{
        const o=ctx.createOscillator();o.type='sine';o.frequency.value=f;o.connect(g);
        const t=ctx.currentTime+i*0.12;
        g.gain.setValueAtTime(0.4,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
        o.start(t);o.stop(t+0.3);
      });
    }else if(type==='wrong'){
      const o=ctx.createOscillator();o.type='sawtooth';
      o.frequency.setValueAtTime(300,ctx.currentTime);
      o.frequency.linearRampToValueAtTime(100,ctx.currentTime+0.3);
      o.connect(g);g.gain.setValueAtTime(0.25,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      o.start();o.stop(ctx.currentTime+0.3);
    }else if(type==='complete'){
      [523,659,784,1047].forEach((f,i)=>{
        const o=ctx.createOscillator();o.type='triangle';o.frequency.value=f;o.connect(g);
        const t=ctx.currentTime+i*0.1;
        g.gain.setValueAtTime(0.35,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
        o.start(t);o.stop(t+0.25);
      });
    }else if(type==='dice'){
      for(let i=0;i<4;i++){
        const o=ctx.createOscillator();o.type='square';
        o.frequency.value=200+Math.random()*400;o.connect(g);
        const t=ctx.currentTime+i*0.08;
        g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
        o.start(t);o.stop(t+0.05);
      }
    }
  }catch(e){}
}

// ── Obfuscation helpers (XOR + base64, hides playerRoles in DB) ───────
const _K=[114,103,103,97,109,101];
function _enc(str){const b=new TextEncoder().encode(str);let s='';for(let i=0;i<b.length;i++)s+=String.fromCharCode(b[i]^_K[i%6]);return btoa(s);}
function _dec(b64){const s=atob(b64);const b=new Uint8Array(s.length);for(let i=0;i<s.length;i++)b[i]=s.charCodeAt(i)^_K[i%6];return new TextDecoder().decode(b);}

// ── Firebase room helpers ──────────────────────────────────────────────
function _decRoles(s){
  if(s&&s.playerRoles&&typeof s.playerRoles==='string'){
    try{s.playerRoles=JSON.parse(_dec(s.playerRoles));}catch{s.playerRoles=null;}
  }
  return s;
}

async function readRoom(code){
  try{
    const snap=await db.ref('rooms/'+code+'/state').once('value');
    if(!snap.exists())return null;
    return _decRoles(snap.val());
  }catch{return null;}
}

function writeRoom(s){
  s.version=(s.version||0)+1;s.ts=Date.now();
  const toStore=Object.assign({},s);
  if(toStore.playerRoles)toStore.playerRoles=_enc(JSON.stringify(toStore.playerRoles));
  db.ref('rooms/'+roomCode+'/state').set(toStore).catch(()=>onConnLost());
  state=s;lastVer=s.version;render();
}

function subscribeRoom(code){
  if(roomRef&&roomListener){roomRef.off('value',roomListener);roomListener=null;}
  roomRef=db.ref('rooms/'+code+'/state');
  roomListener=roomRef.on('value',snap=>{
    if(!snap.exists())return;
    const s=_decRoles(snap.val());
    if((s.version||0)<=lastVer)return;
    if((s.kickedIds||[]).includes(myId)){alert('You were removed.');location.reload();return;}
    lastVer=s.version;state=s;me=s.players.findIndex(p=>p.id===myId);render();
  });
}

function subscribeAll(code){
  subscribeRoom(code);
  subscribeLog(code);
  subscribePresence(code);
  subscribeChat(code);
  subscribeReactions(code);
}

// ── Game log ───────────────────────────────────────────────────────────
function postLog(text){
  if(!roomCode)return;
  db.ref('rooms/'+roomCode+'/log').push({msg:text,t:Date.now()});
}
function subscribeLog(code){
  if(logRef&&logListener){logRef.off('child_added',logListener);logListener=null;}
  logRef=db.ref('rooms/'+code+'/log').orderByChild('t').limitToLast(30);
  logListener=logRef.on('child_added',snap=>{
    const d=snap.val();const k=snap.key;
    if(!d||!d.msg||seenLogs.has(k))return;
    seenLogs.add(k);logEntries.push({msg:d.msg,t:d.t||Date.now()});
    logEntries.sort((a,b)=>a.t-b.t);renderLog();
  });
}
function renderLog(){
  const el=$('game-log');if(!el)return;
  el.innerHTML=logEntries.slice(-30).map(e=>{
    const t=new Date(e.t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    return '<div class="log-entry"><span class="log-time">'+t+'</span>'+esc(e.msg)+'</div>';
  }).join('');
  el.scrollTop=el.scrollHeight;
}

// ── Presence ───────────────────────────────────────────────────────────
function startHeartbeat(){
  clearInterval(heartbeatInterval);
  if(!roomCode)return;
  myPresRef=db.ref('rooms/'+roomCode+'/presence/'+myId);
  myPresRef.onDisconnect().remove();
  myPresRef.set({t:Date.now()});
  // Refresh presence timestamp hourly so onDisconnect doesn't fire for long sessions
  heartbeatInterval=setInterval(()=>{
    if(myPresRef)myPresRef.set({t:Date.now()});
  },60000);
}
function subscribePresence(code){
  if(presRef&&presListener){presRef.off('value',presListener);presListener=null;}
  presRef=db.ref('rooms/'+code+'/presence');
  presListener=presRef.on('value',snap=>{
    const data=snap.val()||{};
    Object.keys(data).forEach(pid=>{lastSeenMap[pid]={ts:Date.now()};});
    Object.keys(lastSeenMap).forEach(pid=>{if(!data[pid])delete lastSeenMap[pid];});
  });
}
function isOffline(pid){return !lastSeenMap[pid];}
function pingBadge(pid){
  if(pid===myId)return '';
  return lastSeenMap[pid]
    ?'<span style="color:#27ae60;font-size:11px;font-family:Catamaran;font-weight:700;margin-left:auto;">● online</span>'
    :'<span style="color:#888;font-size:11px;font-family:Catamaran;font-weight:700;margin-left:auto;">⚫ offline</span>';
}

// ── Chat ───────────────────────────────────────────────────────────────
function subscribeChat(code){
  if(chatRef&&chatListener){chatRef.off('child_added',chatListener);chatListener=null;}
  chatRef=db.ref('rooms/'+code+'/chat').orderByChild('t').limitToLast(50);
  chatListener=chatRef.on('child_added',snap=>{
    const d=snap.val();const k=snap.key;
    if(!d||!d.msg||seenMsgs.has(k))return;
    seenMsgs.add(k);appendMsg(d);
  });
}
function sendChat(txt){
  if(!txt.trim()||!roomCode)return;
  db.ref('rooms/'+roomCode+'/chat').push({pid:myId,name:myName,msg:txt.trim().slice(0,100),t:Date.now()});
}
function appendMsg(d){
  const box=$('chat-messages');
  const el=document.createElement('div');
  el.className='chat-bubble'+(d.pid===myId?' me':'');
  const t=new Date(d.t||Date.now()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  el.innerHTML='<span class="who">'+esc(d.name)+'</span> <small style="opacity:.5;">'+t+'</small><br>'+esc(d.msg);
  box.appendChild(el);box.scrollTop=box.scrollHeight;
  if(chatCollapsed&&d.pid!==myId){
    unreadCount++;
    const b=$('chat-badge');b.textContent=unreadCount;b.style.display='inline-block';
  }
}
function toggleChat(){
  chatCollapsed=!chatCollapsed;
  $('chat-panel').classList.toggle('collapsed',chatCollapsed);
  $('chat-icon').textContent=chatCollapsed?'▲':'▼';
  if(!chatCollapsed){unreadCount=0;$('chat-badge').style.display='none';$('chat-messages').scrollTop=$('chat-messages').scrollHeight;}

function submitChat(){const i=$('chat-input');sendChat(i.value);i.value='';}

// ── Confetti ───────────────────────────────────────────────────────────
function launchConfetti(){
  const canvas=$('confetti-canvas');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  canvas.style.display='block';
  const ctx=canvas.getContext('2d');
  const colors=['#d49a2a','#b3322b','#2e6e4e','#f5d76e','#fff','#e8a0a0'];
  const pieces=Array.from({length:140},()=>({
    x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,
    w:7+Math.random()*9,h:4+Math.random()*5,
    color:colors[Math.floor(Math.random()*colors.length)],
    rot:Math.random()*Math.PI*2,
    vx:(Math.random()-.5)*4,vy:2.5+Math.random()*3,vr:(Math.random()-.5)*.15,
  }));
  let frame,done=false;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;
      ctx.save();ctx.translate(p.x+p.w/2,p.y+p.h/2);ctx.rotate(p.rot);
      ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
    });
    if(!done&&pieces.some(p=>p.y<canvas.height+20))frame=requestAnimationFrame(draw);
    else{canvas.style.display='none';}
  }
  draw();
  setTimeout(()=>{done=true;canvas.style.display='none';cancelAnimationFrame(frame);},5000);
}

async function createRoom(){
  if(busy||!getName())return;busy=true;
  $('home-err').textContent='Creating room…';
  try{
    let code;const chars='ABCDEFGHJKMNPQRSTUVWXYZ';
    for(let t=0;t<6;t++){
      code=Array.from({length:4},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
      const snap=await db.ref('rooms/'+code+'/state').once('value');
      const ex=snap.val();
      if(!ex||Date.now()-(ex.ts||0)>4*3600*1000)break;
    }
    roomCode=code;me=0;$('home-err').textContent='';
    const s={code,version:0,phase:'lobby',round:1,totalRounds:5,numPlayers:4,
      kickedIds:[],
      players:[{id:myId,name:myName,score:0,avatar:myAvatar}],
      playerRoles:null,diceRoller:0,diceValue:null,
      chainStep:0,chainFinder:null,declaredRajaIdx:null,
      foundPlayers:[],roundPoints:{},lastResult:null};
    writeRoom(s);subscribeAll(code);startHeartbeat();
    history.replaceState(null,'','raja-rani.html?room='+code);
    sessionStorage.setItem('rr-room',code);
    show('scr-lobby');
  }catch(e){$('home-err').textContent='Error — check internet.';console.error(e);}
  busy=false;
}

async function joinRoom(){
  if(busy||!getName())return;
  const code=$('joincode').value.trim().toUpperCase();
  if(code.length!==4){$('home-err').textContent='4-letter code enter பண்ணுங்க.';return;}
  busy=true;
  $('home-err').textContent='Joining…';
  try{
    // Pre-read to populate Firebase local cache before the transaction
    const snap=await db.ref('rooms/'+code+'/state').once('value');
    const existing=snap.val();
    if(!existing){$('home-err').textContent='Room இல்லை! Code சரியா இருக்கா?';busy=false;return;}
    if((existing.kickedIds||[]).includes(myId)){$('home-err').textContent='You were removed from this room.';busy=false;return;}
    if(existing.phase!=='lobby'&&!existing.players.some(p=>p.id===myId)){$('home-err').textContent='Game already started.';busy=false;return;}
    if(existing.players.length>=existing.numPlayers&&!existing.players.some(p=>p.id===myId)){$('home-err').textContent='Room full ('+existing.numPlayers+'/'+existing.numPlayers+').';busy=false;return;}

    // Atomic transaction — cache is warm so curr starts with real data
    let finalState=null,errMsg=null;
    await db.ref('rooms/'+code+'/state').transaction(curr=>{
      errMsg=null;finalState=null;
      if(!curr)return {};
      if((curr.kickedIds||[]).includes(myId)){errMsg='You were removed from this room.';return;}
      const alreadyIn=curr.players.some(p=>p.id===myId);
      if(curr.phase!=='lobby'&&!alreadyIn){errMsg='Game already started.';return;}
      if(!alreadyIn){
        if(curr.players.length>=curr.numPlayers){errMsg='Room full ('+curr.numPlayers+'/'+curr.numPlayers+').';return;}
        let name=myName,suffix=2;
        while(curr.players.some(p=>p.name.toLowerCase()===name.toLowerCase()))name=myName+(suffix++);
        curr.players.push({id:myId,name,score:0,avatar:myAvatar});myName=name;
      }
      curr.version=(curr.version||0)+1;curr.ts=Date.now();
      finalState=deepCopy(curr);
      return curr;
    });
    if(errMsg||!finalState){$('home-err').textContent=errMsg||'Could not join room.';busy=false;return;}
    _decRoles(finalState);
    roomCode=code;
    me=finalState.players.findIndex(p=>p.id===myId);
    state=finalState;lastVer=finalState.version;
    $('home-err').textContent='';
    subscribeAll(code);startHeartbeat();
    history.replaceState(null,'','raja-rani.html?room='+code);
    sessionStorage.setItem('rr-room',code);
    render();
  }catch(e){$('home-err').textContent='Error — check internet.';console.error(e);}
  busy=false;
}

const isHost=()=>me===0;

// ── Lobby controls ─────────────────────────────────────────────────────
function setNumPlayers(n){
  if(!isHost()||!state||state.phase!=='lobby')return;
  if(state.players.length>n)return;
  const s=deepCopy(state);s.numPlayers=n;writeRoom(s);
}
function setRounds(n){
  if(!isHost()||!state||state.phase!=='lobby')return;
  const s=deepCopy(state);s.totalRounds=n;writeRoom(s);
}
function hostKick(playerId){
  if(!isHost()||!state||state.phase!=='lobby')return;
  const s=deepCopy(state);
  const kicked=s.players.find(p=>p.id===playerId);
  s.kickedIds=[...(s.kickedIds||[]),playerId];
  s.players=s.players.filter(p=>p.id!==playerId);
  if(kicked)postLog('⚠️ '+kicked.name+' was removed from the lobby');
  writeRoom(s);
}
async function hostStart(){
  if(!isHost()||!state||state.players.length!==state.numPlayers||busy)return;
  busy=true;beginRound(deepCopy(state));busy=false;
}
function beginRound(s){
  s.phase='dice';s.playerRoles=null;s.diceValue=null;
  s.diceRoller=(s.round-1)%s.numPlayers;
  s.chainStep=0;s.chainFinder=null;s.declaredRajaIdx=null;
  s.foundPlayers=[];s.doneFinderIdxs=[];s.foundRoles=[];s.roundPoints={};s.lastResult=null;
  postLog('🎮 Round '+s.round+' of '+s.totalRounds+' started');
  writeRoom(s);
}

// ── Dice ───────────────────────────────────────────────────────────────
function tapDice(){
  if(busy||!state||state.phase!=='dice'||me!==state.diceRoller)return;
  const el=$('dice-el');
  if(el.classList.contains('rolling'))return;
  playSound('dice');
  el.classList.add('rolling');
  const faces=['⚀','⚁','⚂','⚃','⚄','⚅'];
  const iv=setInterval(()=>{el.textContent=faces[Math.floor(Math.random()*6)];},120);
  setTimeout(()=>{clearInterval(iv);el.classList.remove('rolling');rollDice();},1200);
}
function rollDice(){
  if(busy||!state||state.phase!=='dice'||me!==state.diceRoller)return;
  busy=true;
  const s=deepCopy(state);
  const val=Math.floor(Math.random()*6)+1;
  const keys=shuffle(getRoles(s.numPlayers).map(r=>r.key));
  s.playerRoles=keys;s.diceValue=val;s.phase='mycard';
  $('dice-el').textContent=['⚀','⚁','⚂','⚃','⚄','⚅'][val-1];
  writeRoom(s);busy=false;
}

// ── My card ────────────────────────────────────────────────────────────
function scheduleAdvance(s){
  clearTimeout(mycardTimer);
  const delay=Math.max(400,3000-(Date.now()-s.ts));
  mycardTimer=setTimeout(async()=>{
    if(!state||state.phase!=='mycard')return;
    // Use a transaction so only one client advances, even if multiple fire simultaneously
    await db.ref('rooms/'+roomCode+'/state').transaction(curr=>{
      if(!curr||curr.phase!=='mycard')return;
      curr.phase='declare';curr.version=(curr.version||0)+1;curr.ts=Date.now();
      return curr;
    });
  },delay);
}

// ── Chain ──────────────────────────────────────────────────────────────
function declareRaja(){
  if(busy||!state||state.phase!=='declare')return;
  if(state.playerRoles[me]!=='raja')return;
  busy=true;
  const s=deepCopy(state);
  s.chainFinder=me;s.declaredRajaIdx=me;s.phase='chain';
  writeRoom(s);busy=false;
}

function guessPlayer(targetIdx){
  if(busy||!state||state.phase!=='chain'||state.chainFinder!==me)return;
  busy=true;
  const s=deepCopy(state);
  s.roundPoints=s.roundPoints||{};
  const _doneSet=new Set(s.doneFinderIdxs||[]);
  const _foundRoleSet=new Set(s.foundRoles||[]);
  if(_doneSet.has(targetIdx)||_foundRoleSet.has(s.playerRoles[targetIdx])||targetIdx===me){busy=false;return;}
  const target=chainTarget(s);
  const tName=(s.players[targetIdx]||{name:'?'}).name;
  if(s.playerRoles[targetIdx]===target){
    playSound('correct');
    const ro=ROLE_DEFS[target];
    postLog('✅ '+tName+' ▸ '+ro.emoji+' '+ro.ta+'!');
    const pts=ROLE_DEFS[s.playerRoles[s.chainFinder]].pts;
    s.roundPoints[s.chainFinder]=(s.roundPoints[s.chainFinder]||0)+pts;
    s.doneFinderIdxs=[...(s.doneFinderIdxs||[]),s.chainFinder];
    s.foundRoles=[...(s.foundRoles||[]),target];
    s.foundPlayers=[...(s.foundPlayers||[]),targetIdx];
    s.chainStep++;s.chainFinder=targetIdx;
    if(s.chainStep===s.numPlayers-1)finalizeRound(s);
    else writeRoom(s);
  }else{
    playSound('wrong');
    postLog('🔀 Cards swapped!');
    const tmp=s.playerRoles[s.chainFinder];
    s.playerRoles[s.chainFinder]=s.playerRoles[targetIdx];
    s.playerRoles[targetIdx]=tmp;
    s.chainFinder=targetIdx;
    writeRoom(s);
  }
  busy=false;
}

function finalizeRound(s){
  playSound('complete');
  postLog('🏆 Chain complete! Thirudan found — round over');
  s.roundPoints=s.roundPoints||{};
  s.players.forEach((p,i)=>{p.score+=(s.roundPoints[i]||0);});
  s.lastResult=s.players.map((p,i)=>({
    playerIdx:i,name:p.name,roleKey:s.playerRoles[i],pts:s.roundPoints[i]||0,avatar:p.avatar||'🎮',
  }));
  s.phase='result';writeRoom(s);
}

// ── Round flow ─────────────────────────────────────────────────────────
async function hostEndGame(){
  if(!isHost()||!state||busy)return;
  if(!confirm('End game and go to results?'))return;
  busy=true;
  const s=deepCopy(state);
  s.phase='over';
  writeRoom(s);
  busy=false;
}
async function hostNextRound(){
  if(!isHost()||!state||busy)return;
  busy=true;
  const s=deepCopy(state);
  if(s.round<s.totalRounds){s.round++;beginRound(s);}else{s.phase='over';writeRoom(s);}
  busy=false;
}
async function hostRematch(){
  if(!isHost()||!state||busy)return;
  busy=true;
  const s=deepCopy(state);
  s.players.forEach(p=>p.score=0);s.round=1;beginRound(s);busy=false;
}

// ── Render ─────────────────────────────────────────────────────────────
function render(){
  const s=state;if(!s)return;
  const chatPhases=['declare','chain','result','over'];
  $('chat-panel').style.display=chatPhases.includes(s.phase)?'block':'none';
  const rxnPhases=['dice','mycard','declare','chain','result'];
  $('rxn-bar').style.display=rxnPhases.includes(s.phase)?'flex':'none';
  $('mychit').style.display='none';
  const gamePhases=['dice','mycard','declare','chain','result'];
  $('host-reset-btn').style.display=(isHost()&&gamePhases.includes(s.phase))?'block':'none';
  const phaseChanged=s.phase!==renderedPhase;
  renderedPhase=s.phase;
  switch(s.phase){
    case 'lobby':  return renderLobby(s);
    case 'dice':   return renderDice(s);
    case 'mycard': return renderMycard(s,phaseChanged);
    case 'declare':return renderDeclare(s);
    case 'chain':  return renderChain(s);
    case 'result': return renderResult(s);
    case 'over':   return renderOver(s);
  }
}

function renderLobby(s){
  $('lobby-code').textContent=s.code;
  const hostSec=$('lobby-host-settings');
  if(isHost()){
    hostSec.style.display='block';
    $('np-picker').querySelectorAll('.np-btn').forEach(btn=>{
      const n=parseInt(btn.textContent);
      btn.classList.toggle('active',n===s.numPlayers);
      btn.disabled=s.players.length>n;
    });
    $('rounds-picker').querySelectorAll('.np-btn').forEach(btn=>{
      btn.classList.toggle('active',parseInt(btn.textContent)===(s.totalRounds||5));
    });
  }else{hostSec.style.display='none';}
  const box=$('lobby-players');box.innerHTML='';
  for(let i=0;i<s.numPlayers;i++){
    const d=document.createElement('div');
    if(s.players[i]){
      const p=s.players[i];
      d.className='pl-row';
      let inner='<span style="font-size:22px;">'+esc(av(p))+'</span> '+esc(p.name);
      if(i===0)inner+=' <span class="tag">HOST</span>';
      if(p.id===myId)inner+=' <small style="opacity:.5;">(you)</small>';
      inner+=pingBadge(p.id);
      if(isHost()&&i!==0&&p.id!==myId)
        inner+='<button class="kick-btn" onclick="hostKick(\''+p.id+'\')" title="Remove">✕</button>';
      d.innerHTML=inner;
    }else{d.className='pl-row empty';d.textContent='Waiting…';}
    box.appendChild(d);
  }
  if(isHost()){
    $('lobby-start').style.display='block';$('lobby-wait').style.display='none';
    const ok=s.players.length===s.numPlayers;
    $('lobby-start').disabled=!ok;
    $('lobby-start').textContent=ok?'▶ Start game!':'Waiting… ('+s.players.length+'/'+s.numPlayers+')';
  }else{$('lobby-start').style.display='none';$('lobby-wait').style.display='flex';}
  show('scr-lobby');
}

function renderDice(s){
  $('dice-round').textContent='Round '+s.round+' / '+s.totalRounds;
  const isRoller=me===s.diceRoller;
  const rollerName=(s.players[s.diceRoller]||{name:'?'}).name;
  $('dice-msg').textContent=isRoller?'🎲 உங்க முறை! Tap to roll':'⏳ '+rollerName+' rolling the dice…';
  $('dice-el').style.pointerEvents=isRoller?'auto':'none';
  $('dice-el').style.opacity=isRoller?'1':'.55';
  $('dice-hint').textContent=isRoller?'Tap the dice!':'';
  $('dice-wait').style.display=isRoller?'none':'flex';
  show('scr-dice');
}

function renderMycard(s,phaseChanged){
  if(me<0||!s.playerRoles){show('scr-home');return;}
  const ro=ROLE_DEFS[s.playerRoles[me]];
  if(!ro){show('scr-home');return;}
  $('mc-round').textContent='Round '+s.round+' / '+s.totalRounds;
  $('mc-emoji').textContent=ro.emoji;
  $('mc-ta').textContent=ro.ta;
  $('mc-en').textContent=ro.en;
  $('mc-pts').textContent=ro.pts+' pts';
  $('mc-hint').textContent=ro.key==='raja'?'👑 உங்களே ராஜா! Get ready to declare…':
    ro.key==='thirudan'?'🤫 ஷ்ஷ்! Don\'t get caught…':
    'Memorise your role… Round starts soon';
  if(phaseChanged){
    playSound('flip');
    const inner=$('flip-inner');
    inner.classList.remove('flipped');
    const pf=$('mc-progress');
    pf.style.cssText='width:100%;height:100%;background:var(--red);border-radius:2px;';
    void pf.offsetWidth;
    pf.style.cssText='width:100%;height:100%;background:var(--red);border-radius:2px;animation:shrinkWidth 3s linear forwards;';
    setTimeout(()=>inner.classList.add('flipped'),300);
  }
  scheduleAdvance(s);
  show('scr-mycard');
}

function renderDeclare(s){
  $('decl-round').textContent='Round '+s.round+' / '+s.totalRounds;
  const amRaja=s.playerRoles&&s.playerRoles[me]==='raja';
  $('decl-content').innerHTML=amRaja
    ?'<div style="font-size:20px;font-weight:800;margin-top:12px;line-height:1.4;">உங்கள் தான் ராஜா!<br><span style="font-family:\'Catamaran\';font-size:14px;opacity:.7;">You are the Raja</span></div><button class="btn" style="margin-top:20px;" onclick="declareRaja()">👑 Declare yourself!</button>'
    :'<div style="font-size:17px;font-weight:700;margin-top:14px;opacity:.7;">Waiting for Raja to declare…</div><div class="waiting" style="margin-top:16px;"><span class="dotpulse"></span><span class="dotpulse"></span><span class="dotpulse"></span></div>';
  showBadge(s);show('scr-declare');
}

function renderChain(s){
  if(!s.playerRoles||me<0){show('scr-home');return;}
  $('chain-round').textContent='Round '+s.round+' / '+s.totalRounds;
  renderChainProgress(s);
  const isMyTurn=me===s.chainFinder;
  const target=chainTarget(s);
  const tro=ROLE_DEFS[target];
  $('chain-finder-label').innerHTML=isMyTurn
    ?'<b>உங்க முறை!</b> Tap a player below to guess <span style="color:var(--red);">'+tro.emoji+' '+tro.ta+'</span>'
    :'👀 Waiting for <b>'+esc((s.players[s.chainFinder]||{name:'?'}).name)+'</b> to choose…';
  const area=$('chain-candidates');area.innerHTML='';

  // 1. Clickable candidates FIRST so they're prominent
  const doneFinderSet=new Set(s.doneFinderIdxs||[]);
  const foundRoleSet=new Set(s.foundRoles||[]);
  for(let pi=0;pi<s.numPlayers;pi++){
    if(doneFinderSet.has(pi))continue;
    if(pi===s.chainFinder)continue;
    if(foundRoleSet.has(s.playerRoles[pi]))continue;
    const p=s.players[pi];if(!p)continue;
    const offBadge=isOffline(p.id)?'<span class="offline-badge">offline</span>':'';
    const d=document.createElement('div');
    d.className='candidate'+(isMyTurn?' tappable':' passive');
    d.innerHTML='<span class="cface">'+esc(av(p))+'</span><span class="cinfo"><span class="cname">'+esc(p.name)+offBadge+'</span><span class="csub">'+(!isMyTurn?'Unknown role':'Tap to guess')+'</span></span><span class="cq">?</span>';
    if(isMyTurn)d.onclick=()=>guessPlayer(pi);
    area.appendChild(d);
  }

  // 2. Chooser card (the active finder)
  const fp=s.players[s.chainFinder];
  if(fp){
    const fd=document.createElement('div');
    fd.className='candidate passive';
    fd.style.cssText='border:2px solid var(--red);background:#fff8f0;margin-top:14px;';
    fd.innerHTML='<span class="cface">'+esc(av(fp))+'</span><span class="cinfo"><span class="cname">'+esc(fp.name)+(isMyTurn?' <small style="opacity:.5;">(you)</small>':'')+'</span><span class="csub">🎯 '+(isMyTurn?'Your turn to choose':'Choosing…')+'</span></span>';
    area.appendChild(fd);
  }

  // 3. Already-found players at bottom (show the role they were found AS, not current swapped role)
  (s.foundPlayers||[]).forEach((pi,fi)=>{
    if(pi==null)return;
    if(pi===s.chainFinder)return;
    const p=s.players[pi];if(!p)return;
    const roleKey=(s.foundRoles||[])[fi]||s.playerRoles[pi];
    const ro=ROLE_DEFS[roleKey];if(!ro)return;
    const d=document.createElement('div');
    d.className='candidate revealed';
    d.innerHTML='<span class="cface">'+esc(av(p))+'</span><span class="cinfo"><span class="cname">'+esc(p.name)+'</span><span class="csub">'+ro.emoji+' '+ro.ta+'</span></span><span class="crole">✓</span>';
    area.appendChild(d);
  });
  renderLog();
  showBadge(s);show('scr-chain');
}

function renderChainProgress(s){
  const roles=getRoles(s.numPlayers);
  const prog=$('chain-progress');prog.innerHTML='';
  roles.forEach((ro,idx)=>{
    if(idx>0){const a=document.createElement('span');a.className='cp-arrow';a.textContent='→';prog.appendChild(a);}
    const span=document.createElement('span');
    let cls='cp-role';
    if(idx===0)cls+=' declared';
    else if(idx<=s.chainStep)cls+=' found';
    else if(idx===s.chainStep+1)cls+=' target';
    span.className=cls;
    span.textContent=ro.emoji+' '+ro.ta;
    prog.appendChild(span);
  });
}

function renderResult(s){
  $('res-banner').textContent='✅ Chain complete! Points this round:';
  const list=$('res-roles');list.innerHTML='';
  (s.lastResult||[]).forEach(p=>{
    const ro=ROLE_DEFS[p.roleKey];if(!ro)return;
    const row=document.createElement('div');
    row.className='role-row';
    row.innerHTML='<span class="em">'+(p.avatar||'🎮')+' '+ro.emoji+'</span>'+esc(p.name)+' <small style="opacity:.55;">('+ro.ta+')</small><span class="pt">+'+p.pts+'</span>';
    list.appendChild(row);
  });
  renderTable('res-table',s);
  if(isHost()){
    $('res-next').style.display='block';$('res-wait').style.display='none';
    $('res-next').textContent=s.round<s.totalRounds?'Round '+(s.round+1)+' →':'🏆 Final result';
  }else{$('res-next').style.display='none';$('res-wait').style.display='flex';}
  show('scr-result');
}

function renderOver(s){
  sessionStorage.removeItem('rr-room');
  const sorted=[...s.players].sort((a,b)=>b.score-a.score);
  $('w-name').textContent=sorted[0].name;
  $('w-pts').textContent=sorted[0].score+' pts • ராஜாவோட ராஜா!';
  renderTable('w-table',s);
  $('w-rematch').style.display=isHost()?'block':'none';
  show('scr-winner');
  launchConfetti();
}

function showBadge(s){
  if(!s.playerRoles||me<0)return;
  const ro=ROLE_DEFS[s.playerRoles[me]];if(!ro)return;
  const p=s.players[me];
  const el=$('mychit');
  el.textContent=(p?av(p)+' ':'')+ro.emoji+' '+ro.ta;
  el.style.display='block';
}

function renderTable(id,s){
  const t=$(id);
  const sorted=s.players.map((p,i)=>({...p,i})).sort((a,b)=>b.score-a.score);
  t.innerHTML=sorted.map((p,idx)=>
    '<tr class="'+(idx===0?'leader':'')+'"><td>'+(idx===0?'👑 ':'')+esc(av(p))+' '+esc(p.name)+(p.id===myId?' <small style="opacity:.5;">(you)</small>':'')+'</td><td>'+p.score+'</td></tr>'
  ).join('');
}

window.addEventListener('beforeunload',e=>{if(roomCode){e.preventDefault();e.returnValue='';}});

(async function(){
  const saved=sessionStorage.getItem('rr-room');if(!saved)return;
  const existing=await readRoom(saved);
  if(!existing||!existing.players||!existing.players.find(p=>p.id===myId)||existing.phase==='over'){sessionStorage.removeItem('rr-room');return;}
  roomCode=saved;state=existing;lastVer=existing.version||0;
  me=existing.players.findIndex(p=>p.id===myId);
  subscribeAll(saved);startHeartbeat();
  render();
})();
</script>
</body>
